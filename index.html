<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
    .logo { font-weight: 900; font-size: 18px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 11px; font-weight: 700; padding: 5px 10px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    /* BADGE */
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 10px; font-weight: 900; margin-bottom: 15px; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
    .is-live #statusBadge { border-color: #f52a1f; color: #f52a1f; }
    .is-live #statusDot { background: #f52a1f; box-shadow: 0 0 10px #f52a1f; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* PLAYER */
    .player-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; display: none; }
    .is-live .player-container { display: block; }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; }
    .player-aspect iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
    #unmuteOverlay { position: absolute; bottom: 15px; right: 15px; z-index: 100; background: #f52a1f; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; }

    .section-title { text-align: center; margin: 40px 0 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    .grid-vids { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .card-v { background: #0a0a0a; border-radius: 10px; border: 1px solid #222; cursor: pointer; overflow: hidden; }
    .card-dj { text-align: center; background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #111; }
    .card-dj img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin-bottom: 8px; }

    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 50px 1fr 100px 80px; padding: 12px 15px; border-bottom: 1px solid #111; align-items: center; gap: 10px; }
    .sch-row.live-now { background: rgba(245, 42, 31, 0.08); border-left: 4px solid #f52a1f; }
    .sch-dj-thumb { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }

    /* ADMIN DASHBOARD */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 15px; margin-top: 40px; display: none; }
    .admin-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
    .admin-input, select { width: 100%; padding: 10px; margin: 4px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    .btn-publish { background: #28a745; color: #fff; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 15px; }
    
    footer { padding: 30px; text-align: center; color: #333; font-size: 10px; }
  </style>
</head>
<body id="mainContent">
  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#vids">Vídeos</a>
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:center" id="badgeWrap"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">SINCRONIZANDO</span></div></div>
    
    <div class="player-container">
      <div class="player-aspect"><iframe id="kickIframe" allowfullscreen></iframe></div>
      <button id="unmuteOverlay" onclick="unmutePlayer()">🔊 SOM</button>
    </div>

    <div id="vids"><h2 class="section-title">Últimos Sets</h2><div id="videoGrid" class="grid-vids"></div></div>
    <div id="secDjs"><h2 class="section-title" id="djs">Nossa Equipa</h2><div id="djGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;"></div></div>
    <div id="secSch"><h2 class="section-title" id="schedule">Broadcast Schedule</h2><div id="scheduleList" class="sch-container"></div></div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center;">COMANDO CLOUD</h2>
      <div id="dashBox">
        <div class="admin-card">
          <h3>Visibilidade</h3>
          <label><input type="checkbox" id="hideDjs"> Ocultar Equipa</label><br>
          <label><input type="checkbox" id="hideSch"> Ocultar Horário</label>
        </div>
        <div class="admin-card">
          <h3>Equipa</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; cursor:pointer">+ DJ</button>
        </div>
        <div class="admin-card">
          <h3>Horário</h3>
          <div id="adminSchList"></div>
          <button onclick="addNewSchField()" class="admin-input" style="background:#222; cursor:pointer">+ Horário</button>
        </div>
        <button class="btn-publish" onclick="saveAll()">☁️ PUBLICAR E SAIR</button>
      </div>
    </div>
  </div>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    const daysArr = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo", "Todos os dias"];
    const hoursArr = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
    let currentDjs = []; let currentSch = [];

    function unmutePlayer() {
      document.getElementById('kickIframe').src = "https://player.kick.com/DJLIVETV?muted=false";
      document.getElementById('unmuteOverlay').style.display = 'none';
    }

    async function checkStatus() {
      const body = document.getElementById('mainContent');
      const statusTxt = document.getElementById('statusText');
      const iframe = document.getElementById('kickIframe');
      
      try {
        // Forçamos o Worker a não usar cache com um timestamp único
        const res = await fetch(`https://calm-violet-826b.ricardobargante.workers.dev/status?t=${Date.now()}`, {
           cache: "no-store"
        });
        const data = await res.json();
        
        // Se data.live for estritamente verdadeiro
        if (data.live === true) {
          body.classList.add('is-live');
          statusTxt.innerText = "LIVE NOW";
          if(!iframe.src) iframe.src = "https://player.kick.com/DJLIVETV?muted=true";
        } else {
          body.classList.remove('is-live');
          statusTxt.innerText = "OFFLINE";
          iframe.src = ""; // Remove o player se estiver offline
        }
      } catch (e) { 
        statusTxt.innerText = "OFFLINE"; 
        body.classList.remove('is-live');
        iframe.src = "";
      }
    }

    async function load() {
      checkStatus(); 
      setInterval(checkStatus, 20000); // Verifica a cada 20 segundos

      try {
        const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await rv.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0, 4).map(v => `<div class="card-v" onclick="window.open('${v.source}','_self')"><img src="${v.thumbnail.src}" style="width:100%"><h3 style="font-size:13px; padding:10px;">${v.session_title}</h3></div>`).join('');
      } catch(e) {}

      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      currentDjs = data?.djs || [];
      currentSch = data?.schedule || [];

      document.getElementById('djGrid').innerHTML = currentDjs.map(d => `<div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3></div>`).join('');
      document.getElementById('secDjs').style.display = data?.hideDjs ? 'none' : 'block';
      document.getElementById('secSch').style.display = data?.hideSch ? 'none' : 'block';
      
      const hour = new Date().getHours();
      document.getElementById('scheduleList').innerHTML = currentSch.map(s => {
        const dj = currentDjs.find(d => d.name === s.dj) || {img: ''};
        return `<div class="sch-row ${parseInt(s.time) === hour ? 'live-now' : ''}"><img src="${dj.img}" class="sch-dj-thumb"><div class="sch-name">${s.dj}</div><div class="sch-time">${s.time}</div></div>`;
      }).join('');
    }

    function renderAdmin() {
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `<div style="display:flex; gap:5px; margin-bottom:5px;"><input class="admin-input" value="${d.name}" oninput="currentDjs[${i}].name=this.value"><input class="admin-input" value="${d.img}" oninput="currentDjs[${i}].img=this.value"><button onclick="currentDjs.splice(${i},1);renderAdmin()" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`).join('');
      document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `<div style="display:flex; gap:5px; margin-bottom:5px;"><select onchange="currentSch[${i}].dj=this.value">${currentDjs.map(dj => `<option ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}</select><select onchange="currentSch[${i}].time=this.value">${hoursArr.map(h => `<option ${s.time==h?'selected':''}>${h}</option>`).join('')}</select><button onclick="currentSch.splice(${i},1);renderAdmin()" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`).join('');
    }

    function addNewDjField() { currentDjs.push({name:'', img:''}); renderAdmin(); }
    function addNewSchField() { currentSch.push({dj:'', time:'22:00'}); renderAdmin(); }
    async function saveAll() {
      const payload = { djs: currentDjs, schedule: currentSch, hideDjs: document.getElementById('hideDjs').checked, hideSch: document.getElementById('hideSch').checked };
      await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify(payload) });
      alert("✅ ATUALIZADO!"); location.reload();
    }
    function toggleAdmin() { if(prompt("Senha:") === '1234') { document.getElementById('adminArea').style.display='block'; renderAdmin(); } }
    load();
  </script>
</body>
</html>
