<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    /* MANTIVE TODO O TEU ESTILO ORIGINAL IGUAL */
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; }
    .container { max-width: 1120px; margin: 0 auto; padding: 14px; }
    h1, h2, h3 { text-align: center; margin: 0; }
    h1 { margin-bottom: 14px; font-size: 56px; letter-spacing: .5px; }
    .section-title { margin-top: 44px; margin-bottom: 16px; font-size: 38px; letter-spacing: .4px; }
    .section-sub { text-align: center; color: #bdbdbd; margin: 0 0 18px 0; font-size: 15px; }
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    #live-status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; background: #2b2b2b; color: #d7d7d7; border: 1px solid rgba(255,255,255,.12); }
    #live-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #666; display: inline-block; }
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .player iframe, .player video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
    .controls { position: absolute; right: 14px; bottom: 14px; z-index: 20; display: flex; gap: 10px; flex-wrap: wrap; }
    .control-btn { background: rgba(0,0,0,.78); color: #fff; border: 1px solid rgba(255,255,255,.16); padding: 12px 14px; border-radius: 12px; font-size: 15px; cursor: pointer; min-height: 46px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
    .card { background: #0d0d0d; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .card img { width: 100%; display: block; aspect-ratio: 16 / 9; object-fit: cover; background: #111; }
    .card p { margin: 0; padding: 10px 12px 14px; font-size: 14px; line-height: 1.35; }
    .dj-card { padding: 14px; text-align: center; }
    .dj-card img { aspect-ratio: 1 / 1; border-radius: 14px; margin-bottom: 10px; object-fit: cover; }
    .dj-style { color: #ff6b6b; font-size: 13px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
    .schedule-list { display: flex; flex-direction: column; gap: 12px; }
    .schedule-item { display: grid; grid-template-columns: 70px 110px 1.1fr 110px 1fr 1.1fr auto; gap: 14px; align-items: center; background: #0d0d0d; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 12px 14px; }
    .schedule-item.live-item { border: 1px solid rgba(255,90,90,.35); box-shadow: 0 0 0 1px rgba(255,90,90,.12); }
    .schedule-photo { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; }
    .live-pill { display: inline-block; padding: 8px 10px; border-radius: 999px; background: rgba(255,60,60,.14); color: #ff6a6a; border: 1px solid rgba(255,90,90,.35); font-size: 12px; font-weight: 700; }
    .admin-shell { display: grid; grid-template-columns: 1fr; gap: 18px; max-width: 940px; margin: 40px auto; }
    .admin-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 20px; }
    .admin { display: flex; flex-direction: column; gap: 12px; }
    .admin input, .admin select, .admin textarea { padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); font-size: 16px; background: #f2f2f2; color: #111; width: 100%; box-sizing: border-box; }
    .admin button { padding: 14px; border-radius: 12px; border: none; background: #f52a1f; color: white; font-weight: 700; cursor: pointer; }
    .tab-btn.active { background: #f13a2c; }
    .small-btn { background: #1f1f1f; color: #fff; border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 9px 12px; cursor: pointer; font-size: 13px; }
    .small-btn.delete { background: #481515; }
    @media (max-width: 900px) { .schedule-head { display: none; } .schedule-item { grid-template-columns: 56px 1fr auto; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>DJ LIVE TV</h1>
    <div class="badge-wrap"><div id="live-status-badge"><span id="live-status-dot"></span><span id="live-status-text">CHECKING...</span></div></div>
    <div class="player" id="playerWrap">
      <iframe id="livePlayer" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
      <div class="controls"><button class="control-btn" id="unmuteBtn">🔊 SOUND</button></div>
    </div>

    <h2 class="section-title">REPLAYS</h2>
    <div id="videos" class="grid"></div>

    <h2 class="section-title">OUR DJs</h2>
    <div id="djGrid" class="grid"></div>

    <h2 class="section-title">SCHEDULE</h2>
    <div class="schedule-list" id="scheduleList"></div>

    <div class="admin-shell">
      <div id="loginBox" class="admin-card">
        <h3>Admin Login</h3>
        <div class="admin">
          <input id="user" placeholder="Username">
          <input id="pass" type="password" placeholder="Password">
          <button onclick="login()">LOGIN</button>
        </div>
      </div>

      <div id="adminPanel" class="admin-card" style="display:none;">
        <div class="admin">
          <select id="scheduleDjSelect"></select>
          <select id="scheduleDay">
            <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option><option value="Saturday">Saturday</option><option value="Sunday">Sunday</option><option value="Every Day">Every Day</option>
          </select>
          <input id="scheduleTime" type="time">
          <input id="scheduleStyle" placeholder="Style (ex: House)">
          <input id="scheduleShow" placeholder="Show name">
          <button onclick="saveSchedule()">SAVE SCHEDULE</button>
          <button style="background:#333" onclick="logoutAdmin()">LOGOUT</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isChannelLive = false;
    const defaultDJs = [{ name: "DJ Ricardo", img: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400", style: "House", bio: "Tech House lover." }];
    
    function getDJs() { return JSON.parse(localStorage.getItem("djs_demo")) || defaultDJs; }
    function getSchedule() { return JSON.parse(localStorage.getItem("schedule_demo")) || []; }

    function renderSchedule() {
      const container = document.getElementById("scheduleList");
      const schedule = getSchedule();
      const djs = getDJs();
      const now = new Date();
      const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const currentDay = days[now.getDay()];
      const currentTime = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

      container.innerHTML = "";
      schedule.forEach((item, index) => {
        const dj = djs.find(d => d.name === item.djName);
        const isLiveNow = (item.day === currentDay || item.day === "Every Day") && isChannelLive; 
        
        container.innerHTML += `
          <div class="schedule-item ${isLiveNow ? 'live-item' : ''}">
            <img class="schedule-photo" src="${dj ? dj.img : ''}">
            <div class="schedule-day">${item.day}</div>
            <div class="schedule-name">${item.djName}</div>
            <div class="schedule-time">${item.time}</div>
            <div class="schedule-style">${item.style}</div>
            <div class="schedule-show">${item.show}</div>
            <div>
              ${isLiveNow ? '<span class="live-pill">LIVE</span>' : ''}
              <button class="small-btn delete" onclick="deleteSchedule(${index})">X</button>
            </div>
          </div>`;
      });
    }

    async function updateStatus() {
      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbzMvkIpTAEEORQKvh_hWNzLY5Y7A9k_kO6KmlqTAXbK-9MXE37rE5UqFGgZx0z8Kr-E/exec?action=status");
        const status = (await res.text()).trim().toLowerCase();
        isChannelLive = (status === "live");
        document.getElementById("live-status-text").innerText = isChannelLive ? "LIVE NOW" : "OFFLINE";
        document.getElementById("live-status-dot").style.background = isChannelLive ? "#ff3b3b" : "#666";
      } catch { isChannelLive = false; }
      renderSchedule();
    }

    function saveSchedule() {
      const djName = document.getElementById("scheduleDjSelect").value;
      const day = document.getElementById("scheduleDay").value;
      const time = document.getElementById("scheduleTime").value;
      const style = document.getElementById("scheduleStyle").value;
      const show = document.getElementById("scheduleShow").value;
      if (!djName || !time) return alert("Fill DJ and Time");
      const s = getSchedule();
      s.push({ djName, day, time, style, show });
      localStorage.setItem("schedule_demo", JSON.stringify(s));
      renderSchedule();
    }

    function deleteSchedule(index) {
      const s = getSchedule();
      s.splice(index, 1);
      localStorage.setItem("schedule_demo", JSON.stringify(s));
      renderSchedule();
    }

    function login() {
      if (document.getElementById("user").value === "admin" && document.getElementById("pass").value === "1234") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        const select = document.getElementById("scheduleDjSelect");
        select.innerHTML = getDJs().map(d => `<option value="${d.name}">${d.name}</option>`).join("");
      }
    }

    function logoutAdmin() {
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
    }

    // Init
    updateStatus();
    setInterval(updateStatus, 30000);
    document.getElementById("djGrid").innerHTML = getDJs().map(dj => `<div class="card dj-card"><img src="${dj.img}"><h3>${dj.name}</h3><div class="dj-style">${dj.style}</div></div>`).join("");
  </script>
</body>
</html>
