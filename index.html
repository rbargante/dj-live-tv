<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | PRO STATION V98</title>
    <style>
        :root { 
            --neon-red: #f52a1f; 
            --neon-blue: #00ecff; 
            --live-green: #28a745; 
            --bg-color: #000;
            --accent-color: var(--neon-red);
        }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg-color); color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 140px; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- NAVIGATION --- */
        .top-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #1a1a1a; padding: 15px 0; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
        .logo-circle { background: var(--accent-color); padding: 5px 12px; border-radius: 5px; font-weight: 900; }
        .main-menu { display: flex; gap: 20px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; align-items: center; }
        .admin-btn { color: var(--accent-color); border: 1px solid var(--accent-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* --- PLAYER STAGE --- */
        .player-stage { width: 95%; max-width: 1200px; aspect-ratio: 16/9; background: #050505; border: 5px solid var(--accent-color); margin: 0 auto 10px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: var(--live-green); box-shadow: 0 0 30px rgba(40, 167, 69, 0.2); }
        iframe { width: 100%; height: 100%; border: 0; display: none; position: relative; z-index: 5; }
        body.is-live iframe { display: block; }

        /* SOM CONTROLS */
        .mobile-controls { width: 95%; max-width: 1200px; margin: 0 auto 20px; text-align: center; }
        .sound-btn { background: #ffc107; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-size: 13px; font-weight: 900; cursor: pointer; text-transform: uppercase; display: none; box-shadow: 0 0 20px rgba(255,193,7,0.4); }
        body.is-live .sound-btn { display: inline-block; }

        /* --- SCHEDULE --- */
        .sch-box { background: #080808; border: 1px solid #1a1a1a; border-radius: 15px; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 110px 1fr 100px; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 45px; height: 45px; border-radius: 8px; background-size: cover; background-position: center; border: 1px solid #333; }

        /* --- ADMIN DASHBOARD --- */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 20px; border-radius: 20px; }
        .dash-section { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; }
        .action-btn { width: 100%; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        .status-badge { width: fit-content; padding: 8px 20px; border-radius: 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin: 0 auto 15px; }
        .badge-on { background: var(--live-green); color: #fff; }
        .badge-off { background: #333; color: #777; }

        footer { margin-top: auto; padding: 40px 20px; background: #050505; border-top: 1px solid #1a1a1a; text-align: center; font-size: 10px; color: #444; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <div class="nav-content">
            <a href="#" class="brand"><div class="logo-circle">F</div><div style="font-size: 18px; font-weight: 900; letter-spacing: 1px;">FLASHMIX.TV</div></a>
            <div class="main-menu">
                <span onclick="document.getElementById('login-overlay').style.display='flex'" class="admin-btn">MANAGER</span>
            </div>
        </div>
    </nav>

    <div id="login-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background:#111; padding:30px; border:1px solid var(--neon-red); width:300px; text-align:center;">
            <h3 style="color:var(--neon-red);">STAFF ACCESS</h3>
            <input type="text" id="user-f" placeholder="User">
            <input type="password" id="pass-f" placeholder="Pass">
            <button onclick="checkLogin()" class="action-btn">LOGIN</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="cursor:pointer; margin-top:15px; font-size:10px; color:#555;">CANCEL</p>
        </div>
    </div>

    <div id="live-badge" class="status-badge badge-off">STATION OFFLINE</div>

    <div class="player-stage">
        <div id="offline-msg" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #111; font-size: 30px; font-weight: 900; letter-spacing: 5px;">OFFLINE</div>
        <iframe id="kick-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="mobile-controls">
        <button id="btn-audio-main" class="sound-btn" onclick="activateSound()">🔊 CLICK TO UNMUTE SOUND</button>
    </div>

    <div id="station-news-display" style="text-align:center; padding:10px 20px; color:var(--neon-blue); font-size:13px; font-family:'Courier New';"></div>

    <div class="container" style="width: 95%; max-width: 1100px; margin: 0 auto; flex: 1;">
        <div id="uk-clock" style="text-align:right; font-size:10px; color:#333; margin-bottom:10px;">--:--</div>
        <div id="schedule-title" style="font-size: 18px; margin: 20px 0; border-left: 4px solid var(--neon-red); padding-left: 10px; text-transform: uppercase;">Weekly Schedule</div>
        <div id="pub-sch" class="sch-box"></div>
    </div>

    <footer>FLASHMIX.TV | 80s 90s 00s ELECTRONIC JOURNEY</footer>

    <div id="dashboard">
        <div class="dash-container">
            <h2 style="text-align:center; color:var(--neon-red);">ADMIN DASHBOARD</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="setLive(true)" style="flex:1; background:#28a745; color:#fff; padding:15px; border:none; font-weight:bold; cursor:pointer;">LIVE ON</button>
                <button onclick="setLive(false)" style="flex:1; background:#dc3545; color:#fff; padding:15px; border:none; font-weight:bold; cursor:pointer;">LIVE OFF</button>
            </div>

            <div class="dash-section">
                <h3>Update News</h3>
                <textarea id="adm-news" rows="2" placeholder="Text under player..."></textarea>
                <button onclick="saveNews()" class="action-btn" style="background:#007bff;">SAVE NEWS</button>
            </div>

            <div class="dash-section">
                <h3>Manage DJs</h3>
                <input type="text" id="dj-n" placeholder="DJ Name">
                <input type="text" id="dj-s" placeholder="Style (ex: Techno)">
                <input type="text" id="dj-i" placeholder="Photo URL">
                <button onclick="addToDB('djs')" class="action-btn">ADD TO DATABASE</button>
                <div id="adm-list-djs" style="margin-top:15px;"></div>
            </div>
            
            <button onclick="location.reload()" class="action-btn" style="background:#333;">EXIT ADMIN</button>
        </div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        const KICK_URL = "https://player.kick.com/djlivetv";
        let stationIsLive = false;

        // SOLUÇÃO DE SOM ANDROID: Reinjecta o Iframe com muted=false num evento de clique
        function activateSound() {
            const iframe = document.getElementById('kick-iframe');
            if(stationIsLive) {
                iframe.src = KICK_URL + "?muted=false&autoplay=true&t=" + Date.now();
                const btn = document.getElementById('btn-audio-main');
                btn.innerText = "✅ AUDIO ACTIVE";
                btn.style.background = "#28a745";
                btn.style.color = "#fff";
            }
        }

        function checkLogin() {
            if(document.getElementById('user-f').value === "admin" && document.getElementById('pass-f').value === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                load();
            }
        }

        async function setLive(st) { await fetch(DB + ".json", { method: "PATCH", body: JSON.stringify({ is_live: st }) }); load(); }
        async function saveNews() { const t = document.getElementById('adm-news').value; await fetch(DB + "news.json", { method: "PUT", body: JSON.stringify(t) }); load(); }
        async function addToDB(p) {
            let item = { name: document.getElementById('dj-n').value, style: document.getElementById('dj-s').value, img: document.getElementById('dj-i').value };
            await fetch(DB + p + ".json", { method: "POST", body: JSON.stringify(item) });
            load();
        }

        async function load() {
            const r = await fetch(DB + ".json?nocache=" + Date.now());
            const data = await r.json() || {};
            
            const oldLive = stationIsLive;
            stationIsLive = data.is_live;
            const iframe = document.getElementById('kick-iframe');
            
            if(stationIsLive && !oldLive) {
                // Primeira carga em mute para respeitar o autoplay visual inicial
                iframe.src = KICK_URL + "?muted=true&autoplay=true";
            } else if(!stationIsLive) {
                iframe.src = "about:blank";
            }

            document.getElementById('station-news-display').innerText = data.news || "";
            const badge = document.getElementById('live-badge');
            if(stationIsLive) { 
                document.body.classList.add('is-live'); 
                badge.innerText = "LIVE NOW"; 
                badge.className = "status-badge badge-on"; 
            } else { 
                document.body.classList.remove('is-live'); 
                badge.innerText = "OFFLINE"; 
                badge.className = "status-badge badge-off"; 
            }

            // Render DJ List
            const djsStore = data.djs || {};
            const djsArr = Object.entries(djsStore);
            document.getElementById('adm-list-djs').innerHTML = djsArr.map(([id, d]) => `
                <div style="display:flex; justify-content:space-between; background:#000; padding:10px; margin-bottom:5px; border-radius:5px; border:1px solid #222;">
                    <span style="font-size:12px;">${d.name}</span>
                    <button onclick="delItem('${id}')" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">DEL</button>
                </div>
            `).join('');

            // Render Public Schedule (Exemplo com 5 DJs)
            document.getElementById('pub-sch').innerHTML = djsArr.slice(0,5).map((d, i) => `
                <div class="sch-row">
                    <div class="sch-photo" style="background-image:url('${d[1].img}')"></div>
                    <div style="color:var(--accent-color); font-weight:bold;">EVERY DAY</div>
                    <div style="font-weight:bold;">${d[1].name} <span style="font-weight:normal; margin:0 5px; color:#555;">|</span> <span style="font-weight:normal; color:#888;">${d[1].style}</span></div>
                    <div style="text-align:right;">${i+20}:00</div>
                </div>
            `).join('');
        }

        async function delItem(id) { if(confirm("Apagar?")) { await fetch(DB + "djs/" + id + ".json", { method: "DELETE" }); load(); } }

        setInterval(() => { 
            const now = new Date();
            document.getElementById('uk-clock').innerText = "UK TIME: " + now.toLocaleTimeString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
        }, 1000);

        load(); 
        setInterval(load, 20000);
    </script>
</body>
</html>
