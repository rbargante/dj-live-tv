<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
    .logo { font-weight: 900; font-size: 18px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 11px; font-weight: 700; padding: 5px 10px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    /* BADGE */
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 10px; font-weight: 900; margin-bottom: 15px; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
    .is-live #statusBadge { border-color: #f52a1f; color: #f52a1f; }
    .is-live #statusDot { background: #f52a1f; box-shadow: 0 0 10px #f52a1f; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* PLAYER */
    .player-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; }
    .player-aspect iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
    #unmuteOverlay { position: absolute; bottom: 15px; right: 15px; z-index: 100; background: #f52a1f; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; }

    .section-title { text-align: center; margin: 40px 0 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    .grid-vids { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .card-v { background: #0a0a0a; border-radius: 10px; border: 1px solid #222; cursor: pointer; overflow: hidden; }
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 50px 1fr 100px 80px; padding: 12px 15px; border-bottom: 1px solid #111; align-items: center; gap: 10px; }
    .sch-row.live-now { background: rgba(245, 42, 31, 0.08); border-left: 4px solid #f52a1f; }
    .sch-dj-thumb { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
  </style>
</head>
<body id="bodyTag">
  <nav class="top-nav">
    <div class="nav-inner"><div class="logo">FLASHMIX.TV</div><div class="nav-links"><a href="#vids">Vídeos</a><a href="#djs">Equipa</a><a href="#schedule">Horário</a><a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a></div></div>
  </nav>

  <div class="container">
    <div style="text-align:center" id="badgeWrap"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">A SINCRONIZAR...</span></div></div>
    
    <div class="player-container">
      <div class="player-aspect">
        <iframe id="kickIframe" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
      </div>
      <button id="unmuteOverlay" onclick="unmutePlayer()">🔊 SOM</button>
    </div>

    <div id="vids"><h2 class="section-title">Últimos Sets</h2><div id="videoGrid" class="grid-vids"></div></div>
    <div id="secDjs"><h2 class="section-title" id="djs">Nossa Equipa</h2><div id="djGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;"></div></div>
    <div id="secSch"><h2 class="section-title" id="schedule">Broadcast Schedule</h2><div id="scheduleList" class="sch-container"></div></div>
  </div>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    
    function unmutePlayer() {
      document.getElementById('kickIframe').src = "https://player.kick.com/DJLIVETV?muted=false";
      document.getElementById('unmuteOverlay').style.display = 'none';
    }

    async function checkStatus() {
      const body = document.getElementById('bodyTag');
      const statusTxt = document.getElementById('statusText');
      
      try {
        // FORÇAMOS O WORKER A IGNORAR O CACHE COM UM TIMESTAMP ÚNICO (?t=...)
        const res = await fetch(`https://calm-violet-826b.ricardobargante.workers.dev/?t=${Date.now()}`, {
          cache: 'no-store',
          headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
        });
        const data = await res.json();
        
        // Se o livestream do Kick for NULL, o status TEM de ser OFFLINE
        if (data && data.livestream && data.livestream !== null) {
          body.classList.add('is-live');
          statusTxt.innerText = "LIVE NOW";
        } else {
          body.classList.remove('is-live');
          statusTxt.innerText = "OFFLINE";
          // Se o player estiver a "mentir", fazemos refresh apenas ao iframe
          const iframe = document.getElementById('kickIframe');
          if(body.dataset.lastState === "live") {
             iframe.src = iframe.src; 
          }
        }
        body.dataset.lastState = data.livestream ? "live" : "offline";
      } catch (e) {
        statusTxt.innerText = "OFFLINE";
      }
    }

    async function load() {
      checkStatus(); 
      setInterval(checkStatus, 10000); // Verifica a cada 10 seg com força total

      try {
        const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await rv.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0, 4).map(v => `<div class="card-v" onclick="window.open('${v.source}','_self')"><img src="${v.thumbnail.src}" style="width:100%"><h3 style="font-size:13px; padding:10px;">${v.session_title}</h3></div>`).join('');
      } catch(e) {}

      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      const djs = data?.djs || [];
      const sch = data?.schedule || [];

      document.getElementById('djGrid').innerHTML = djs.map(d => `<div class="card-dj" style="text-align:center"><img src="${d.img}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;"><h3>${d.name}</h3></div>`).join('');
      
      const hour = new Date().getHours();
      document.getElementById('scheduleList').innerHTML = sch.map(s => {
        const dj = djs.find(d => d.name === s.dj) || {img: ''};
        return `<div class="sch-row ${parseInt(s.time) === hour ? 'live-now' : ''}"><img src="${dj.img}" class="sch-dj-thumb"><div class="sch-name">${s.dj}</div><div class="sch-time">${s.time}</div></div>`;
      }).join('');
    }

    function toggleAdmin() { if(prompt("Senha:") === '1234') alert("Aceda ao Firebase."); }
    load();
  </script>
</body>
</html>
