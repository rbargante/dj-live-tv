<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
    .logo { padding: 30px; font-weight: 900; color: #f52a1f; letter-spacing: 3px; font-size: 24px; }
    
    /* CONTENTOR DO PLAYER (Sempre no mesmo sítio) */
    .player-box { 
      position: relative; width: 92%; max-width: 800px; margin: 0 auto; 
      border-radius: 20px; overflow: hidden; background: #080808; border: 1px solid #1a1a1a;
    }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    
    /* MENSAGEM QUE FICA POR TRÁS */
    #offline-status {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #333; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; z-index: 1;
    }

    /* O PLAYER EM SI */
    #player-inject { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; z-index: 10; }
    
    #unmuteBtn { 
      display: none; margin: 25px auto; background: #f52a1f; color: #fff; border: none; 
      padding: 15px 35px; border-radius: 50px; font-weight: 900; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="logo">FLASHMIX.TV</div>

  <div class="player-box">
    <div class="player-aspect" id="mainWrapper">
      <div id="offline-status">
        <div style="font-size: 40px; margin-bottom: 10px;">🔇</div>
        SINAL OFFLINE • DJ EM REPOUSO
      </div>
      <div id="player-target"></div>
    </div>
  </div>
  
  <button id="unmuteBtn" onclick="forceUnmute()">🔊 OUVIR EM DIRETO</button>

  <script>
    // O teu worker limpo
    const WORKER = "https://djlivetv.ricardobargante.workers.dev/";
    let isLive = null;

    async function updateSite() {
      try {
        const res = await fetch(`${WORKER}?t=${Date.now()}`, { cache: "no-store" });
        const data = await res.json();
        
        if (data.live !== isLive) {
          isLive = data.live;
          const target = document.getElementById('player-target');
          const btn = document.getElementById('unmuteBtn');

          if (data.live) {
            console.log("A INJETAR PLAYER...");
            // Injeta o iframe do zero
            target.innerHTML = `<iframe id="player-inject" src="https://player.kick.com/DJLIVETV?muted=true&autoplay=true" allowfullscreen></iframe>`;
            btn.style.display = 'block';
          } else {
            console.log("A REMOVER PLAYER (KILL SWITCH)...");
            // APAGA O PLAYER DO SITE. Ele não pode congelar se não existir!
            target.innerHTML = ""; 
            btn.style.display = 'none';
            // Pára qualquer carregamento pendente do browser
            window.stop();
          }
        }
      } catch (e) { console.log("Erro de Sync"); }
    }

    function forceUnmute() {
      const target = document.getElementById('player-target');
      // Recarrega o player com som
      target.innerHTML = `<iframe id="player-inject" src="https://player.kick.com/DJLIVETV?muted=false&autoplay=true" allowfullscreen></iframe>`;
      document.getElementById('unmuteBtn').style.display = 'none';
    }

    // Verifica a cada 4 segundos
    setInterval(updateSite, 4000);
    updateSite();
  </script>
</body>
</html>
