<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | MANAGER V36</title>
    <style>
        :root { --neon-red: #f52a1f; --neon-blue: #00ecff; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 80px; }

        .top-nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .admin-btn { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        .player-stage { width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #050505; border-radius: 30px; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: transparent; background: linear-gradient(#050505, #050505) padding-box, linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box; background-size: 200% 100%; animation: neonFlow 1.2s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        iframe { width: 100%; height: 100%; border: 0; display: none; }
        body.is-live iframe { display: block; }

        /* DASHBOARD MANAGER */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 25px; border-radius: 20px; }
        .dash-section { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--neon-red); }
        h3 { color: var(--neon-red); margin-top: 0; font-size: 14px; text-transform: uppercase; }
        
        label { display: block; font-size: 10px; color: #888; margin: 10px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; font-family: sans-serif; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .add-btn { flex: 2; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .update-btn { flex: 1; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; display: none; text-transform: uppercase; }
        
        /* ADMIN LIST ITEMS - MELHORADOS */
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 11px; border: 1px solid #222; }
        .item-data { display: flex; flex-direction: column; gap: 2px; }
        .item-data b { color: var(--neon-blue); font-size: 12px; }
        .item-data span { color: #fff; }
        .item-data i { color: #666; font-style: normal; font-size: 9px; }

        .ctrl-btns { display: flex; gap: 5px; }
        .ctrl-btns button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* PUBLIC UI */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 22px; margin: 40px 0 20px; border-left: 5px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; color: #fff; }
        .sch-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 120px 1fr 1fr 100px; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 45px; height: 45px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #333; }
        .tag { font-size: 9px; padding: 4px 8px; border-radius: 4px; text-align: center; font-weight: bold; }
        .tag-live { background: var(--neon-red); animation: blink 1s infinite; }
        .tag-next { border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        @keyframes blink { 50% { opacity: 0.5; } }

        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .dj-card { background: #080808; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #1a1a1a; }
        .dj-img-main { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 15px; background-size: cover; border: 3px solid #333; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <a onclick="toggleDash()" class="admin-btn">Manager Dashboard</a>
    </nav>

    <div class="player-stage">
        <iframe id="kick-player" src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <button onclick="toggleDash()" style="float:right; background:#333; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:5px;">CLOSE X</button>
            <h2 style="color:var(--neon-red)">STATION MANAGER</h2>

            <div class="dash-section">
                <h3>1. DJs DATABASE</h3>
                <label>DJ Name</label><input type="text" id="dj-name">
                <label>Music Style</label><input type="text" id="dj-style">
                <label>Photo URL</label><input type="text" id="dj-img">
                <div class="action-btns">
                    <button id="dj-add-btn" class="add-btn" onclick="saveItem('djs')">Add DJ Artist</button>
                    <button id="dj-update-btn" class="update-btn" onclick="pushUpdate('djs')">Update Artist</button>
                </div>
                <div id="admin-djs-list"></div>
            </div>

            <div class="dash-section">
                <h3>2. SCHEDULE / AGENDA</h3>
                <label>Select Day:</label>
                <select id="sch-day">
                    <option value="TODOS OS DIAS">TODOS OS DIAS</option>
                    <option value="MONDAY">MONDAY</option><option value="TUESDAY">TUESDAY</option><option value="WEDNESDAY">WEDNESDAY</option>
                    <option value="THURSDAY">THURSDAY</option><option value="FRIDAY">FRIDAY</option><option value="SATURDAY">SATURDAY</option><option value="SUNDAY">SUNDAY</option>
                </select>
                
                <label>Select UK Hour:</label>
                <select id="sch-time-drop"></select>

                <label>Select DJ Artist:</label>
                <select id="sch-dj-select"></select>
                
                <div class="action-btns">
                    <button id="sch-add-btn" class="add-btn" onclick="saveItem('schedule')">Add to Schedule</button>
                    <button id="sch-update-btn" class="update-btn" onclick="pushUpdate('schedule')">Update Schedule</button>
                </div>
                <div id="admin-sch-list"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="uk-time-display" style="text-align:right; font-size:10px; color:#444; margin-bottom:10px;">UK TIME SYNC: --:--</div>
        <div class="row-title">Weekly Schedule</div>
        <div id="pub-schedule" class="sch-box"></div>

        <div class="row-title">Resident DJs</div>
        <div id="pub-djs" class="dj-grid"></div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        let editingId = null;
        let djsCached = {};

        function fillHours() {
            const select = document.getElementById('sch-time-drop');
            let html = "";
            for(let i=0; i<24; i++) {
                let h = i < 10 ? '0'+i : i;
                html += `<option value="${h}:00">${h}:00</option><option value="${h}:30">${h}:30</option>`;
            }
            select.innerHTML = html;
        }

        function getUKTime() {
            const now = new Date();
            const ukTimeStr = now.toLocaleString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
            document.getElementById('uk-time-display').innerText = "UK TIME SYNC: " + ukTimeStr;
            return ukTimeStr;
        }

        async function load() {
            const r = await fetch(DB + ".json?t=" + Date.now());
            const data = await r.json() || {};
            djsCached = data.djs || {};
            
            if(data.is_live) document.body.classList.add('is-live');
            else document.body.classList.remove('is-live');

            const djEntries = Object.entries(djsCached);
            document.getElementById('sch-dj-select').innerHTML = djEntries.map(([id, d]) => `<option value="${d.name}">${d.name}</option>`).join('');

            document.getElementById('pub-djs').innerHTML = djEntries.map(([id, d]) => `
                <div class="dj-card">
                    <div class="dj-img-main" style="background-image:url('${d.img || ''}')"></div>
                    <div>${d.name}</div>
                    <div style="color:var(--neon-red); font-size:10px; margin-top:5px;">${d.style}</div>
                </div>`).join('');

            const schEntries = data.schedule ? Object.entries(data.schedule) : [];
            schEntries.sort((a, b) => a[1].time.localeCompare(b[1].time));

            document.getElementById('pub-schedule').innerHTML = schEntries.map(([id, s], index) => {
                const djData = Object.values(djsCached).find(d => d.name === s.info);
                const tag = index === 0 ? '<div class="tag tag-live">LIVE NOW</div>' : (index === 1 ? '<div class="tag tag-next">NEXT</div>' : '');
                return `
                    <div class="sch-row">
                        <div class="sch-photo" style="background-image:url('${djData ? djData.img : ''}')"></div>
                        <div style="color:var(--neon-red); font-weight:bold;">${s.day}</div>
                        <div style="font-size:14px;">${s.info}</div>
                        <div style="letter-spacing:2px;">${s.time}</div>
                        <div>${tag}</div>
                    </div>`;
            }).join('');

            renderAdmin(data);
        }

        function renderAdmin(data) {
            // ADMIN LIST DJs
            document.getElementById('admin-djs-list').innerHTML = Object.entries(data.djs || {}).map(([id, d]) => `
                <div class="admin-list-item">
                    <div class="item-data"><b>${d.name}</b><span>${d.style}</span></div>
                    <div class="ctrl-btns">
                        <button style="background:var(--neon-blue); color:#000" onclick="startEdit('djs','${id}',${JSON.stringify(d).replace(/"/g, '&quot;')})">EDIT</button>
                        <button style="background:#333; color:#fff" onclick="deleteItem('djs','${id}')">DEL</button>
                    </div>
                </div>`).join('');

            // ADMIN LIST SCHEDULE - AGORA MOSTRA HORA E DJ
            document.getElementById('admin-sch-list').innerHTML = Object.entries(data.schedule || {}).map(([id, s]) => `
                <div class="admin-list-item">
                    <div class="item-data"><b>${s.time} - ${s.info}</b><i>${s.day}</i></div>
                    <div class="ctrl-btns">
                        <button style="background:var(--neon-blue); color:#000" onclick="startEdit('schedule','${id}',${JSON.stringify(s).replace(/"/g, '&quot;')})">EDIT</button>
                        <button style="background:#333; color:#fff" onclick="deleteItem('schedule','${id}')">DEL</button>
                    </div>
                </div>`).join('');
        }

        async function saveItem(path) {
            const pass = prompt("Password:"); if(pass !== "1234") return;
            const item = path === 'djs' ? 
                { name: document.getElementById('dj-name').value, style: document.getElementById('dj-style').value, img: document.getElementById('dj-img').value } :
                { day: document.getElementById('sch-day').value, time: document.getElementById('sch-time-drop').value, info: document.getElementById('sch-dj-select').value };
            await fetch(`${DB}${path}.json`, { method: "POST", body: JSON.stringify(item) });
            load();
        }

        function startEdit(path, id, data) {
            editingId = id;
            if(path === 'djs') {
                document.getElementById('dj-name').value = data.name;
                document.getElementById('dj-style').value = data.style;
                document.getElementById('dj-img').value = data.img;
                document.getElementById('dj-add-btn').style.display = 'none';
                document.getElementById('dj-update-btn').style.display = 'block';
            } else {
                document.getElementById('sch-day').value = data.day;
                document.getElementById('sch-time-drop').value = data.time;
                document.getElementById('sch-dj-select').value = data.info;
                document.getElementById('sch-add-btn').style.display = 'none';
                document.getElementById('sch-update-btn').style.display = 'block';
            }
        }

        async function pushUpdate(path) {
            const pass = prompt("Password:"); if(pass !== "1234") return;
            const item = path === 'djs' ? 
                { name: document.getElementById('dj-name').value, style: document.getElementById('dj-style').value, img: document.getElementById('dj-img').value } :
                { day: document.getElementById('sch-day').value, time: document.getElementById('sch-time-drop').value, info: document.getElementById('sch-dj-select').value };
            await fetch(`${DB}${path}/${editingId}.json`, { method: "PATCH", body: JSON.stringify(item) });
            location.reload();
        }

        async function deleteItem(path, id) {
            if(!confirm("Delete?")) return;
            const pass = prompt("Password:"); if(pass !== "1234") return;
            await fetch(`${DB}${path}/${id}.json`, { method: "DELETE" });
            load();
        }

        function toggleDash() {
            const d = document.getElementById('dashboard');
            if (d.style.display === 'block') { d.style.display = 'none'; location.reload(); } 
            else { d.style.display = 'block'; }
        }

        fillHours();
        load();
        setInterval(getUKTime, 1000);
        setInterval(load, 15000);
    </script>
</body>
</html>
