<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | PRO STATION V51</title>
    <style>
        :root { --neon-red: #f52a1f; --neon-blue: #00ecff; --live-green: #28a745; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 140px; }

        /* --- NAVIGATION --- */
        .top-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #1a1a1a; padding: 15px 0; }
        .nav-content { max-width: 1100px; margin: 0 auto; display: flex; justify-content: center; align-items: center; gap: 25px; padding: 0 15px; }
        .main-menu { display: flex; gap: 20px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; align-items: center; }
        .main-menu a { color: #fff; text-decoration: none; cursor: pointer; }
        .admin-btn { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; text-transform: uppercase; }

        /* --- STATUS BADGE --- */
        .status-badge { width: fit-content; margin: 0 auto 15px; padding: 8px 20px; border-radius: 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        .badge-off { background: #333; color: #888; }
        .badge-on { background: var(--live-green); color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* --- PLAYER STAGE --- */
        .player-stage { width: 95%; max-width: 1200px; aspect-ratio: 16/9; background: #050505; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: var(--live-green); animation: borderBlink 1.5s infinite alternate; }
        @keyframes borderBlink { 0% { box-shadow: 0 0 15px var(--live-green); } 100% { box-shadow: 0 0 40px var(--live-green); } }
        #live-iframe { width: 100%; height: 100%; border: 0; display: none; position: relative; z-index: 10; }
        #offline-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #111; font-size: clamp(20px, 6vw, 40px); font-weight: 900; letter-spacing: 10px; text-transform: uppercase; z-index: 1; }

        /* --- BREAKING LIVE BAR --- */
        #breaking-live { display: none; background: var(--neon-red); color: #fff; padding: 15px; text-align: center; font-size: 14px; font-weight: 900; letter-spacing: 2px; border-radius: 10px; margin-bottom: 20px; animation: blinker 1s linear infinite; }
        body.is-live #breaking-live { display: block; }
        @keyframes blinker { 50% { opacity: 0.7; } }

        /* --- DASHBOARD --- */
        #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 35px; border: 1px solid var(--neon-red); width: 320px; text-align: center; }
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 25px; border-radius: 20px; }
        
        .dash-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .dash-nav button { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; color: #fff; text-transform: uppercase; font-size: 10px; border-radius: 5px; }
        
        .dash-section { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--neon-red); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; }
        .action-btn { width: 100%; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; }
        .edit-item { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; margin-bottom: 5px; border: 1px solid #222; font-size: 11px; }

        /* --- PUBLIC UI --- */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 22px; margin: 40px 0 20px; border-left: 5px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; }
        .sch-box { background: #080808; border: 1px solid #1a1a1a; border-radius: 15px; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 110px 1fr 1fr 100px; padding: 18px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 50px; height: 50px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #333; }
        .tag-live-now { background: var(--neon-red); color: #fff; padding: 5px 8px; font-size: 9px; font-weight: bold; text-align: center; border-radius: 4px; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .video-card { background: #080808; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .video-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <div class="nav-content">
            <div class="main-menu">
                <a href="#schedule">Schedule</a>
                <a href="#residents">Residents</a>
                <a href="#archive">Archive</a>
                <span onclick="document.getElementById('login-overlay').style.display='flex'" class="admin-btn">Manager Access</span>
            </div>
        </div>
    </nav>

    <div id="login-overlay">
        <div class="login-card">
            <h3>STAFF LOGIN</h3>
            <input type="text" id="user-f" placeholder="Username">
            <input type="password" id="pass-f" placeholder="Password">
            <button class="action-btn" onclick="checkLogin()">LOGIN</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="cursor:pointer; font-size:11px; color:#555; margin-top:20px;">CANCEL</p>
        </div>
    </div>

    <div id="live-badge" class="status-badge badge-off">STATION OFFLINE</div>

    <div class="player-stage">
        <div id="offline-msg">STATION OFFLINE</div>
        <iframe id="live-iframe" allowfullscreen></iframe>
    </div>

    <div class="container">
        <div id="uk-clock" style="text-align:right; font-size:11px; color:#444; margin-bottom:10px;">UK TIME SYNC: --:--</div>
        
        <div id="schedule" class="row-title">Weekly Schedule</div>
        <div id="breaking-live">🔴 LIVE NOW: BROADCASTING LIVE FROM CAMERA</div>
        <div id="pub-sch" class="sch-box"></div>
        
        <div id="residents" class="row-title">Flashmix Residents</div>
        <div id="pub-djs" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:20px;"></div>
        
        <div id="archive" class="row-title">Video Archive</div>
        <div id="pub-archive" class="video-grid"></div>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <div class="dash-nav">
                <button id="btn-on" onclick="setLive(true)" style="background:#28a745;">LIVE ON</button>
                <button id="btn-off" onclick="setLive(false)" style="background:#f52a1f;">LIVE OFF</button>
                <button onclick="location.reload()" style="background:var(--neon-blue); color:#000;">REFRESH/SAVE</button>
                <button onclick="document.getElementById('dashboard').style.display='none'" style="background:#333;">EXIT</button>
            </div>
            
            <div class="dash-section">
                <h3>1. DJs DATABASE</h3>
                <input type="text" id="dj-n" placeholder="DJ Name">
                <input type="text" id="dj-s" placeholder="Style">
                <input type="text" id="dj-i" placeholder="Photo URL">
                <button class="action-btn" onclick="addToDB('djs')">ADD TO DATABASE</button>
                <div id="adm-list-djs" style="margin-top:15px;"></div>
            </div>

            <div class="dash-section">
                <h3>2. SCHEDULE</h3>
                <select id="sch-t-drop"></select>
                <select id="sch-j-drop"></select>
                <button class="action-btn" onclick="addToDB('schedule')">ADD TO SCHEDULE</button>
                <div id="adm-list-sch" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        const KICK_STREAM = "https://player.kick.com/djlivetv?muted=false";

        // FUNÇÃO CORRIGIDA PARA ATUALIZAR STATUS E REAGIR NA HORA
        async function setLive(status) {
            try {
                await fetch(DB + ".json", { method: "PATCH", body: JSON.stringify({ is_live: status }) });
                // Reação imediata sem esperar pelo loop de 15 segundos
                updateUI(status);
            } catch (e) {
                console.error("Error setting live status:", e);
            }
        }

        function checkLogin() {
            if(document.getElementById('user-f').value === "admin" && document.getElementById('pass-f').value === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert("Error!"); }
        }

        // FUNÇÃO QUE CONTROLA O VISUAL LIVE/OFFLINE
        function updateUI(isLive) {
            const badge = document.getElementById('live-badge');
            const iframe = document.getElementById('live-iframe');
            
            if(isLive) {
                document.body.classList.add('is-live');
                badge.innerText = "LIVE NOW"; 
                badge.className = "status-badge badge-on";
                iframe.src = KICK_STREAM; 
                iframe.style.display = "block";
            } else {
                document.body.classList.remove('is-live');
                badge.innerText = "STATION OFFLINE"; 
                badge.className = "status-badge badge-off";
                iframe.src = ""; 
                iframe.style.display = "none";
            }
        }

        async function load() {
            const r = await fetch(DB + ".json?t=" + Date.now());
            const data = await r.json() || {};
            
            // Atualiza status inicial
            updateUI(data.is_live);

            // IDs e DJ Dropdowns
            const djsStore = data.djs || {};
            const djsList = Object.entries(djsStore);
            document.getElementById('sch-j-drop').innerHTML = djsList.map(([id, d]) => `<option value="${d.name}">${d.name}</option>`).join('');
            
            // Render DJs Público
            document.getElementById('pub-djs').innerHTML = djsList.map(([id, d]) => `
                <div style="background:#080808; padding:20px; border-radius:20px; border:1px solid #1a1a1a; text-align:center;">
                    <div style="width:80px; height:80px; background-image:url('${d.img}'); background-size:cover; border-radius:50%; margin:0 auto 10px; border:2px solid #333;"></div>
                    <div style="font-size:13px;">${d.name}</div>
                    <div style="color:red; font-size:9px; margin-top:5px;">${d.style || ''}</div>
                </div>`).join('');
            
            // Admin DJ List
            document.getElementById('adm-list-djs').innerHTML = djsList.map(([id, d]) => `
                <div class="edit-item">${d.name} <button onclick='delItem("djs","${id}")'>DEL</button></div>`).join('');

            // Agenda e Rotação Smart
            let sch = data.schedule ? Object.entries(data.schedule).map(([id, s]) => ({id, ...s})) : [];
            const timeNow = new Date().toLocaleTimeString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
            const minsNow = parseInt(timeNow.split(':')[0]) * 60 + parseInt(timeNow.split(':')[1]);
            
            sch.forEach(s => { s.mins = parseInt(s.time.split(':')[0]) * 60 + parseInt(s.time.split(':')[1]); });
            sch.sort((a,b) => a.mins - b.mins);
            
            let liveIdx = sch.findLastIndex(s => minsNow >= s.mins);
            if (liveIdx === -1 && sch.length > 0) liveIdx = 0;
            let rotated = sch.length > 0 ? [...sch.slice(liveIdx), ...sch.slice(0, liveIdx)] : [];
            
            document.getElementById('pub-sch').innerHTML = rotated.map((s, i) => {
                const dj = Object.values(djsStore).find(d => d.name === s.info);
                let tag = (i === 0) ? '<div class="tag-live-now">LIVE NOW</div>' : (i === 1 ? '<div style="color:#555; font-size:9px;">NEXT</div>' : '');
                return `<div class="sch-row">
                    <div class="sch-photo" style="background-image:url('${dj ? dj.img : ''}')"></div>
                    <div style="color:var(--neon-red); font-weight:bold;">EVERY DAY</div>
                    <div style="font-size:14px;">${s.info}</div>
                    <div>${s.time}</div><div>${tag}</div>
                </div>`;
            }).join('');

            document.getElementById('adm-list-sch').innerHTML = sch.map(s => `
                <div class="edit-item">${s.time} - ${s.info} <button onclick='delItem("schedule","${s.id}")'>DEL</button></div>`).join('');
            
            getArchive();
        }

        async function addToDB(p) {
            let item = p === 'djs' ? 
                { name: document.getElementById('dj-n').value, style: document.getElementById('dj-s').value, img: document.getElementById('dj-i').value } : 
                { day: "EVERY DAY", time: document.getElementById('sch-t-drop').value, info: document.getElementById('sch-j-drop').value };
            await fetch(`${DB}${p}.json`, { method: "POST", body: JSON.stringify(item) }); 
            load();
        }

        async function delItem(p, id) { if(confirm("Delete?")) { await fetch(`${DB}${p}/${id}.json`, { method: "DELETE" }); load(); } }
        
        async function getArchive() {
            try {
                const res = await fetch(`https://archive.org/advancedsearch.php?q=uploader%3A(ricardobargante%40live.com)&fl[]=identifier,title&sort[]=addeddate+desc&output=json`);
                const data = await res.json();
                document.getElementById('pub-archive').innerHTML = data.response.docs.map(i => `
                    <div class="video-card">
                        <div class="video-thumb" style="background-image:url('https://archive.org/services/img/${i.identifier}')" onclick="this.innerHTML='<iframe src=\'https://archive.org/embed/${i.identifier}?autoplay=1\' width=\'100%\' height=\'100%\' frameborder=\'0\'></iframe>'">
                            <div style="background:rgba(245,42,31,0.8); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;">▶</div>
                        </div>
                        <div style="padding:15px; font-size:11px;">${i.title}</div>
                    </div>`).join('');
            } catch(e) {}
        }

        // Horas Setup
        let opt = ""; for(let i=0; i<24; i++) { let hh = i<10?'0'+i:i; opt+=`<option value="${hh}:00">${hh}:00</option><option value="${hh}:30">${hh}:30</option>`; }
        document.getElementById('sch-t-drop').innerHTML = opt;

        setInterval(() => {
            const time = new Date().toLocaleTimeString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
            document.getElementById('uk-clock').innerText = "UK TIME SYNC: " + time;
        }, 1000);

        load();
        setInterval(load, 20000); 
    </script>
</body>
</html>
