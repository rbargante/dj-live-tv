<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | STATION CONTROL</title>
    <style>
        :root { --neon-red: #f52a1f; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 80px; }

        /* --- NAVIGATION --- */
        .top-nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .admin-btn { color: var(--neon-red) !important; border: 1px solid var(--neon-red); padding: 5px 15px; border-radius: 5px; }

        /* --- PLAYER --- */
        .player-stage { position: relative; width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #050505; border-radius: 30px; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; }
        body.is-live .player-stage { border-color: transparent; background: linear-gradient(#050505, #050505) padding-box, linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box; background-size: 200% 100%; animation: neonFlow 1.2s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        #player-content { width: 100%; height: 100%; display: none; }
        body.is-live #player-content { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* --- DASHBOARD MODAL --- */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 40px 20px; overflow-y: auto; }
        .dash-container { max-width: 700px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 30px; border-radius: 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 25px; padding-bottom: 15px; }
        .dash-section { margin-bottom: 25px; padding: 15px; background: #111; border-radius: 10px; }
        .dash-section h3 { margin: 0 0 15px 0; font-size: 12px; color: var(--neon-red); text-transform: uppercase; }
        
        label { display: block; font-size: 10px; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; font-family: sans-serif; }
        .save-btn { width: 100%; padding: 20px; background: var(--neon-red); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }

        /* --- SITE CONTENT --- */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 20px; letter-spacing: 4px; margin: 40px 0 20px; border-left: 5px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; }
        .sch-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        .sch-item { display: grid; grid-template-columns: 1fr 1fr 2fr; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 11px; }
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .dj-card { background: #080808; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #1a1a1a; }
        .dj-photo { width: 70px; height: 70px; background: #1a1a1a; border-radius: 50%; margin: 0 auto 10px; background-size: cover; border: 2px solid #333; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <div class="nav-links">
            <a onclick="location.reload()">Refresh</a>
            <a onclick="toggleDash()" class="admin-btn">EDIT STATION</a>
        </div>
    </nav>

    <div class="player-stage">
        <div id="player-content"></div>
        <div id="offline-msg" style="height:100%; display:flex; align-items:center; justify-content:center; color:#222; letter-spacing:10px;">OFFLINE</div>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <div class="dash-header">
                <h2 style="margin:0; font-size:18px;">DASHBOARD</h2>
                <button onclick="toggleDash()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
            </div>

            <div class="dash-section">
                <h3>Live Control</h3>
                <select id="f-live">
                    <option value="true">🔴 GO LIVE</option>
                    <option value="false">⚪ OFFLINE</option>
                </select>
            </div>

            <div class="dash-section">
                <h3>DJ Principal</h3>
                <label>Name</label><input type="text" id="f-dj0-name">
                <label>Style</label><input type="text" id="f-dj0-style">
                <label>Photo URL</label><input type="text" id="f-dj0-img">
            </div>

            <div class="dash-section">
                <h3>Schedule</h3>
                <label>Friday Time</label><input type="text" id="f-sch0-time">
                <label>Friday Info</label><input type="text" id="f-sch0-info">
            </div>

            <button class="save-btn" onclick="saveData()">SAVE & UPDATE SITE</button>
        </div>
    </div>

    <div class="container">
        <div class="row-title">Schedule</div>
        <div id="display-schedule" class="sch-box"></div>

        <div class="row-title">Residents</div>
        <div id="display-djs" class="dj-grid"></div>
    </div>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/.json";

        async function sync() {
            try {
                const res = await fetch(DB_URL + "?t=" + Date.now());
                const data = await res.json();
                
                // Update Live
                document.getElementById('app').className = data.is_live ? 'is-live' : '';
                document.getElementById('player-content').innerHTML = data.is_live ? `<iframe src="https://player.kick.com/djlivetv?muted=false"></iframe>` : "";

                // Update DJs (Public)
                if(data.djs) {
                    document.getElementById('display-djs').innerHTML = data.djs.map(d => `
                        <div class="dj-card">
                            <div class="dj-photo" style="background-image:url('${d.img || ''}')"></div>
                            <div style="font-size:12px;">${d.name || 'DJ'}</div>
                            <div style="font-size:9px; color:red;">${d.style || ''}</div>
                        </div>
                    `).join('');
                }

                // Update Schedule (Public)
                if(data.schedule) {
                    document.getElementById('display-schedule').innerHTML = data.schedule.map(s => `
                        <div class="sch-item"><div>${s.day || ''}</div><div>${s.time || ''}</div><div>${s.info || ''}</div></div>
                    `).join('');
                }

                // Fill Dashboard
                document.getElementById('f-live').value = data.is_live.toString();
                if(data.djs) {
                    document.getElementById('f-dj0-name').value = data.djs[0].name || "";
                    document.getElementById('f-dj0-style').value = data.djs[0].style || "";
                    document.getElementById('f-dj0-img').value = data.djs[0].img || "";
                }
                if(data.schedule) {
                    document.getElementById('f-sch0-time').value = data.schedule[0].time || "";
                    document.getElementById('f-sch0-info').value = data.schedule[0].info || "";
                }
            } catch (e) { console.error("Sync failed"); }
        }

        async function saveData() {
            const pass = prompt("Password:");
            if(pass !== "1234") return alert("Wrong!");

            const updated = {
                is_live: document.getElementById('f-live').value === "true",
                djs: [
                    { 
                        name: document.getElementById('f-dj0-name').value, 
                        style: document.getElementById('f-dj0-style').value,
                        img: document.getElementById('f-dj0-img').value
                    }
                ],
                schedule: [
                    { day: "FRIDAY", time: document.getElementById('f-sch0-time').value, info: document.getElementById('f-sch0-info').value }
                ]
            };

            await fetch(DB_URL, {
                method: "PATCH",
                body: JSON.stringify(updated)
            });

            alert("Site Updated!");
            toggleDash();
            sync();
        }

        function toggleDash() {
            const d = document.getElementById('dashboard');
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }

        sync();
        setInterval(sync, 10000);
    </script>
</body>
</html>
