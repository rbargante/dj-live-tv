<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASHMIX.TV | LIVE & ARCHIVE</title>
    <style>
        :root { --neon-red: #f52a1f; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        /* --- HEADER WHITE --- */
        .main-header { 
            padding: 20px; font-weight: 900; color: #ffffff; 
            letter-spacing: 10px; font-size: clamp(26px, 6vw, 45px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* --- MAIN LIVE PLAYER (KICK) --- */
        .player-stage {
            position: relative; width: 98%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 30px; 
            border: 5px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(245, 42, 31, 0.2); 
            overflow: hidden; margin-bottom: 20px;
        }

        body.is-live .player-stage {
            border-color: transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.2s linear infinite;
            box-shadow: 0 0 60px rgba(245, 42, 31, 0.6);
        }

        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        #player-content { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #player-content { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* STANDBY UI */
        #standby-ui {
            position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .dot { width: 18px; height: 18px; background: var(--neon-red); border-radius: 50%; box-shadow: 0 0 15px var(--neon-red); animation: blink 1s infinite; margin-bottom: 10px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .offline-tag { font-size: 25px; letter-spacing: 5px; color: #fff; font-weight: 900; }

        /* --- ARCHIVE EMBEDDED LIST --- */
        .container { width: 98%; max-width: 1100px; }
        .row-title { color: var(--neon-red); font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin: 40px 0 20px 0; border-left: 6px solid var(--neon-red); padding-left: 15px; }

        .archive-list-wrapper {
            width: 100%; background: #080808; border-radius: 20px; 
            border: 1px solid #1a1a1a; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* --- DJ LINEUP --- */
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin: 40px 0 60px 0; }
        .dj-card { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; padding: 20px; text-align: center; }
        .dj-pic { width: 60px; height: 60px; background: #1a1a1a; border-radius: 50%; margin: 0 auto 10px; border: 1px solid #333; }
        .dj-card h3 { margin: 0; font-size: 11px; color: #fff; letter-spacing: 1px; }

        #unmuteBtn { display: none; margin: 0 auto 20px auto; background: var(--neon-red); color: #fff; border: none; padding: 15px 40px; border-radius: 100px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        body.is-live #unmuteBtn { display: block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-stage">
        <div id="standby-ui">
            <div style="font-size: clamp(30px, 10vw, 65px); letter-spacing: 12px; margin-bottom: 15px; text-align:center;">FLASHMIX</div>
            <div class="dot"></div>
            <span class="offline-tag">OFFLINE</span>
        </div>
        <div id="player-content"></div>
    </div>

    <button id="unmuteBtn" onclick="enableAudio()">🔊 UNMUTE LIVE</button>

    <div class="container">
        
        <div class="row-title">Flashmix Video Library</div>
        <div class="archive-list-wrapper">
            <iframe src="https://archive.org/embed/?query=uploader%3A%28ricardo-dj-tv%40live.com%29&sort=-publicdate&output=embed" 
                    width="100%" height="600" frameborder="0" webkitallowfullscreen="true" mozallowfullscreen="true" allowfullscreen></iframe>
        </div>

        <div class="row-title">Flashmix Residents</div>
        <div class="dj-grid">
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ BARGANTE</h3></div>
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ GUEST 01</h3></div>
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ GUEST 02</h3></div>
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ GUEST 03</h3></div>
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ GUEST 04</h3></div>
            <div class="dj-card"><div class="dj-pic"></div><h3>DJ GUEST 05</h3></div>
        </div>

    </div>

    <script>
        const FIREBASE = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let currentStatus = null;

        async function syncLive() {
            try {
                const r = await fetch(`${FIREBASE}?t=${Date.now()}`);
                const isLive = await r.json();
                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-content');
                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=true" allowfullscreen></iframe>`;
                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = "";
                    }
                }
            } catch (e) {}
        }

        function enableAudio() {
            document.getElementById('player-content').innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>`;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        setInterval(syncLive, 4000);
        syncLive();
    </script>
</body>
</html>
