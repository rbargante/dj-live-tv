<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    
    /* NAV RESPONSIVA */
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
    .logo { font-weight: 900; font-size: 18px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 11px; font-weight: 700; padding: 5px 10px; text-transform: uppercase; }

    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    /* STATUS BADGE */
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 10px; font-weight: 900; margin-bottom: 15px; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }

    /* PLAYER COMPATÍVEL MOBILE */
    .player-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; }
    .player-aspect iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* BOTÃO SOM MOBILE */
    #unmuteOverlay { position: absolute; bottom: 15px; right: 15px; z-index: 100; background: #f52a1f; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px; }

    .section-title { text-align: center; margin: 40px 0 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    
    /* EQUIPA RESPONSIVA */
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .card-dj { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; padding: 12px; text-align: center; }
    .card-dj img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin-bottom: 8px; }
    .card-dj h3 { font-size: 13px; margin: 5px 0; }
    .card-dj p { font-size: 9px; color: #f52a1f; font-weight: 800; text-transform: uppercase; }

    /* SCHEDULE ORDEM: FOTO | NOME | DIA | HORA */
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 50px 1fr 80px 70px; padding: 12px 15px; border-bottom: 1px solid #111; align-items: center; gap: 10px; }
    .sch-row.live-now { background: rgba(245, 42, 31, 0.08); }
    .sch-dj-thumb { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #222; }
    .sch-name { font-weight: 800; font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sch-day { color: #666; font-size: 9px; text-transform: uppercase; font-weight: 700; }
    .sch-time { font-family: monospace; font-size: 13px; font-weight: bold; color: #888; text-align: right; }
    
    .live-now .sch-time { color: #f52a1f; }
    .live-now .sch-dj-thumb { border-color: #f52a1f; box-shadow: 0 0 10px rgba(245, 42, 31, 0.3); }

    /* ADMIN MOBILE FRIENDLY */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 15px; margin-top: 40px; display: none; }
    .admin-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
    .admin-input, select { width: 100%; padding: 10px; margin: 4px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    .btn-publish { background: #28a745; color: #fff; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; margin-top: 15px; }
    .edit-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 5px; margin-bottom: 10px; }
    .sch-edit-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 5px; margin-bottom: 5px; }

    @media (max-width: 600px) {
        .sch-row { grid-template-columns: 40px 1fr 60px; }
        .sch-day { display: none; } /* Esconde o dia no mobile muito pequeno para não apertar */
        .logo { font-size: 16px; }
        .section-title { font-size: 18px; }
    }

    footer { padding: 30px; text-align: center; color: #333; font-size: 10px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:center"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div></div>
    
    <div class="player-container">
      <div class="player-aspect">
        <iframe id="kickIframe" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
      </div>
      <button id="unmuteOverlay" onclick="unmutePlayer()">🔊 ATIVAR SOM</button>
    </div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossa Equipa</h2>
      <div id="djGrid" class="grid-djs"></div>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Broadcast Schedule</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center; font-size: 16px;">COMANDO CLOUD</h2>
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Senha">
        <button onclick="login()" class="admin-input" style="background:#f52a1f; color:white; font-weight:bold;">ENTRAR</button>
      </div>
      <div id="dashBox" style="display:none">
        <div class="admin-card">
          <h3>Equipa</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; cursor:pointer">+ DJ</button>
        </div>
        <div class="admin-card">
          <h3>Horário</h3>
          <div id="adminSchList"></div>
          <button onclick="addNewSchField()" class="admin-input" style="background:#222; cursor:pointer">+ Entrada</button>
        </div>
        <button class="btn-publish" onclick="saveAll()">☁️ PUBLICAR E SAIR</button>
        <button onclick="location.reload()" class="admin-input" style="background:#333; cursor:pointer; margin-top:10px;">CANCELAR</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    const daysArr = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo", "Todos os dias"];
    const hoursArr = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);

    let currentDjs = [];
    let currentSch = [];

    function unmutePlayer() {
        const frame = document.getElementById('kickIframe');
        frame.src = "https://player.kick.com/DJLIVETV?muted=false";
        document.getElementById('unmuteOverlay').style.display = 'none';
    }

    async function load() {
      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      currentDjs = data?.djs || [{name:"Admin", img:"https://via.placeholder.com/150", style:"House"}];
      currentSch = Array.isArray(data?.schedule) ? data.schedule : [];
      renderSite();
      if(document.getElementById('dashBox').style.display === 'block') renderAdmin();
    }

    function renderSite() {
      document.getElementById('djGrid').innerHTML = currentDjs.map(d => `
        <div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');

      const now = new Date();
      const currentHour = now.getHours();
      
      let sortedSch = [...currentSch].sort((a, b) => {
          const hA = parseInt(a.time); const hB = parseInt(b.time);
          if (hA === currentHour) return -1;
          if (hB === currentHour) return 1;
          return hA - hB;
      });

      document.getElementById('scheduleList').innerHTML = sortedSch.map((s, i) => {
        const djData = currentDjs.find(d => d.name === s.dj) || {img: 'https://via.placeholder.com/150'};
        const isLive = parseInt(s.time) === currentHour;
        return `
          <div class="sch-row ${isLive ? 'live-now' : ''}">
            <img src="${djData.img}" class="sch-dj-thumb">
            <div class="sch-name">${s.dj}</div>
            <div class="sch-day">${s.day}</div>
            <div class="sch-time">${s.time}</div>
          </div>`;
      }).join('');
    }

    function renderAdmin() {
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `
        <div class="edit-row">
          <input class="admin-input" value="${d.name}" oninput="currentDjs[${i}].name=this.value; renderAdmin()">
          <input class="admin-input" value="${d.img}" oninput="currentDjs[${i}].img=this.value">
          <button onclick="currentDjs.splice(${i},1);renderAdmin()" style="background:none; border:none; color:red; cursor:pointer;">X</button>
        </div>`).join('');

      document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `
        <div class="sch-edit-row">
          <select onchange="currentSch[${i}].dj=this.value">
            <option>DJ</option>
            ${currentDjs.map(dj => `<option ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}
          </select>
          <select onchange="currentSch[${i}].time=this.value">${hoursArr.map(h=>(`<option ${s.time==h?'selected':''}>${h}</option>`)).join('')}</select>
          <button onclick="currentSch.splice(${i},1);renderAdmin()" style="background:none; border:none; color:red; cursor:pointer;">X</button>
        </div>`).join('');
    }

    function addNewDjField() { currentDjs.push({name:'', img:'', style:''}); renderAdmin(); }
    function addNewSchField() { currentSch.push({dj:'', day:'Todos os dias', time:'22:00', info:''}); renderAdmin(); }

    async function saveAll() {
      await fetch(DB + ".json", { 
        method: 'PUT', 
        body: JSON.stringify({djs: currentDjs.filter(d=>d.name), schedule: currentSch}) 
      });
      alert("✅ PUBLICADO!");
      location.reload();
    }

    function login() { 
      if(document.getElementById('pass').value==='1234'){ 
        document.getElementById('loginBox').style.display='none'; 
        document.getElementById('dashBox').style.display='block'; 
        renderAdmin(); 
      } 
    }
    
    function toggleAdmin() { 
      const a = document.getElementById('adminArea'); 
      a.style.display = a.style.display==='block'?'none':'block'; 
      a.scrollIntoView(); 
    }

    load();
  </script>
</body>
</html>
