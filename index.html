<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .player {
      position: relative;
      padding-top: 56.25%;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .player iframe,
    .player video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: black;
    }

    .controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .control-btn {
      background: rgba(0,0,0,0.7);
      color: white;
      border: 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .live-btn {
      background: red;
      color: white;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px 0;
    }

    .card {
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #111;
    }

    .card p {
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>DJ LIVE TV</h1>

  <div class="player" id="playerWrap">
    <iframe
      id="livePlayer"
      src="https://player.kick.com/DJLIVETV"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

    <div class="controls">
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn" style="display:none;">🔴 LIVE</button>
    </div>
  </div>

  <h2 style="margin-top:40px;">REPLAYS</h2>
  <div id="videos" class="grid"></div>

</div>

<script>
let hls = null;

/* FULLSCREEN MELHORADO */
function requestPlayerFullscreen() {
  const video = document.getElementById("replayVideo");
  const wrap = document.getElementById("playerWrap");

  if (video) {
    if (video.requestFullscreen) {
      video.requestFullscreen();
    } else if (video.webkitEnterFullscreen) {
      video.webkitEnterFullscreen(); // iPhone melhor
    } else if (video.webkitRequestFullscreen) {
      video.webkitRequestFullscreen();
    }
    return;
  }

  if (wrap.requestFullscreen) {
    wrap.requestFullscreen();
  } else if (wrap.webkitRequestFullscreen) {
    wrap.webkitRequestFullscreen();
  }
}

/* PARAR TUDO */
function stopEverything() {
  if (hls) {
    hls.destroy();
    hls = null;
  }

  const wrap = document.getElementById("playerWrap");

  const iframe = wrap.querySelector("iframe");
  if (iframe) {
    iframe.src = "about:blank"; // corta som live
  }

  const video = wrap.querySelector("video");
  if (video) {
    video.pause();
    video.removeAttribute("src");
    video.load();
  }

  wrap.innerHTML = "";
}

/* CONTROLOS */
function attachControls() {
  const fs = document.getElementById("fullscreenBtn");
  if (fs) fs.onclick = requestPlayerFullscreen;

  const liveBtn = document.getElementById("backLiveBtn");
  if (liveBtn) liveBtn.onclick = loadLive;
}

/* LOAD LIVE */
function loadLive() {
  stopEverything();

  const wrap = document.getElementById("playerWrap");

  wrap.innerHTML = `
    <iframe
      id="livePlayer"
      src="https://player.kick.com/DJLIVETV"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

    <div class="controls">
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn" style="display:none;">🔴 LIVE</button>
    </div>
  `;

  attachControls();
}

/* LOAD REPLAY */
function loadReplay(url) {
  stopEverything();

  const wrap = document.getElementById("playerWrap");

  wrap.innerHTML = `
    <video id="replayVideo" controls autoplay playsinline></video>

    <div class="controls">
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn">🔴 LIVE</button>
    </div>
  `;

  const video = document.getElementById("replayVideo");

  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
  } else if (window.Hls && Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }

  attachControls();
}

/* LOAD VIDEOS */
async function loadVideos() {
  const container = document.getElementById("videos");

  try {
    const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
    const data = await res.json();

    data.forEach(v => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${v.thumbnail?.src || ''}">
        <p>${v.session_title || 'DJ Set'}</p>
      `;

      card.onclick = () => loadReplay(v.source);
      container.appendChild(card);
    });

  } catch {
    container.innerHTML = "Error loading videos";
  }
}

attachControls();
loadVideos();
</script>

</body>
</html>
