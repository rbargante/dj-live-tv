<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | PRO STATION V97</title>
    <style>
        :root { 
            --neon-red: #f52a1f; 
            --neon-blue: #00ecff; 
            --live-green: #28a745; 
            --bg-color: #000;
            --accent-color: var(--neon-red);
        }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg-color); color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 140px; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- NAV --- */
        .top-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #1a1a1a; padding: 15px 0; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
        .logo-circle { background: var(--accent-color); padding: 5px 12px; border-radius: 5px; font-weight: 900; }
        .main-menu { display: flex; gap: 20px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; align-items: center; }
        .admin-btn { color: var(--accent-color); border: 1px solid var(--accent-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* --- PLAYER --- */
        .player-stage { width: 95%; max-width: 1200px; aspect-ratio: 16/9; background: #050505; border: 5px solid var(--accent-color); margin: 0 auto 10px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: var(--live-green); box-shadow: 0 0 20px rgba(40, 167, 69, 0.3); }
        iframe { width: 100%; height: 100%; border: 0; display: none; position: relative; z-index: 5; }
        body.is-live iframe { display: block; }

        /* CONTROLES DE SOM */
        .mobile-controls { width: 95%; max-width: 1200px; margin: 0 auto 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .sound-btn { background: #ffc107; color: #000; border: none; padding: 18px 40px; border-radius: 50px; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,193,7,0.4); display: none; animation: pulse 2s infinite; }
        body.is-live .sound-btn { display: block; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- SCHEDULE --- */
        .sch-box { background: #080808; border: 1px solid #1a1a1a; border-radius: 15px; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 110px 1fr 1fr 100px; padding: 18px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 50px; height: 50px; border-radius: 8px; background-size: cover; background-position: center; border: 2px solid #333; }

        /* --- ADMIN DASHBOARD --- */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 20px; border-radius: 20px; }
        .dash-section { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .action-btn { width: 100%; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .status-badge { width: fit-content; padding: 8px 20px; border-radius: 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin: 0 auto 15px; }
        .badge-on { background: var(--live-green); color: #fff; }
        .badge-off { background: #333; color: #777; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <div class="nav-content">
            <a href="#" class="brand"><div class="logo-circle">F</div><div style="font-size: 18px; font-weight: 900;">FLASHMIX.TV</div></a>
            <div class="main-menu">
                <span onclick="document.getElementById('login-overlay').style.display='flex'" class="admin-btn">STAFF</span>
            </div>
        </div>
    </nav>

    <div id="login-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background:#111; padding:30px; border:1px solid var(--neon-red); width:300px; text-align:center;">
            <h3>ADMIN LOGIN</h3>
            <input type="text" id="user-f" placeholder="User">
            <input type="password" id="pass-f" placeholder="Pass">
            <button onclick="checkLogin()" class="action-btn">ENTRAR</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="cursor:pointer; margin-top:15px; font-size:10px;">FECHAR</p>
        </div>
    </div>

    <div id="live-badge" class="status-badge badge-off">STATION OFFLINE</div>

    <div class="player-stage">
        <div id="offline-msg" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #111; font-size: 30px; font-weight: 900;">OFFLINE</div>
        <iframe id="kick-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="mobile-controls">
        <button class="sound-btn" onclick="activateSound()">🔊 CLICA AQUI PARA O SOM</button>
        <button style="background:none; border:none; color:#444; font-size:10px; cursor:pointer;" onclick="location.reload(true)">Recarregar Página</button>
    </div>

    <div id="station-news-display" style="text-align:center; padding:20px; color:var(--neon-blue); font-size:12px;"></div>

    <div class="container" style="width: 95%; max-width: 1100px; margin: 0 auto; flex: 1;">
        <div id="schedule" style="font-size: 18px; margin: 20px 0; border-left: 4px solid var(--neon-red); padding-left: 10px;">SCHEDULE</div>
        <div id="pub-sch" class="sch-box"></div>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <h2 style="text-align:center; color:red;">ADMIN PANEL</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="setLive(true)" style="flex:1; background:green; color:#fff; padding:15px; border:none; font-weight:bold;">LIVE ON</button>
                <button onclick="setLive(false)" style="flex:1; background:red; color:#fff; padding:15px; border:none; font-weight:bold;">LIVE OFF</button>
            </div>

            <div class="dash-section">
                <h3>News</h3>
                <textarea id="adm-news" rows="2"></textarea>
                <button onclick="saveNews()" class="action-btn" style="background:blue;">SAVE NEWS</button>
            </div>

            <div class="dash-section">
                <h3>DJs</h3>
                <input type="text" id="dj-n" placeholder="Name">
                <input type="text" id="dj-s" placeholder="Style">
                <input type="text" id="dj-i" placeholder="Image URL">
                <button onclick="addToDB('djs')" class="action-btn">ADD DJ</button>
                <div id="adm-list-djs" style="margin-top:10px;"></div>
            </div>
            
            <button onclick="location.reload()" class="action-btn" style="background:#333; margin-top:20px;">SAIR DO ADMIN</button>
        </div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        const KICK_URL = "https://player.kick.com/djlivetv";
        let stationIsLive = false;

        // FUNÇÃO CRÍTICA DE SOM
        function activateSound() {
            const iframe = document.getElementById('kick-iframe');
            if(stationIsLive) {
                // Força o reload do iframe com o mute desligado após interação do user
                iframe.src = KICK_URL + "?muted=false&autoplay=true&t=" + Date.now();
                const sBtn = document.querySelector('.sound-btn');
                sBtn.innerText = "✅ SOM ACTIVADO";
                sBtn.style.background = "#28a745";
            }
        }

        function checkLogin() {
            if(document.getElementById('user-f').value === "admin" && document.getElementById('pass-f').value === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                load();
            }
        }

        async function setLive(st) { await fetch(DB + ".json", { method: "PATCH", body: JSON.stringify({ is_live: st }) }); load(); }
        async function saveNews() { const t = document.getElementById('adm-news').value; await fetch(DB + "news.json", { method: "PUT", body: JSON.stringify(t) }); load(); }
        async function addToDB(p) {
            let item = { name: document.getElementById('dj-n').value, style: document.getElementById('dj-s').value, img: document.getElementById('dj-i').value };
            await fetch(DB + p + ".json", { method: "POST", body: JSON.stringify(item) });
            load();
        }

        async function load() {
            const r = await fetch(DB + ".json?t=" + Date.now());
            const data = await r.json() || {};
            
            const oldLive = stationIsLive;
            stationIsLive = data.is_live;
            const iframe = document.getElementById('kick-iframe');
            
            if(stationIsLive && !oldLive) {
                // Primeira carga em mute para permitir o autoplay visual
                iframe.src = KICK_URL + "?muted=true&autoplay=true";
            } else if(!stationIsLive) {
                iframe.src = "about:blank";
            }

            document.getElementById('station-news-display').innerText = data.news || "";
            const badge = document.getElementById('live-badge');
            if(stationIsLive) { document.body.classList.add('is-live'); badge.innerText = "LIVE NOW"; badge.className = "status-badge badge-on"; }
            else { document.body.classList.remove('is-live'); badge.innerText = "OFFLINE"; badge.className = "status-badge badge-off"; }

            // Render DJ List in Admin
            const djsStore = data.djs || {};
            document.getElementById('adm-list-djs').innerHTML = Object.entries(djsStore).map(([id, d]) => `
                <div style="display:flex; justify-content:space-between; background:#000; padding:10px; margin-bottom:5px; font-size:12px;">
                    <span>${d.name}</span>
                    <button onclick="delItem('${id}')" style="color:red; background:none; border:none; cursor:pointer;">DEL</button>
                </div>
            `).join('');
        }

        async function delItem(id) { if(confirm("Apagar?")) { await fetch(DB + "djs/" + id + ".json", { method: "DELETE" }); load(); } }

        load(); 
        setInterval(load, 30000); // Check live status every 30s
    </script>
</body>
</html>
