<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | INTERNATIONAL STATION</title>
    <style>
        :root { --neon-red: #f52a1f; --neon-blue: #00ecff; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 80px; }

        /* --- NAVIGATION --- */
        .top-nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .admin-btn { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- PLAYER STAGE --- */
        .player-stage { width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #050505; border-radius: 30px; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: transparent; background: linear-gradient(#050505, #050505) padding-box, linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box; background-size: 200% 100%; animation: neonFlow 1.2s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        iframe { width: 100%; height: 100%; border: 0; display: none; }
        body.is-live iframe { display: block; }

        /* --- LOGIN & DASHBOARD (ALL ENGLISH) --- */
        #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 35px; border-radius: 20px; border: 1px solid var(--neon-red); width: 300px; text-align: center; }
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 25px; border-radius: 20px; }
        .dash-section { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--neon-red); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; font-family: sans-serif; }
        .save-btn { width: 100%; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .edit-item { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #222; font-size: 11px; }

        /* --- PUBLIC UI --- */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 22px; margin: 40px 0 20px; border-left: 5px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .sch-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 110px 1fr 1fr 100px; padding: 18px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 48px; height: 48px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #333; }
        .tag { font-size: 9px; padding: 4px 8px; border-radius: 4px; text-align: center; font-weight: bold; }
        .tag-live { background: var(--neon-red); color: #fff; animation: blink 1s infinite; }
        .tag-next { border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .dj-card { background: #080808; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #1a1a1a; }
        .dj-img-main { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 15px; background-size: cover; background-position: center; border: 3px solid #333; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <a onclick="document.getElementById('login-overlay').style.display='flex'" class="admin-btn">Manager Access</a>
    </nav>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="color:#fff; margin-bottom:20px; letter-spacing:2px;">STAFF LOGIN</h3>
            <input type="text" id="user-f" placeholder="Username" autocomplete="off">
            <input type="password" id="pass-f" placeholder="Password" autocomplete="off">
            <button class="save-btn" onclick="checkLogin()">LOGIN</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="cursor:pointer; font-size:11px; color:#555; margin-top:20px;">CANCEL</p>
        </div>
    </div>

    <div class="player-stage">
        <iframe id="kick-player" src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <button onclick="location.reload()" style="float:right; background:#333; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:5px; font-weight:bold;">SAVE & EXIT</button>
            <h2 style="color:var(--neon-red); letter-spacing:2px;">STATION DASHBOARD</h2>

            <div class="dash-section">
                <h3>1. DJs DATABASE</h3>
                <input type="text" id="dj-n" placeholder="DJ Name">
                <input type="text" id="dj-s" placeholder="Music Style">
                <input type="text" id="dj-i" placeholder="Photo URL Link">
                <button id="add-dj-btn" class="save-btn" onclick="addToDB('djs')">ADD TO DATABASE</button>
                <button id="up-dj-btn" class="save-btn" style="display:none; background:#fff; color:#000" onclick="pushEdit('djs')">SAVE CHANGES</button>
                <div id="adm-list-djs" style="margin-top:15px;"></div>
            </div>

            <div class="dash-section">
                <h3>2. SCHEDULE MANAGER</h3>
                <select id="sch-d">
                    <option value="EVERY DAY">EVERY DAY</option>
                    <option>MONDAY</option><option>TUESDAY</option><option>WEDNESDAY</option>
                    <option>THURSDAY</option><option>FRIDAY</option><option>SATURDAY</option><option>SUNDAY</option>
                </select>
                <select id="sch-t-drop"></select>
                <select id="sch-j-drop"></select>
                <button id="add-sch-btn" class="save-btn" onclick="addToDB('schedule')">ADD TO SCHEDULE</button>
                <button id="up-sch-btn" class="save-btn" style="display:none; background:#fff; color:#000" onclick="pushEdit('schedule')">SAVE CHANGES</button>
                <div id="adm-list-sch" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="uk-clock" style="text-align:right; font-size:11px; color:#444; margin-bottom:10px;">UK TIME SYNC: --:--</div>
        
        <div class="row-title">Weekly Schedule</div>
        <div id="pub-sch" class="sch-box"></div>
        
        <div class="row-title">Residents</div>
        <div id="pub-djs" class="dj-grid"></div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        let activeId = null;
        let djsStore = {};

        function getUK() {
            const time = new Date().toLocaleTimeString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
            document.getElementById('uk-clock').innerText = "UK TIME SYNC: " + time;
            return time;
        }

        function checkLogin() {
            const u = document.getElementById('user-f').value.trim().toLowerCase();
            const p = document.getElementById('pass-f').value.trim();
            if(u === "admin" && p === "1234") { 
                document.getElementById('login-overlay').style.display='none'; 
                document.getElementById('dashboard').style.display='block'; 
            } else { alert("Access Denied"); }
        }

        async function load() {
            const r = await fetch(DB + ".json?t=" + Date.now());
            const data = await r.json() || {};
            djsStore = data.djs || {};
            const timeNow = getUK();
            const minsNow = parseInt(timeNow.split(':')[0]) * 60 + parseInt(timeNow.split(':')[1]);

            if(data.is_live) document.body.classList.add('is-live'); else document.body.classList.remove('is-live');

            const djList = Object.entries(djsStore);
            document.getElementById('sch-j-drop').innerHTML = djList.map(([id, d]) => `<option value="${d.name}">${d.name}</option>`).join('');
            
            document.getElementById('pub-djs').innerHTML = djList.map(([id, d]) => `
                <div class="dj-card">
                    <div class="dj-img-main" style="background-image:url('${d.img}')"></div>
                    <div style="font-size:14px;">${d.name}</div>
                    <div style="color:var(--neon-red); font-size:10px; margin-top:5px;">${d.style}</div>
                </div>`).join('');

            // --- SMART ROTATION LOGIC ---
            let sch = data.schedule ? Object.entries(data.schedule).map(([id, s]) => ({id, ...s})) : [];
            sch.forEach(s => { s.mins = parseInt(s.time.split(':')[0]) * 60 + parseInt(s.time.split(':')[1]); });
            sch.sort((a,b) => a.mins - b.mins);

            let liveIdx = sch.findLastIndex(s => minsNow >= s.mins);
            if (liveIdx === -1 && sch.length > 0) liveIdx = 0;

            let rotated = sch.length > 0 ? [...sch.slice(liveIdx), ...sch.slice(0, liveIdx)] : [];

            document.getElementById('pub-sch').innerHTML = rotated.map((s, i) => {
                const dj = Object.values(djsStore).find(d => d.name === s.info);
                let tag = (i === 0) ? '<div class="tag tag-live">LIVE NOW</div>' : (i === 1 ? '<div class="tag tag-next">NEXT</div>' : '');
                return `<div class="sch-row">
                    <div class="sch-photo" style="background-image:url('${dj ? dj.img : ''}')"></div>
                    <div style="color:var(--neon-red); font-weight:bold;">${s.day}</div>
                    <div style="font-size:14px;">${s.info}</div>
                    <div style="letter-spacing:1px;">${s.time}</div>
                    <div>${tag}</div>
                </div>`;
            }).join('');

            // Admin Lists
            document.getElementById('adm-list-djs').innerHTML = djList.map(([id, d]) => `<div class="edit-item"><b>${d.name}</b><div><button onclick="editItem('djs','${id}',${JSON.stringify(d).replace(/"/g, '&quot;')})">EDIT</button><button onclick="delItem('djs','${id}')">DEL</button></div></div>`).join('');
            document.getElementById('adm-list-sch').innerHTML = sch.map(s => `<div class="edit-item"><b>${s.time} - ${s.info}</b><div><button onclick="editItem('schedule','${s.id}',${JSON.stringify(s).replace(/"/g, '&quot;')})">EDIT</button><button onclick="delItem('schedule','${s.id}')">DEL</button></div></div>`).join('');
        }

        async function addToDB(p) {
            const item = p === 'djs' ? { name: document.getElementById('dj-n').value, style: document.getElementById('dj-s').value, img: document.getElementById('dj-i').value } : { day: document.getElementById('sch-d').value, time: document.getElementById('sch-t-drop').value, info: document.getElementById('sch-j-drop').value };
            await fetch(`${DB}${p}.json`, { method: "POST", body: JSON.stringify(item) }); load();
        }

        function editItem(p, id, d) {
            activeId = id;
            if(p === 'djs') {
                document.getElementById('dj-n').value = d.name; document.getElementById('dj-s').value = d.style; document.getElementById('dj-i').value = d.img;
                document.getElementById('add-dj-btn').style.display='none'; document.getElementById('up-dj-btn').style.display='block';
            } else {
                document.getElementById('sch-d').value = d.day; document.getElementById('sch-t-drop').value = d.time; document.getElementById('sch-j-drop').value = d.info;
                document.getElementById('add-sch-btn').style.display='none'; document.getElementById('up-sch-btn').style.display='block';
            }
        }

        async function pushEdit(p) {
            const item = p === 'djs' ? { name: document.getElementById('dj-n').value, style: document.getElementById('dj-s').value, img: document.getElementById('dj-i').value } : { day: document.getElementById('sch-d').value, time: document.getElementById('sch-t-drop').value, info: document.getElementById('sch-j-drop').value };
            await fetch(`${DB}${p}/${activeId}.json`, { method: "PATCH", body: JSON.stringify(item) });
            alert("Updated!"); location.reload();
        }

        async function delItem(p, id) { if(confirm("Delete this item?")) { await fetch(`${DB}${p}/${id}.json`, { method: "DELETE" }); load(); } }
        
        let opt = ""; for(let i=0; i<24; i++) { let hh = i<10?'0'+i:i; opt+=`<option value="${hh}:00">${hh}:00</option><option value="${hh}:30">${hh}:30</option>`; }
        document.getElementById('sch-t-drop').innerHTML = opt;

        load(); setInterval(getUK, 1000); setInterval(load, 30000);
    </script>
</body>
</html>
