<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .main-header { 
            padding: 20px; font-weight: 900; color: #f52a1f; letter-spacing: 8px; font-size: clamp(24px, 5vw, 40px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(245, 42, 31, 0.8);
            margin-bottom: 15px;
        }

        /* PLAYER WRAPPER - VISIBLE BORDER EVEN OFFLINE */
        .player-wrapper {
            position: relative; width: 94%; max-width: 900px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 30px; 
            display: flex; align-items: center; justify-content: center;
            border: 5px solid #1a1a1a; /* Visible dark neon border */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.5s ease;
        }

        /* NEON RED FLOW WHEN LIVE */
        body.is-live .player-wrapper {
            border: 5px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, #f52a1f, #ff6b6b, #f52a1f) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.5s linear infinite;
            box-shadow: 0 0 60px rgba(245, 42, 31, 0.7);
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        #player-target {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20;
            display: none; border-radius: 25px; overflow: hidden;
        }
        body.is-live #player-target { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* OFFLINE SCREEN DESIGN */
        #offline-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: 25px;
        }

        .brand-name { font-size: clamp(30px, 8vw, 60px); letter-spacing: 12px; opacity: 0.9; margin-bottom: 10px; }
        
        .status-badge {
            background: rgba(255,255,255,0.05); padding: 15px 35px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; gap: 8px;
        }

        .status-row { display: flex; align-items: center; gap: 15px; }

        .dot { 
            width: 14px; height: 14px; background: #f52a1f; border-radius: 50%; 
            box-shadow: 0 0 15px #f52a1f; animation: pulseRed 2s infinite;
        }

        @keyframes pulseRed {
            0%, 100% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .status-msg { color: #aaa; font-size: 14px; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        .sub-msg { color: #444; font-size: 10px; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }

        body.is-live #offline-screen { display: none; }

        #actionBtn {
            display: none; margin-top: 40px; background: #f52a1f; color: #fff;
            border: none; padding: 22px 60px; border-radius: 100px;
            font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(245, 42, 31, 0.4); transition: 0.3s;
            z-index: 100;
        }

        #actionBtn:hover { transform: scale(1.05); }
        body.is-live #actionBtn { display: inline-block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div id="offline-screen">
            <div class="brand-name">FLASHMIX</div>
            <div class="status-badge">
                <div class="status-row">
                    <div class="dot"></div>
                    <span class="status-msg">SYSTEM READY / OFFLINE</span>
                </div>
                <div class="sub-msg">WAITING FOR DJ...</div>
            </div>
        </div>
        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 UNMUTE LIVE SESSION</button>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let currentStatus = null;

        async function autoCheck() {
            try {
                const r = await fetch(`${DB_URL}?t=${Date.now()}`);
                const isLive = await r.json();

                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-target');
                    const btn = document.getElementById('actionBtn');

                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:12px;letter-spacing:2px;color:#444;">CONNECTING TO STREAM...</div>`;
                        
                        setTimeout(() => {
                            target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                        }, 5000); 

                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = ""; 
                        btn.style.display = 'none';
                        window.stop();
                    }
                }
            } catch (e) { console.log("Searching for signal..."); }
        }

        function enableAudio() {
            document.getElementById('player-target').innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        setInterval(autoCheck, 3000);
        autoCheck();
    </script>
</body>
</html>
