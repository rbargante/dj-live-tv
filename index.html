<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
    .logo { font-weight: 900; font-size: 18px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 11px; font-weight: 700; padding: 5px 10px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    /* SEÇÕES */
    .section-title { text-align: center; margin: 40px 0 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    .grid-vids { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .card-v { background: #0a0a0a; border-radius: 10px; border: 1px solid #222; cursor: pointer; overflow: hidden; }
    .card-dj { text-align: center; background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #111; }
    .card-dj img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin-bottom: 10px; }

    /* HORÁRIOS */
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 50px 1fr 100px; padding: 12px 15px; border-bottom: 1px solid #111; align-items: center; gap: 10px; }
    .sch-dj-thumb { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
    .sch-time { font-family: monospace; font-size: 14px; font-weight: bold; color: #f52a1f; text-align: right; }

    /* ADMIN */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 20px; margin-top: 40px; display: none; }
    .admin-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
    .admin-input, select { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .btn-publish { background: #28a745; color: #fff; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }
    
    footer { padding: 50px 30px; text-align: center; color: #444; font-size: 11px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#vids">Vídeos</a>
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="vids">
      <h2 class="section-title">Últimos Sets</h2>
      <div id="videoGrid" class="grid-vids"></div>
    </div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossa Equipa</h2>
      <div id="djGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;"></div>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Broadcast Schedule</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center; margin-bottom:20px;">COMANDO CLOUD</h2>
      <div id="dashBox">
        <div class="admin-card">
          <h3>Equipa (DJs)</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; cursor:pointer">+ ADICIONAR DJ</button>
        </div>
        <div class="admin-card">
          <h3>Horários</h3>
          <div id="adminSchList"></div>
          <button onclick="addNewSchField()" class="admin-input" style="background:#222; cursor:pointer">+ ADICIONAR HORÁRIO</button>
        </div>
        <button class="btn-publish" onclick="saveAll()">☁️ PUBLICAR ALTERAÇÕES</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    let currentDjs = []; 
    let currentSch = [];

    // CARREGAMENTO APENAS DOS DADOS NECESSÁRIOS
    async function load() {
      // 1. Vídeos do Worker
      try {
        const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await rv.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0, 4).map(v => `
          <div class="card-v" onclick="window.open('${v.source}','_self')">
            <img src="${v.thumbnail.src}" style="width:100%">
            <h3 style="font-size:13px; padding:10px; margin:0;">${v.session_title}</h3>
          </div>`).join('');
      } catch(e) {}

      // 2. Firebase (DJs e Schedule)
      try {
        const rf = await fetch(DB + ".json");
        const data = await rf.json();
        currentDjs = data?.djs || [];
        currentSch = data?.schedule || [];
        renderSite();
      } catch(e) {}
    }

    function renderSite() {
      // DJs
      document.getElementById('djGrid').innerHTML = currentDjs.map(d => `
        <div class="card-dj">
          <img src="${d.img || 'https://via.placeholder.com/150'}">
          <h3 style="margin:0; font-size:16px;">${d.name}</h3>
        </div>`).join('');
      
      // Schedule
      document.getElementById('scheduleList').innerHTML = currentSch.map(s => {
        const dj = currentDjs.find(d => d.name === s.dj) || {img: 'https://via.placeholder.com/150'};
        return `
          <div class="sch-row">
            <img src="${dj.img}" class="sch-dj-thumb">
            <div style="font-weight:bold;">${s.dj}</div>
            <div class="sch-time">${s.time}</div>
          </div>`;
      }).join('');
    }

    // ADMIN FUNCTIONS
    function renderAdmin() {
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <input class="admin-input" placeholder="Nome" value="${d.name}" oninput="currentDjs[${i}].name=this.value">
          <input class="admin-input" placeholder="Link Foto" value="${d.img}" oninput="currentDjs[${i}].img=this.value">
          <button onclick="currentDjs.splice(${i},1);renderAdmin()" style="background:red; border:none; color:white; border-radius:5px; cursor:pointer; padding:0 15px;">X</button>
        </div>`).join('');

      document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <select class="admin-input" onchange="currentSch[${i}].dj=this.value">
            ${currentDjs.map(dj => `<option ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}
          </select>
          <input class="admin-input" placeholder="22:00" value="${s.time}" oninput="currentSch[${i}].time=this.value">
          <button onclick="currentSch.splice(${i},1);renderAdmin()" style="background:red; border:none; color:white; border-radius:5px; cursor:pointer; padding:0 15px;">X</button>
        </div>`).join('');
    }

    function addNewDjField() { currentDjs.push({name:'', img:''}); renderAdmin(); }
    function addNewSchField() { currentSch.push({dj:currentDjs[0]?.name || '', time:''}); renderAdmin(); }

    async function saveAll() {
      await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify({ djs: currentDjs, schedule: currentSch }) });
      alert("✅ ATUALIZADO!"); 
      location.reload();
    }

    function toggleAdmin() {
      if(prompt("Senha:") === '1234') {
        document.getElementById('adminArea').style.display = 'block';
        renderAdmin();
        document.getElementById('adminArea').scrollIntoView();
      }
    }

    load();
  </script>
</body>
</html>
