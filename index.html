<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
    .logo { padding: 30px; font-weight: 900; color: #f52a1f; letter-spacing: 3px; font-size: 24px; }
    
    /* CONTENTOR DO PLAYER */
    #player-zone { 
      position: relative; width: 92%; max-width: 800px; margin: 0 auto; 
      border-radius: 20px; overflow: hidden; background: #080808; border: 1px solid #1a1a1a;
      min-height: 200px; display: flex; align-items: center; justify-content: center;
    }
    
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; background: #000; display: none; }
    
    /* MENSAGEM OFFLINE */
    #offline-ui { color: #333; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }

    /* QUANDO ESTIVER LIVE */
    .is-live #player-zone { border-color: #f52a1f; }
    .is-live .player-aspect { display: block; }
    .is-live #offline-ui { display: none; }

    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    #unmuteBtn { 
      display: none; margin: 25px auto; background: #f52a1f; color: #fff; border: none; 
      padding: 15px 35px; border-radius: 50px; font-weight: 900; cursor: pointer;
    }
    .is-live #unmuteBtn { display: inline-block; }
  </style>
</head>
<body id="site-root">

  <div class="logo">FLASHMIX.TV</div>

  <div id="player-zone">
    <div id="offline-ui">SINAL OFFLINE</div>
    <div class="player-aspect" id="inject-target"></div>
  </div>
  
  <button id="unmuteBtn" onclick="forceUnmute()">🔊 ATIVAR SOM</button>

  <script>
    const WORKER = "https://djlivetv.ricardobargante.workers.dev/";
    let isLive = null;

    async function checkSinal() {
      try {
        // Pedimos ao worker com timestamp para evitar cache do browser
        const res = await fetch(`${WORKER}?nocache=${Date.now()}`, { cache: "no-store" });
        const data = await res.json();
        
        if (data.live !== isLive) {
          isLive = data.live;
          const root = document.getElementById('site-root');
          const target = document.getElementById('inject-target');

          if (data.live) {
            root.classList.add('is-live');
            // Criamos o iframe do zero
            target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true&autoplay=true" allowfullscreen></iframe>`;
          } else {
            root.classList.remove('is-live');
            // MATAMOS O PLAYER: Removemos o código do iframe completamente
            target.innerHTML = "";
            // Forçamos o browser a parar qualquer stream pendente
            window.stop();
          }
        }
      } catch (e) { console.log("Erro de ligação."); }
    }

    function forceUnmute() {
      const target = document.getElementById('inject-target');
      target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false&autoplay=true" allowfullscreen></iframe>`;
      document.getElementById('unmuteBtn').style.display = 'none';
    }

    // Verifica a cada 3 segundos para ser o mais rápido possível
    setInterval(checkSinal, 3000);
    checkSinal();
  </script>
</body>
</html>
