<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* OFFLINE OVERLAY */
#offlineOverlay {
  position: absolute;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#offlineOverlay h2 {
  font-size: 28px;
}

#offlineOverlay p {
  color: red;
}

/* NOW BAR */
.nowBar {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #222;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.section {
  margin-top: 30px;
}

.hidden {
  display: none;
}

/* ADMIN */
#adminPanel {
  display: none;
  margin-top: 40px;
  padding: 20px;
  border: 1px solid #222;
  border-radius: 10px;
}

/* BUTTONS */
button {
  padding: 8px 12px;
  background: red;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

select, input {
  padding: 6px;
  margin: 5px;
}

</style>
</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<!-- PLAYER -->
<div class="player">
  <iframe src="https://player.kick.com/DJLIVETV?muted=true"></iframe>

  <div id="offlineOverlay">
    <h2>DJ LIVE TV</h2>
    <p>Currently Offline</p>
  </div>
</div>

<!-- NOW / NEXT -->
<div class="nowBar">
  <div id="nowText">NOW: OFFLINE</div>
  <div id="nextText">NEXT: ---</div>
</div>

<!-- DJs -->
<div id="djSection" class="section">
  <h2>DJs</h2>
  <div id="djList"></div>
</div>

<!-- Schedule -->
<div id="scheduleSection" class="section">
  <h2>Schedule</h2>
  <div id="scheduleList"></div>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h2>Admin</h2>

<!-- TOGGLES -->
<label>
<input type="checkbox" checked onchange="toggleSection('scheduleSection')">
 Show Schedule
</label>

<label>
<input type="checkbox" checked onchange="toggleSection('djSection')">
 Show DJs
</label>

<hr>

<!-- ADD DJ -->
<input id="djName" placeholder="DJ name">
<button onclick="addDJ()">Add DJ</button>

<hr>

<!-- SCHEDULE -->
<select id="scheduleDay">
<option value="Everyday">Everyday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<select id="startTime"></select>
<select id="endTime"></select>

<button onclick="saveSchedule()">Save</button>

</div>

</div>

<script>

/* ======================
   ADMIN TOGGLE (CTRL+A)
====================== */
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key === "a") {
    const panel = document.getElementById("adminPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }
});

/* ======================
   GENERATE HOURS
====================== */
function generateTimes() {
  const start = document.getElementById("startTime");
  const end = document.getElementById("endTime");

  for (let i = 0; i < 24; i++) {
    let h = i.toString().padStart(2, "0") + ":00";
    start.add(new Option(h, h));
    end.add(new Option(h, h));
  }
}
generateTimes();

/* ======================
   STORAGE
====================== */
function getDJs() {
  return JSON.parse(localStorage.getItem("djs") || "[]");
}

function getSchedule() {
  return JSON.parse(localStorage.getItem("schedule") || "[]");
}

/* ======================
   DJ ADD
====================== */
function addDJ() {
  const name = document.getElementById("djName").value;
  if (!name) return;

  const djs = getDJs();
  djs.push(name);

  localStorage.setItem("djs", JSON.stringify(djs));
  renderDJs();
}

/* ======================
   RENDER DJs
====================== */
function renderDJs() {
  const list = document.getElementById("djList");
  const djs = getDJs();

  list.innerHTML = "";

  if (!djs.length) {
    document.getElementById("djSection").style.display = "none";
    return;
  }

  document.getElementById("djSection").style.display = "block";

  djs.forEach(dj => {
    const div = document.createElement("div");
    div.innerText = dj;
    list.appendChild(div);
  });
}

/* ======================
   SAVE SCHEDULE
====================== */
function saveSchedule() {
  const day = document.getElementById("scheduleDay").value;
  const start = document.getElementById("startTime").value;
  const end = document.getElementById("endTime").value;
  const dj = document.getElementById("djName").value;

  if (!dj) return;

  const schedule = getSchedule();

  schedule.push({ dj, day, start, end });

  localStorage.setItem("schedule", JSON.stringify(schedule));

  renderSchedule();
}

/* ======================
   RENDER SCHEDULE
====================== */
function renderSchedule() {
  const list = document.getElementById("scheduleList");
  const schedule = getSchedule();

  list.innerHTML = "";

  if (!schedule.length) {
    document.getElementById("scheduleSection").style.display = "none";
    return;
  }

  document.getElementById("scheduleSection").style.display = "block";

  schedule.forEach(item => {
    const div = document.createElement("div");
    div.innerText = `${item.day} ${item.start} - ${item.end} | ${item.dj}`;
    list.appendChild(div);
  });
}

/* ======================
   LIVE DETECTION
====================== */
function getLiveDJ() {
  const schedule = getSchedule();
  const now = new Date();

  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const currentDay = days[now.getDay()];
  const currentHour = now.getHours();

  return schedule.find(item => {
    const start = parseInt(item.start);
    const end = parseInt(item.end);

    return (
      (item.day === currentDay || item.day === "Everyday") &&
      currentHour >= start &&
      currentHour < end
    );
  });
}

/* ======================
   UPDATE NOW/NEXT
====================== */
function updateNow() {
  const live = getLiveDJ();

  if (live) {
    document.getElementById("nowText").innerText = "NOW: " + live.dj;
    document.getElementById("offlineOverlay").style.display = "none";
  } else {
    document.getElementById("nowText").innerText = "NOW: OFFLINE";
    document.getElementById("offlineOverlay").style.display = "flex";
  }
}

setInterval(updateNow, 10000);

/* ======================
   TOGGLE SECTIONS
====================== */
function toggleSection(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* INIT */
renderDJs();
renderSchedule();
updateNow();

</script>

</body>
</html>
