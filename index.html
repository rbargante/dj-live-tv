<script>
async function loadVideos() {
  try {
    const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
    const data = await res.json();

    const container = document.getElementById("videos");

    data.forEach(video => {
      const el = document.createElement("div");
      el.className = "card";

      const thumb = video.thumbnail?.src || "";
      const title = video.session_title || "DJ Set";

      el.innerHTML = `
        <div onclick="playVideo('${video.id}')" style="cursor:pointer;">
          <img src="${thumb}">
          <p>${title}</p>
        </div>
      `;

      container.appendChild(el);
    });

  } catch (err) {
    console.log("Erro a carregar vídeos");
  }
}

function playVideo(id) {
  const player = document.querySelector(".player");

  player.innerHTML = `
    <iframe src="https://player.kick.com/video/${id}" allowfullscreen></iframe>
  `;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

loadVideos();
</script>
