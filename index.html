<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; }
.container { max-width:1200px; margin:auto; padding:20px; }
h1,h2 { text-align:center; }
.player { width:100%; aspect-ratio:16/9; background:black; border-radius:12px; overflow:hidden; margin-bottom:40px; }
iframe { width:100%; height:100%; border:none; }

.schedule-item { display:flex; justify-content:space-between; align-items:center; background:#111; margin-bottom:12px; padding:16px; border-radius:12px; border:1px solid #222; }
.schedule-item.live { border:1px solid rgba(255,59,59,0.8); box-shadow:0 0 0 1px rgba(255,59,59,0.2); }

.dj-live-wrap { display:flex; align-items:center; gap:14px; }
.dj-live-photo { width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid transparent; }
.dj-live-photo.live { border-color:#ff3b3b; box-shadow:0 0 0 4px rgba(255,59,59,0.2); }

.schedule-left { display:flex; flex-direction:column; }
.dj-main-line { display:flex; align-items:center; gap:10px; }

.time { color:#ff3b3b; font-weight:bold; font-size:22px; }

.badge-live { background:red; padding:4px 8px; border-radius:6px; font-size:12px; }
.badge-next { background:#444; padding:4px 8px; border-radius:6px; font-size:12px; }

.button { display:block; margin:20px auto; padding:10px 20px; background:#222; color:white; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>

<body>
<div class="container">
<h1>DJ LIVE TV</h1>

<div class="player">
<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
</div>

<h2>SCHEDULE</h2>
<div id="schedule"></div>
<button id="toggleBtn" class="button">View All</button>
</div>

<script>
const djPhotos = {
  "DJ Ricardo": "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f",
  "DJ Sofia": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91",
  "DJ Marco": "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff",
  "DJ Luna": "https://images.unsplash.com/photo-1516280440614-37939bbacd81"
};

const scheduleData = [
  { day:"Monday", dj:"DJ Ricardo", time:"18:00", show:"Warm Up" },
  { day:"Monday", dj:"DJ Sofia", time:"21:00", show:"Late Set" },
  { day:"Friday", dj:"DJ Marco", time:"20:00", show:"Prime Time" },
  { day:"Friday", dj:"DJ Ricardo", time:"23:00", show:"Late Mix" },
  { day:"Saturday", dj:"DJ Sofia", time:"18:00", show:"Early Vibes" },
  { day:"Saturday", dj:"DJ Marco", time:"21:00", show:"Main Event" },
  { day:"Sunday", dj:"DJ Luna", time:"17:00", show:"Sunset" }
];

let showAll=false;
const duration=120; // minutos

function getDay(){ return new Date().toLocaleDateString("en-GB",{weekday:"long"}); }
function getTime(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function toMin(t){ const[a,b]=t.split(":"); return +a*60+ +b; }

function render(){
  const el=document.getElementById("schedule");
  el.innerHTML="";

  const day=getDay();
  const now=getTime();

  const today=scheduleData
    .filter(x=>x.day===day)
    .map(x=>({...x,start:toMin(x.time)}))
    .sort((a,b)=>a.start-b.start);

  let live=null;
  let next=null;

  for(let i=0;i<today.length;i++){
    const cur=today[i];
    const end=cur.start+duration;

    if(now>=cur.start && now<end){
      live=cur;
      next=today[i+1]||null;
      break;
    }

    if(now<cur.start && !next){
      next=cur;
    }
  }

  let ordered=[...scheduleData];

  if(live){
    ordered=ordered.filter(x=>x.dj!==live.dj);
    ordered.unshift(live);
    if(next){
      ordered=ordered.filter(x=>x.dj!==next.dj);
      ordered.splice(1,0,next);
    }
  } else if(next){
    ordered=ordered.filter(x=>x.dj!==next.dj);
    ordered.unshift(next);
  }

  const data=showAll?ordered:ordered.slice(0,5);

  data.forEach(item=>{
    const isLive=live && item.dj===live.dj;
    const isNext=next && item.dj===next.dj && !isLive;

    const div=document.createElement("div");
    div.className="schedule-item"+(isLive?" live":"");

    div.innerHTML=`
    <div class="dj-live-wrap">
      <img class="dj-live-photo ${isLive?'live':''}" src="${djPhotos[item.dj]||''}">
      <div class="schedule-left">
        <div class="dj-main-line">
          <strong>${item.dj}</strong>
          ${isLive?'<span class="badge-live">LIVE NOW</span>':''}
          ${isNext?'<span class="badge-next">NEXT</span>':''}
        </div>
        <small>${item.day} • ${item.show}</small>
      </div>
    </div>
    <div><span class="time">${item.time}</span></div>`;

    el.appendChild(div);
  });
}

document.getElementById("toggleBtn").onclick=()=>{
  showAll=!showAll;
  document.getElementById("toggleBtn").innerText=showAll?"View Less":"View All";
  render();
};

render();
setInterval(render,60000);
</script>
</body>
</html>
