<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:10px;
}

h1 {
  text-align:center;
}

.player {
  position:relative;
  padding-top:56.25%;
  background:black;
}

.player iframe {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:0;
}

.button {
  display:block;
  text-align:center;
  margin-top:15px;
  padding:12px;
  background:#00ff88;
  color:black;
  font-weight:bold;
  text-decoration:none;
  border-radius:8px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
  padding:20px 0;
}

.card {
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

.card p {
  font-size:14px;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<div class="player">
<iframe src="https://player.kick.com/DJLIVETV"></iframe>
</div>

<a class="button" href="https://kick.com/djlivetv" target="_blank">
OPEN FULL SCREEN (BEST QUALITY)
</a>

<h2 style="text-align:center;margin-top:40px;">REPLAYS</h2>

<div id="videos" class="grid"></div>

</div>

<script>
async function loadVideos() {
  try {
    const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
    const data = await res.json();

    const container = document.getElementById("videos");

    data.forEach(video => {
      const el = document.createElement("div");
      el.className = "card";

      const thumb = video.thumbnail?.src || "";
      const title = video.session_title || "DJ Set";

      el.innerHTML = `
        <div onclick="window.open('https://kick.com/video/${video.id}', '_blank')">
          <img src="${thumb}">
          <p>${title}</p>
        </div>
      `;

      container.appendChild(el);
    });

  } catch (err) {
    console.log("Erro a carregar vídeos");
  }
}

loadVideos();
</script>

</body>
</html>
