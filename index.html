<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHMIX.TV | FINAL SYNC V40</title>
    <style>
        :root { --neon-red: #f52a1f; --neon-blue: #00ecff; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 80px; }

        .top-nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .admin-btn { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        .player-stage { width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #050505; border-radius: 30px; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; position: relative; }
        body.is-live .player-stage { border-color: transparent; background: linear-gradient(#050505, #050505) padding-box, linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box; background-size: 200% 100%; animation: neonFlow 1.2s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        iframe { width: 100%; height: 100%; border: 0; display: none; }
        body.is-live iframe { display: block; }

        /* LOGIN */
        #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--neon-red); width: 300px; text-align: center; }

        /* DASHBOARD */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 25px; border-radius: 20px; }
        .dash-section { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--neon-red); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; }
        .save-btn { width: 100%; padding: 15px; background: var(--neon-red); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #222; font-size: 11px; }
        .item-data b { color: var(--neon-blue); font-size: 13px; display: block; }

        /* PUBLIC UI */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 22px; margin: 40px 0 20px; border-left: 5px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; }
        .sch-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        .sch-row { display: grid; grid-template-columns: 70px 110px 1fr 1fr 100px; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-photo { width: 45px; height: 45px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #333; }
        .tag { font-size: 9px; padding: 4px 8px; border-radius: 4px; text-align: center; font-weight: bold; }
        .tag-live { background: var(--neon-red); animation: blink 1s infinite; }
        .tag-next { border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <a onclick="document.getElementById('login-overlay').style.display='flex'" class="admin-btn">Manager Dashboard</a>
    </nav>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="color:#fff; margin-top:0;">STAFF LOGIN</h3>
            <input type="text" id="u-in" placeholder="Username">
            <input type="password" id="p-in" placeholder="Password">
            <button class="save-btn" onclick="doAuth()">ENTER</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="cursor:pointer; font-size:10px; color:#444; margin-top:15px;">CANCEL</p>
        </div>
    </div>

    <div class="player-stage">
        <iframe id="kick-player" src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <button onclick="toggleDash()" style="float:right; background:#333; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:5px;">SAVE & EXIT</button>
            <h2 style="color:var(--neon-red)">STATION MANAGER</h2>

            <div class="dash-section">
                <h3>1. DJs DATABASE</h3>
                <input type="text" id="dj-n" placeholder="Name"><input type="text" id="dj-s" placeholder="Style"><input type="text" id="dj-i" placeholder="Photo URL">
                <button id="btn-dj-add" class="save-btn" onclick="saveData('djs')">Add DJ</button>
                <button id="btn-dj-up" class="save-btn" style="display:none; background:#fff; color:#000;" onclick="pushUpdate('djs')">Update DJ</button>
                <div id="adm-djs" style="margin-top:15px;"></div>
            </div>

            <div class="dash-section">
                <h3>2. SCHEDULE / AGENDA</h3>
                <select id="sch-d"><option>TODOS OS DIAS</option><option>MONDAY</option><option>TUESDAY</option><option>WEDNESDAY</option><option>THURSDAY</option><option>FRIDAY</option><option>SATURDAY</option><option>SUNDAY</option></select>
                <select id="sch-t"></select>
                <select id="sch-j"></select>
                <button id="btn-sch-add" class="save-btn" onclick="saveData('schedule')">Add Schedule</button>
                <button id="btn-sch-up" class="save-btn" style="display:none; background:#fff; color:#000;" onclick="pushUpdate('schedule')">Update Schedule</button>
                <div id="adm-sch" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="uk-clock" style="text-align:right; font-size:11px; color:#555; margin-bottom:10px;">UK SYNC: --:--</div>
        <div class="row-title">Weekly Schedule</div>
        <div id="pub-sch" class="sch-box"></div>
        <div class="row-title">Resident DJs</div>
        <div id="pub-djs" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px;"></div>
    </div>

    <script>
        const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
        let editingId = null;
        let djsCached = {};

        function getUKTime() {
            const str = new Date().toLocaleTimeString("en-GB", {timeZone: "Europe/London", hour12: false, hour: '2-digit', minute: '2-digit'});
            document.getElementById('uk-clock').innerText = "UK TIME SYNC: " + str;
            return str;
        }

        function fillHours() {
            let h = "";
            for(let i=0; i<24; i++) {
                let hh = i < 10 ? '0'+i : i;
                h += `<option value="${hh}:00">${hh}:00</option><option value="${hh}:30">${hh}:30</option>`;
            }
            document.getElementById('sch-t').innerHTML = h;
        }

        function doAuth() {
            const u = document.getElementById('u-in').value.trim().toLowerCase();
            const p = document.getElementById('p-in').value.trim();
            if(u === "admin" && p === "1234") { 
                document.getElementById('login-overlay').style.display='none';
                document.getElementById('dashboard').style.display='block';
            } else { alert("Login Error!"); }
        }

        async function load() {
            const r = await fetch(DB + ".json?t=" + Date.now());
            const data = await r.json() || {};
            djsCached = data.djs || {};
            const nowTime = getUKTime();
            const nowMins = parseInt(nowTime.split(':')[0]) * 60 + parseInt(nowTime.split(':')[1]);

            if(data.is_live) document.body.classList.add('is-live'); else document.body.classList.remove('is-live');

            const djEntries = Object.entries(djsCached);
            document.getElementById('sch-j').innerHTML = djEntries.map(([id, d]) => `<option value="${d.name}">${d.name}</option>`).join('');
            
            document.getElementById('pub-djs').innerHTML = djEntries.map(([id, d]) => `
                <div style="background:#080808; border-radius:25px; padding:25px; text-align:center; border:1px solid #1a1a1a;">
                    <div style="width:90px; height:90px; border-radius:50%; margin:0 auto 15px; background-size:cover; border:3px solid #333; background-image:url('${d.img}')"></div>
                    <div>${d.name}</div><div style="color:red; font-size:10px; margin-top:5px;">${d.style}</div>
                </div>`).join('');

            const sch = data.schedule ? Object.entries(data.schedule).sort((a,b) => a[1].time.localeCompare(b[1].time)) : [];
            
            document.getElementById('pub-sch').innerHTML = sch.map(([id, s], i) => {
                const dj = Object.values(djsCached).find(d => d.name === s.info);
                const sMins = parseInt(s.time.split(':')[0]) * 60 + parseInt(s.time.split(':')[1]);
                let tag = "";
                
                // Lógica de Live Now Simplificada para UK Time
                if (nowMins >= sMins && (i === sch.length - 1 || nowMins < (parseInt(sch[i+1][1].time.split(':')[0])*60 + parseInt(sch[i+1][1].time.split(':')[1])))) {
                    tag = '<div class="tag tag-live">LIVE NOW</div>';
                } else if (nowMins < sMins && (i === 0 || nowMins >= (parseInt(sch[i-1][1].time.split(':')[0])*60 + parseInt(sch[i-1][1].time.split(':')[1])))) {
                    tag = '<div class="tag tag-next">NEXT</div>';
                }

                return `<div class="sch-row">
                    <div class="sch-photo" style="background-image:url('${dj ? dj.img : ''}')"></div>
                    <div style="color:red; font-weight:bold;">${s.day}</div>
                    <div style="font-size:14px;">${s.info}</div>
                    <div>${s.time}</div><div>${tag}</div>
                </div>`;
            }).join('');

            renderAdmin(data);
        }

        function renderAdmin(data) {
            document.getElementById('adm-djs').innerHTML = Object.entries(data.djs || {}).map(([id, d]) => `
