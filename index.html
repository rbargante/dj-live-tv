<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* PLAYER */
.player {
  width: 100%;
  aspect-ratio: 16/9;
  position: relative;
  background: black;
  border-radius: 12px;
  overflow: hidden;
}

.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* NOW BAR */
.nowBar {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #222;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

/* SECTIONS */
.section {
  margin-top: 30px;
}

/* ADMIN */
#adminPanel {
  display: none;
  margin-top: 40px;
  padding: 20px;
  border: 1px solid #222;
  border-radius: 10px;
  background: #111;
}

/* BUTTON */
button {
  padding: 8px 12px;
  background: red;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

input, select {
  padding: 6px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<!-- PLAYER (INTACTO) -->
<div class="player">
  <iframe src="https://player.kick.com/DJLIVETV?muted=true"></iframe>
</div>

<!-- NOW -->
<div class="nowBar">
  <div id="nowText">NOW: OFFLINE</div>
</div>

<!-- DJs (hidden by default) -->
<div id="djSection" class="section" style="display:none;">
  <h2>DJs</h2>
  <div id="djList"></div>
</div>

<!-- Schedule (hidden by default) -->
<div id="scheduleSection" class="section" style="display:none;">
  <h2>Schedule</h2>
  <div id="scheduleList"></div>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h2>Admin Panel</h2>

<!-- TOGGLES -->
<h3>Layout Control</h3>

<label>
  <input type="checkbox" id="toggleDJs" onchange="toggleDJs()">
  Show DJs
</label>
<br>

<label>
  <input type="checkbox" id="toggleSchedule" onchange="toggleSchedule()">
  Show Schedule
</label>

<hr>

<!-- ADD DJ -->
<input id="djName" placeholder="DJ name">
<button onclick="addDJ()">Add DJ</button>

<hr>

<!-- SCHEDULE -->
<select id="scheduleDay">
  <option value="Everyday">Everyday</option>
  <option>Monday</option>
  <option>Tuesday</option>
  <option>Wednesday</option>
  <option>Thursday</option>
  <option>Friday</option>
  <option>Saturday</option>
  <option>Sunday</option>
</select>

<select id="startTime"></select>
<select id="endTime"></select>

<button onclick="saveSchedule()">Save Schedule</button>

</div>

</div>

<script>

/* ADMIN TOGGLE (CTRL + A) */
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key === "a") {
    const panel = document.getElementById("adminPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }
});

/* GENERATE HOURS */
function generateTimes() {
  const start = document.getElementById("startTime");
  const end = document.getElementById("endTime");

  for (let i = 0; i < 24; i++) {
    let h = i.toString().padStart(2, "0") + ":00";
    start.add(new Option(h, h));
    end.add(new Option(h, h));
  }
}
generateTimes();

/* STORAGE */
function getDJs() {
  return JSON.parse(localStorage.getItem("djs") || "[]");
}

function getSchedule() {
  return JSON.parse(localStorage.getItem("schedule") || "[]");
}

/* ADD DJ */
function addDJ() {
  const name = document.getElementById("djName").value;
  if (!name) return;

  const djs = getDJs();
  djs.push(name);

  localStorage.setItem("djs", JSON.stringify(djs));
  renderDJs();
}

/* RENDER DJs */
function renderDJs() {
  const list = document.getElementById("djList");
  const djs = getDJs();

  list.innerHTML = "";

  djs.forEach(dj => {
    const div = document.createElement("div");
    div.innerText = dj;
    list.appendChild(div);
  });
}

/* SAVE SCHEDULE */
function saveSchedule() {
  const day = document.getElementById("scheduleDay").value;
  const start = document.getElementById("startTime").value;
  const end = document.getElementById("endTime").value;
  const dj = document.getElementById("djName").value;

  if (!dj) return;

  const schedule = getSchedule();
  schedule.push({ dj, day, start, end });

  localStorage.setItem("schedule", JSON.stringify(schedule));
  renderSchedule();
}

/* RENDER SCHEDULE */
function renderSchedule() {
  const list = document.getElementById("scheduleList");
  const schedule = getSchedule();

  list.innerHTML = "";

  schedule.forEach(item => {
    const div = document.createElement("div");
    div.innerText = `${item.day} ${item.start}-${item.end} | ${item.dj}`;
    list.appendChild(div);
  });
}

/* TOGGLES */
function toggleDJs() {
  const state = document.getElementById("toggleDJs").checked;
  document.getElementById("djSection").style.display = state ? "block" : "none";
  localStorage.setItem("showDJs", state);
}

function toggleSchedule() {
  const state = document.getElementById("toggleSchedule").checked;
  document.getElementById("scheduleSection").style.display = state ? "block" : "none";
  localStorage.setItem("showSchedule", state);
}

/* LOAD SETTINGS */
function loadLayoutSettings() {
  const showDJs = localStorage.getItem("showDJs") === "true";
  const showSchedule = localStorage.getItem("showSchedule") === "true";

  document.getElementById("djSection").style.display = showDJs ? "block" : "none";
  document.getElementById("scheduleSection").style.display = showSchedule ? "block" : "none";

  const djToggle = document.getElementById("toggleDJs");
  const schToggle = document.getElementById("toggleSchedule");

  if (djToggle) djToggle.checked = showDJs;
  if (schToggle) schToggle.checked = showSchedule;
}

/* INIT */
renderDJs();
renderSchedule();
loadLayoutSettings();

</script>

</body>
</html>
