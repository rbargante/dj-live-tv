<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1 {text-align:center;}

.player {
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
}

.player iframe {
  width:100%;
  height:100%;
  border:0;
}

.now-next {
  margin-top:10px;
  padding:10px;
  border:1px solid #222;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.now {color:red;}
.next {color:#aaa;}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.dj {
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.dj.live {
  border:2px solid red;
}

.badge {
  background:red;
  padding:4px 6px;
  font-size:12px;
  border-radius:6px;
}

.admin {
  margin-top:30px;
  background:#111;
  padding:15px;
  border-radius:10px;
}

.hidden {display:none;}
</style>
</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<div class="player">
<iframe src="https://player.kick.com/DJLIVETV?muted=true"></iframe>
</div>

<div class="now-next">
<div class="now" id="now">NOW: ---</div>
<div class="next" id="next">NEXT: ---</div>
</div>

<div id="djSection">
<h2>DJs</h2>
<div id="djList" class="grid"></div>
</div>

<div id="scheduleSection">
<h2>Schedule</h2>
<div id="schedule"></div>
</div>

<div class="admin">

<div id="login">
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="login()">login</button>
</div>

<div id="panel" class="hidden">

<button onclick="logout()">logout</button>
<button onclick="toggleLiveMode()" id="liveBtn">LIVE MODE</button>

<h3>Layout</h3>
<label><input type="checkbox" id="toggleDJ" checked onchange="saveLayout()"> DJs</label>
<label><input type="checkbox" id="toggleSchedule" checked onchange="saveLayout()"> Schedule</label>

<h3>Add DJ</h3>
<input id="djName" placeholder="name">
<input id="djImg" placeholder="image url">
<button onclick="addDJ()">add</button>

<h3>Add Schedule</h3>
<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<select id="time"></select>

<select id="djSelect"></select>
<button onclick="addSchedule()">add</button>

</div>

</div>

</div>

<script>

/* INIT TIME */
for(let i=0;i<24;i++){
let h=i.toString().padStart(2,"0")+":00";
let o=document.createElement("option");
o.value=h;o.textContent=h;
time.appendChild(o);
}

/* DATA */
function getDJs(){return JSON.parse(localStorage.getItem("djs")||"[]")}
function saveDJs(d){localStorage.setItem("djs",JSON.stringify(d))}

function getSchedule(){return JSON.parse(localStorage.getItem("schedule")||"[]")}
function saveScheduleData(s){localStorage.setItem("schedule",JSON.stringify(s))}

/* LOGIN FIX */
function login(){
if(user.value=="admin" && pass.value=="1234"){
document.getElementById("login").style.display="none";
document.getElementById("panel").classList.remove("hidden");
render();
}
}

function logout(){
document.getElementById("login").style.display="block";
document.getElementById("panel").classList.add("hidden");
}

/* DJ */
function addDJ(){
if(!djName.value || !djImg.value) return;

let d=getDJs();
d.push({name:djName.value,img:djImg.value});
saveDJs(d);

djName.value="";
djImg.value="";

render();
}

/* SCHEDULE */
function addSchedule(){
if(!djSelect.value) return;

let s=getSchedule();
s.push({day:day.value,time:time.value,dj:djSelect.value});
saveScheduleData(s);

render();
}

/* LIVE */
function getLive(){
let s=getSchedule();
let now=new Date();
let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let d=days[now.getDay()];
let h=now.getHours().toString().padStart(2,"0")+":00";
return s.find(x=>x.day==d && x.time==h);
}

/* NEXT */
function getNext(){
let s=getSchedule();
let h=new Date().getHours();
return s.find(x=>parseInt(x.time)>h);
}

/* RENDER */
function render(){

let djs=getDJs();
let live=getLive();

/* DROPDOWN AUTO */
djSelect.innerHTML="";
djs.forEach(d=>{
let o=document.createElement("option");
o.value=d.name;
o.textContent=d.name;
djSelect.appendChild(o);
});

/* DJs */
djList.innerHTML="";
djs.forEach(d=>{
let div=document.createElement("div");
div.className="dj "+(live && live.dj==d.name?"live":"");
div.innerHTML=`
<img src="${d.img}" width="100%">
<p>${d.name}</p>
${live && live.dj==d.name?'<span class="badge">LIVE</span>':''}
`;
djList.appendChild(div);
});

/* schedule */
schedule.innerHTML="";
getSchedule().forEach(s=>{
schedule.innerHTML+=`${s.day} ${s.time} - ${s.dj}<br>`;
});

/* now next */
now.textContent=live?`NOW: ${live.dj}`:"NOW: OFFLINE";
let n=getNext();
next.textContent=n?`NEXT: ${n.dj} ${n.time}`:"NEXT: ---";

applyLayout();
}

/* LAYOUT */
function saveLayout(){
localStorage.setItem("layout",JSON.stringify({
dj:toggleDJ.checked,
schedule:toggleSchedule.checked
}));
applyLayout();
}

function applyLayout(){
let l=JSON.parse(localStorage.getItem("layout")||"{}");

djSection.style.display=l.dj===false?"none":"block";
scheduleSection.style.display=l.schedule===false?"none":"block";

if(liveMode){
djSection.style.display="none";
scheduleSection.style.display="none";
}
}

/* LIVE MODE */
let liveMode=false;
function toggleLiveMode(){
liveMode=!liveMode;
liveBtn.textContent=liveMode?"EXIT LIVE":"LIVE MODE";
applyLayout();
}

/* INIT */
render();
setInterval(render,30000);

</script>

</body>
</html>
