<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; }

        .main-content { width: 100%; max-width: 900px; padding: 15px; box-sizing: border-box; }

        /* ESTADO OFFLINE */
        #offline-banner {
            width: 100%; height: 250px; border-radius: 12px; background: #0a0a0a;
            border: 1px dashed #333; display: flex; align-items: center; justify-content: center;
            color: #444; text-transform: uppercase; letter-spacing: 2px;
        }

        /* PLAYER (SÓ APARECE QUANDO LIVE) */
        #player-container {
            display: none; position: relative; width: 100%; padding-top: 56.25%; 
            background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #f52a1f;
        }
        #player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .is-live #player-container { display: block; }
        .is-live #offline-banner { display: none; }

        .controls { margin-top: 20px; text-align: center; display: none; }
        .is-live .controls { display: block; }
        
        button { background: #f52a1f; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body id="page-body">

    <header><div class="logo">FLASHMIX.TV</div></header>

    <div class="main-content">
        <div id="offline-banner">Sinal Offline • Aguardando OBS</div>
        
        <div id="player-container">
            <div id="player-wrapper"></div>
        </div>

        <div class="controls">
            <button id="unmuteBtn" onclick="toggleSound()">🔊 ATIVAR SOM</button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://calm-violet-826b.ricardobargante.workers.dev/";
        let isLive = null;

        function toggleSound() {
            const wrapper = document.getElementById('player-wrapper');
            wrapper.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        async function checkKickStatus() {
            try {
                // Força o pedido a saltar o cache com o timestamp ?t=
                const res = await fetch(`${WORKER_URL}?t=${Date.now()}`, { cache: "no-store" });
                const data = await res.json();
                const liveNow = data.live === true;

                if (liveNow !== isLive) {
                    isLive = liveNow;
                    const body = document.getElementById('page-body');
                    const wrapper = document.getElementById('player-wrapper');

                    if (liveNow) {
                        body.classList.add('is-live');
                        // Injeta o player do zero
                        wrapper.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true&r=${Date.now()}" allowfullscreen></iframe>`;
                        document.getElementById('unmuteBtn').style.display = 'inline-block';
                    } else {
                        body.classList.remove('is-live');
                        // APAGA O PLAYER DO HTML (O vídeo morre na hora!)
                        wrapper.innerHTML = "";
                    }
                }
            } catch (e) {
                console.log("Erro ao ligar ao Worker");
            }
        }

        // Verifica de 5 em 5 segundos (Rápido o suficiente)
        setInterval(checkKickStatus, 5000);
        checkKickStatus();
    </script>
</body>
</html>
