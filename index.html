<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER SIMPLES */
        header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            background: #000;
        }
        .logo {
            font-weight: 900;
            font-size: 20px;
            color: #f52a1f;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* PLAYER CONTAINER - O HERÓI DO SITE */
        .main-content {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* BOTÃO DE SOM (OBRIGATÓRIO PARA MOBILE) */
        .controls {
            margin-top: 15px;
            text-align: center;
        }

        #unmuteBtn {
            background: #f52a1f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 42, 31, 0.3);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FLASHMIX.TV</div>
    </header>

    <div class="main-content">
        <div class="player-wrapper">
            <iframe 
                id="kick-player"
                src="https://player.kick.com/DJLIVETV?muted=true" 
                allowfullscreen="true">
            </iframe>
        </div>

        <div class="controls">
            <button id="unmuteBtn" onclick="toggleSound()">🔊 ATIVAR SOM</button>
        </div>
    </div>

    <footer>© 2026 FLASHMIX — LIVE STREAMING</footer>

    <script>
        function toggleSound() {
            const player = document.getElementById('kick-player');
            // Recarrega o player com o som ativo
            player.src = "https://player.kick.com/DJLIVETV?muted=false";
            // Esconde o botão após clicar
            document.getElementById('unmuteBtn').style.display = 'none';
        }
    </script>

</body>
</html>
