<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASHMIX.TV | ARCHIVE LIBRARY</title>
    <style>
        :root { --main-red: #f52a1f; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .main-header { 
            padding: 25px; font-weight: 900; color: #ffffff; 
            letter-spacing: 10px; font-size: clamp(26px, 6vw, 45px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            text-align: center; cursor: pointer;
        }

        /* --- STAGE / PLAYER --- */
        .stage {
            position: relative; width: 96%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 35px; border: 5px solid var(--main-red);
            box-shadow: 0 0 30px rgba(245, 42, 31, 0.2); overflow: hidden; margin-bottom: 20px;
        }

        body.is-live .stage, body.is-archive .stage {
            border: 6px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, var(--main-red), #ff6b6b, var(--main-red)) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.2s linear infinite;
        }

        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        #screen { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #screen, body.is-archive #screen { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* STANDBY UI */
        #standby {
            position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .brand-name { font-size: clamp(35px, 10vw, 70px); letter-spacing: 15px; margin-bottom: 20px; color: #fff; }
        .status-pill {
            background: rgba(0,0,0,0.6); padding: 15px 45px; border-radius: 100px;
            border: 1px solid rgba(245, 42, 31, 0.4); display: flex; align-items: center; gap: 15px;
        }
        .dot { width: 18px; height: 18px; background: var(--main-red); border-radius: 50%; box-shadow: 0 0 15px var(--main-red); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .status-msg { font-size: clamp(22px, 5vw, 35px); font-weight: 900; letter-spacing: 5px; color: #fff; }

        /* --- CONTENT --- */
        .content { width: 96%; max-width: 1100px; padding-bottom: 80px; }
        .row-title { color: var(--main-red); font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin: 50px 0 25px 0; border-left: 6px solid var(--main-red); padding-left: 15px; }

        /* ARCHIVE VIDEO GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #080808; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .card-thumb::after { content: 'PLAY REPLAY'; font-size: 10px; border: 1px solid #fff; padding: 5px 15px; background: rgba(0,0,0,0.5); font-weight: bold; }
        .card-info { padding: 15px; }
        .card-info h4 { margin: 0; font-size: 12px; color: #fff; text-transform: uppercase; height: 32px; overflow: hidden; }

        /* DJ LINEUP */
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .dj-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; padding: 25px 10px; text-align: center; }
        .dj-avatar { width: 70px; height: 70px; background: #1a1a1a; border-radius: 50%; margin: 0 auto 15px; border: 2px solid #333; }
        .dj-box h3 { margin: 0; font-size: 13px; color: #fff; letter-spacing: 1px; }

        #unmuteBtn { display: none; margin: 20px auto; background: var(--main-red); color: #fff; border: none; padding: 20px 50px; border-radius: 100px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        body.is-live #unmuteBtn { display: block; }
    </style>
</head>
<body id="root">

    <div class="main-header" onclick="window.location.reload()">FLASHMIX.TV</div>

    <div class="stage">
        <div id="standby">
            <div class="brand-name">FLASHMIX</div>
            <div class="status-pill">
                <div class="dot"></div>
                <span class="status-msg">OFFLINE</span>
            </div>
        </div>
        <div id="screen"></div>
    </div>

    <button id="unmuteBtn" onclick="toggleAudio()">🔊 UNMUTE LIVE</button>

    <div class="content">
        <div class="row-title">Archive Library</div>
        <div id="archive-list" class="grid">
            <p style="color:#222; padding-left:15px;">Loading library...</p>
        </div>

        <div class="row-title">The Resident DJs</div>
        <div class="dj-grid">
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ BARGANTE</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 01</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 02</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 03</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 04</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 05</h3></div>
        </div>
    </div>

    <script>
        const FB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        const ARCHIVE_USER = "ricardo-dj-tv";
        let currentLive = null;
        let isArchive = false;

        // BUSCA AUTOMÁTICA NO ARCHIVE.ORG
        async function loadArchive() {
            try {
                const res = await fetch(`https://archive.org/advancedsearch.php?q=uploader%3A%28ricardo-dj-tv%40live.com%29&fl%5B%5D=identifier&fl%5B%5D=title&sort%5B%5D=addeddate+desc&output=json`);
                const data = await res.json();
                const list = document.getElementById('archive-list');
                
                if (data.response.docs.length > 0) {
                    list.innerHTML = "";
                    data.response.docs.forEach(doc => {
                        list.innerHTML += `
                            <div class="card" onclick="openArchive('${doc.identifier}')">
                                <div class="card-thumb" style="background-image: url('https://archive.org/services/img/${doc.identifier}')"></div>
                                <div class="card-info"><h4>${doc.title}</h4></div>
                            </div>`;
                    });
                }
            } catch (e) { document.getElementById('archive-list').innerHTML = "<p style='color:#333'>Library temporary unavailable</p>"; }
        }

        async function checkLive() {
            if (isArchive) return;
            try {
                const r = await fetch(`${FB_URL}?t=${Date.now()}`);
                const isLive = await r.json();
                if (isLive !== currentLive) {
                    currentLive = isLive;
                    const body = document.getElementById('root');
                    const screen = document.getElementById('screen');
                    if (isLive === true) {
                        body.classList.add('is-live');
                        screen.innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=true" allowfullscreen></iframe>`;
                    } else {
                        body.classList.remove('is-live');
                        screen.innerHTML = "";
                    }
                }
            } catch (e) {}
        }

        function openArchive(id) {
            isArchive = true;
            document.getElementById('root').classList.add('is-archive');
            document.getElementById('screen').innerHTML = `<iframe src="https://archive.org/embed/${id}" allowfullscreen></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleAudio() {
            if (!isArchive) {
                document.getElementById('screen').innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>`;
            }
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        setInterval(checkLive, 4000);
        checkLive();
        loadArchive();
    </script>
</body>
</html>
