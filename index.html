<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 10px;
    }

    h1, h2 {
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-bottom: 14px;
    }

    .badge-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .player {
      position: relative;
      padding-top: 56.25%;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .player iframe,
    .player video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: black;
    }

    /* CONTROLS */
    .controls {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      gap: 10px;
      z-index: 30;
      flex-wrap: wrap;
    }

    .control-btn {
      background: rgba(0,0,0,0.8);
      color: white;
      border: 1px solid rgba(255,255,255,.15);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      min-width: 46px;
      min-height: 46px;
    }

    .live-btn {
      background: rgba(255,0,0,.9);
      font-weight: bold;
    }

    .open-btn {
      background: rgba(255,255,255,.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px 0;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    /* MOBILE */
    @media (max-width: 700px) {

      .controls {
        bottom: 16px;
        right: 16px;
      }

      .control-btn {
        padding: 14px 16px;
        font-size: 18px;
        min-width: 52px;
        min-height: 52px;
      }
    }
  </style>
</head>

<body>
<div class="container">

<h1>DJ LIVE TV</h1>

<div class="badge-wrap">
  <div id="live-status-badge">
    <span id="live-status-text">CHECKING...</span>
  </div>
</div>

<!-- PLAYER -->
<div class="player" id="playerWrap">

  <iframe
    id="livePlayer"
    src="https://player.kick.com/DJLIVETV?muted=true"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>

  <div class="controls">
    <button class="control-btn" id="unmuteBtn">🔊</button>
    <button class="control-btn" id="fullscreenBtn">⛶</button>
    <button class="control-btn open-btn" id="openLiveBtn">↗</button>
    <button class="control-btn live-btn" id="backLiveBtn" style="display:none;">🔴 LIVE</button>
  </div>

</div>

<h2 style="margin-top:40px;">REPLAYS</h2>
<div id="videos" class="grid"></div>

</div>

<script>
let hls = null;

function requestPlayerFullscreen() {
  const video = document.getElementById("replayVideo");
  const iframe = document.getElementById("livePlayer");
  const wrap = document.getElementById("playerWrap");

  if (video) {
    if (video.requestFullscreen) video.requestFullscreen();
    else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    return;
  }

  if (iframe) {
    if (iframe.requestFullscreen) iframe.requestFullscreen();
    else if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    return;
  }
}

function stopEverything() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
  document.getElementById("playerWrap").innerHTML = "";
}

function attachControls(mode) {
  document.getElementById("fullscreenBtn").onclick = requestPlayerFullscreen;

  const openBtn = document.getElementById("openLiveBtn");
  if (openBtn) {
    openBtn.onclick = () => {
      window.open("https://kick.com/djlivetv", "_blank");
    };
  }

  const liveBtn = document.getElementById("backLiveBtn");
  if (liveBtn) {
    liveBtn.onclick = loadLive;
    liveBtn.style.display = mode === "replay" ? "inline-flex" : "none";
  }

  const unmuteBtn = document.getElementById("unmuteBtn");
  if (unmuteBtn) {
    if (mode === "live") {
      unmuteBtn.style.display = "inline-flex";
      unmuteBtn.onclick = () => {
        const iframe = document.getElementById("livePlayer");
        iframe.src = "https://player.kick.com/DJLIVETV";
      };
    } else {
      unmuteBtn.style.display = "none";
    }
  }
}

function loadLive() {
  stopEverything();

  const wrap = document.getElementById("playerWrap");
  wrap.innerHTML = `
    <iframe id="livePlayer"
      src="https://player.kick.com/DJLIVETV?muted=true"
      allow="autoplay; fullscreen"
      allowfullscreen></iframe>

    <div class="controls">
      <button class="control-btn" id="unmuteBtn">🔊</button>
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn open-btn" id="openLiveBtn">↗</button>
      <button class="control-btn live-btn" id="backLiveBtn">🔴 LIVE</button>
    </div>
  `;

  attachControls("live");
}

function loadReplay(url) {
  stopEverything();

  const wrap = document.getElementById("playerWrap");
  wrap.innerHTML = `
    <video id="replayVideo" controls autoplay playsinline></video>

    <div class="controls">
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn">🔴 LIVE</button>
    </div>
  `;

  const video = document.getElementById("replayVideo");

  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
  } else {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }

  attachControls("replay");
}

async function loadVideos() {
  const container = document.getElementById("videos");
  const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
  const data = await res.json();

  data.forEach(v => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${v.thumbnail?.src || ''}">
      <p>${v.session_title || 'DJ Set'}</p>
    `;
    card.onclick = () => loadReplay(v.source);
    container.appendChild(card);
  });
}

attachControls("live");
loadVideos();
</script>

</body>
</html>
