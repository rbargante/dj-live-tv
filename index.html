<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; }
    .container { max-width: 1120px; margin: 0 auto; padding: 14px; }
    h1, h2, h3 { text-align: center; margin: 0; }
    h1 { margin-bottom: 14px; font-size: 56px; letter-spacing: .5px; }
    .section-title { margin-top: 44px; margin-bottom: 16px; font-size: 38px; }
    .section-sub { text-align: center; color: #bdbdbd; margin: 0 0 18px 0; font-size: 15px; }
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    #live-status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; background: #2b2b2b; color: #d7d7d7; border: 1px solid rgba(255,255,255,.12); }
    #live-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
    .card { background: #0d0d0d; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: 0.2s; }
    .card:hover { transform: scale(1.02); }
    .card img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; }
    .card p { margin: 0; padding: 10px 12px 14px; font-size: 14px; }
    .dj-card { padding: 14px; text-align: center; cursor: default; }
    .dj-card img { aspect-ratio: 1 / 1; border-radius: 14px; margin-bottom: 10px; }
    .schedule-list { display: flex; flex-direction: column; gap: 12px; }
    .schedule-item { display: grid; grid-template-columns: 70px 110px 1.1fr 110px 1fr 1.1fr auto; gap: 14px; align-items: center; background: #0d0d0d; border-radius: 16px; padding: 12px 14px; border: 1px solid rgba(255,255,255,.08); }
    .schedule-item.live-item { border-color: #ff5a5a; }
    .schedule-photo { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; }
    .admin-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 20px; max-width: 600px; margin: 40px auto; }
    .admin { display: flex; flex-direction: column; gap: 12px; }
    .admin input, .admin select { padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); background: #f2f2f2; color: #111; font-size: 16px; width: 100%; box-sizing: border-box; }
    .admin button { padding: 14px; border-radius: 12px; border: none; background: #f52a1f; color: white; font-weight: 700; cursor: pointer; }
    .delete-btn { background: #481515; color: #fff; border: none; padding: 8px; border-radius: 8px; cursor: pointer; }
    @media (max-width: 900px) { .schedule-item { grid-template-columns: 56px 1fr auto; } .hide-mob { display: none; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>DJ LIVE TV</h1>
    <div class="badge-wrap"><div id="live-status-badge"><span id="live-status-dot"></span><span id="live-status-text">OFFLINE</span></div></div>
    <div class="player" id="playerWrap">
      <iframe id="livePlayer" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <h2 class="section-title">REPLAYS</h2>
    <div id="videos" class="grid">Loading Replays...</div>

    <h2 class="section-title">OUR DJs</h2>
    <div id="djGrid" class="grid"></div>

    <h2 class="section-title">SCHEDULE</h2>
    <div class="schedule-list" id="scheduleList"></div>

    <div class="admin-card">
      <div id="loginBox">
        <h3>Admin Login</h3>
        <div class="admin">
          <input id="user" placeholder="Username">
          <input id="pass" type="password" placeholder="Password">
          <button onclick="login()">LOGIN</button>
        </div>
      </div>
      <div id="adminPanel" style="display:none;">
        <h3>Add Schedule</h3>
        <div class="admin">
          <select id="schDj"></select>
          <select id="schDay">
            <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option><option value="Saturday">Saturday</option><option value="Sunday">Sunday</option><option value="Every Day">Every Day</option>
          </select>
          <select id="schTime"></select> <input id="schStyle" placeholder="Style">
          <input id="schShow" placeholder="Show Name">
          <button onclick="save()">SAVE SCHEDULE</button>
          <button style="background:#333; margin-top:5px;" onclick="logout()">LOGOUT</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isLive = false;
    const djs = [
      { name: "DJ Ricardo", img: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400", style: "Tech House" },
      { name: "DJ Sofia", img: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=400", style: "Deep House" }
    ];

    // Preencher Drop Menu de Horas (00:00 até 24:00)
    const timeSelect = document.getElementById("schTime");
    for(let h=0; h<=24; h++) {
      let t = h.toString().padStart(2,'0') + ":00";
      timeSelect.innerHTML += `<option value="${t}">${t}</option>`;
    }

    // Carregar Replays da API
    async function loadReplays() {
      try {
        const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const data = await res.json();
        const container = document.getElementById("videos");
        container.innerHTML = data.slice(0, 8).map(v => `
          <div class="card" onclick="window.open('${v.source}', '_blank')">
            <img src="${v.thumbnail?.src || ''}">
            <p>${v.session_title || "DJ Set"}</p>
          </div>
        `).join("");
      } catch { document.getElementById("videos").innerText = "Error loading replays."; }
    }

    function renderSchedule() {
      const container = document.getElementById("scheduleList");
      const list = JSON.parse(localStorage.getItem("myschedule")) || [];
      container.innerHTML = "";
      list.forEach((item, index) => {
        const dj = djs.find(d => d.name === item.dj);
        container.innerHTML += `
          <div class="schedule-item">
            <img class="schedule-photo" src="${dj?.img || ''}">
            <div class="hide-mob">${item.day}</div>
            <div style="font-weight:bold">${item.dj}</div>
            <div style="color:#f52a1f; font-weight:bold">${item.time}</div>
            <div class="hide-mob">${item.style}</div>
            <div class="hide-mob">${item.show}</div>
            <button class="delete-btn" onclick="del(${index})">X</button>
          </div>`;
      });
    }

    async function checkStatus() {
      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbzMvkIpTAEEORQKvh_hWNzLY5Y7A9k_kO6KmlqTAXbK-9MXE37rE5UqFGgZx0z8Kr-E/exec?action=status");
        const status = (await res.text()).trim().toLowerCase();
        isLive = (status === "live");
        document.getElementById("live-status-text").innerText = isLive ? "LIVE NOW" : "OFFLINE";
        document.getElementById("live-status-dot").style.background = isLive ? "#f52a1f" : "#666";
      } catch { isLive = false; }
    }

    function save() {
      const newItem = { dj: document.getElementById("schDj").value, day: document.getElementById("schDay").value, time: document.getElementById("schTime").value, style: document.getElementById("schStyle").value, show: document.getElementById("schShow").value };
      const current = JSON.parse(localStorage.getItem("myschedule")) || [];
      current.push(newItem);
      localStorage.setItem("myschedule", JSON.stringify(current));
      renderSchedule();
    }

    function del(i) {
      const current = JSON.parse(localStorage.getItem("myschedule")) || [];
      current.splice(i, 1);
      localStorage.setItem("myschedule", JSON.stringify(current));
      renderSchedule();
    }

    function login() {
      if(document.getElementById("user").value === "admin" && document.getElementById("pass").value === "1234") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("schDj").innerHTML = djs.map(d => `<option value="${d.name}">${d.name}</option>`).join("");
      }
    }

    function logout() {
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
    }

    // Inicialização
    loadReplays();
    renderSchedule();
    checkStatus();
    setInterval(checkStatus, 30000);
    document.getElementById("djGrid").innerHTML = djs.map(dj => `<div class="card dj-card"><img src="${dj.img}"><h3>${dj.name}</h3><p style="color:#ff6b6b">${dj.style}</p></div>`).join("");
  </script>
</body>
</html>
