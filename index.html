<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .player {
      position: relative;
      padding-top: 56.25%;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* CONTROLS */
    .controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .control-btn {
      background: rgba(0,0,0,0.7);
      color: white;
      border: 0;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .control-btn:hover {
      background: rgba(0,0,0,0.9);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px 0;
    }

    .card {
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #111;
    }

    .card p {
      font-size: 14px;
      margin-top: 6px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      padding: 20px;
    }

    .modal-content {
      max-width: 1000px;
      margin: 40px auto;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: -45px;
      right: 0;
      background: #00ff88;
      color: black;
      border: 0;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .replay-player {
      position: relative;
      padding-top: 56.25%;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .replay-player video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>DJ LIVE TV</h1>

  <!-- PLAYER -->
  <div class="player">
    <iframe id="kickPlayer"
      src="https://player.kick.com/DJLIVETV?muted=true"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

    <!-- BOTÕES -->
    <div class="controls">
      <button class="control-btn" id="unmuteBtn">🔊</button>
      <button class="control-btn" id="fullscreenBtn">⛶</button>
    </div>
  </div>

  <h2 style="margin-top:40px;">REPLAYS</h2>
  <div id="videos" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeReplay()">CLOSE</button>
    <div class="replay-player" id="replayWrap"></div>
  </div>
</div>

<script>
let hls = null;

/* FULLSCREEN */
document.getElementById("fullscreenBtn").onclick = function() {
  const player = document.querySelector(".player");
  if (player.requestFullscreen) player.requestFullscreen();
};

/* UNMUTE */
document.getElementById("unmuteBtn").onclick = function() {
  const iframe = document.getElementById("kickPlayer");
  iframe.src = "https://player.kick.com/DJLIVETV";
};

/* OPEN REPLAY */
function openReplay(url) {
  const modal = document.getElementById("modal");
  const wrap = document.getElementById("replayWrap");

  modal.style.display = "block";
  wrap.innerHTML = '<video id="video" controls autoplay></video>';

  const video = document.getElementById("video");

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }
}

/* CLOSE */
function closeReplay() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("replayWrap").innerHTML = "";
}

/* LOAD VIDEOS */
async function loadVideos() {
  const container = document.getElementById("videos");

  try {
    const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
    const data = await res.json();

    data.forEach(v => {
      const card = document.createElement("div");
      card.className = "card";

      const thumb = v.thumbnail?.src || "";
      const title = v.session_title || "DJ Set";

      card.innerHTML = `
        <img src="${thumb}">
        <p>${title}</p>
      `;

      card.onclick = () => openReplay(v.source);
      container.appendChild(card);
    });

  } catch(e) {
    container.innerHTML = "Error loading videos";
  }
}

loadVideos();
</script>

</body>
</html>
