<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        /* DJ CLUB DESIGN - HIGH VISIBILITY */
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .main-header { 
            padding: 30px; font-weight: 900; color: #f52a1f; letter-spacing: 6px; font-size: 32px; 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(245, 42, 31, 0.6);
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            from { opacity: 0.8; text-shadow: 0 0 10px rgba(245, 42, 31, 0.6); }
            to { opacity: 1; text-shadow: 0 0 25px rgba(245, 42, 31, 0.9); }
        }

        /* PLAYER CONTAINER */
        .player-box {
            position: relative; width: 94%; max-width: 900px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 24px; border: 4px solid #111;
            overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,0.8); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.is-live .player-box {
            border-color: #f52a1f; box-shadow: 0 0 50px rgba(245, 42, 31, 0.3);
        }

        /* LIVE VIDEO OVERLAY */
        #player-target {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20;
            display: none;
        }
        body.is-live #player-target { display: block; }

        iframe { width: 100%; height: 100%; border: 0; }

        /* --- DJ CLUB OFFLINE UI (HIGH VISIBILITY) --- */
        #offline-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        /* ANIMATED WAVEFORM BACKGROUND */
        .audio-waves {
            position: absolute; width: 100%; height: 100px; bottom: 0;
            background: repeating-linear-gradient(90deg, #f52a1f 0%, #f52a1f 2px, transparent 2px, transparent 15px);
            opacity: 0.1; mask-image: linear-gradient(to top, black, transparent);
            animation: waveMove 1s steps(10) infinite;
        }

        @keyframes waveMove {
            from { transform: translateY(0); opacity: 0.1; }
            50% { transform: translateY(-10px); opacity: 0.2; }
            to { transform: translateY(0); opacity: 0.1; }
        }

        .offline-text-wrap { position: relative; z-index: 15; text-align: center; }

        .brand-name {
            color: #fff; font-weight: 900; font-size: 38px; letter-spacing: 8px; 
            text-transform: uppercase; margin-bottom: 10px; opacity: 0.9;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-light { 
            width: 12px; height: 12px; background: #222; border-radius: 50%; 
            box-shadow: 0 0 0px rgba(255,255,255,0); transition: 0.5s;
        }

        /* OFFLINE PULSE */
        body:not(.is-live) .status-light {
            background: #444; animation: standby 2s infinite;
        }

        @keyframes standby {
            0% { box-shadow: 0 0 0px #444; }
            50% { box-shadow: 0 0 15px #666; background: #666; }
            100% { box-shadow: 0 0 0px #444; }
        }

        .status-msg {
            color: #666; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
        }

        /* --- UNMUTE BUTTON (ULTRA VISIBLE) --- */
        #actionBtn {
            display: none; margin-top: 40px; background: #f52a1f; color: #fff;
            border: none; padding: 22px 60px; border-radius: 100px;
            font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 15px 40px rgba(245, 42, 31, 0.4); transition: all 0.3s;
            z-index: 100;
        }

        #actionBtn:hover { transform: translateY(-3px); scale: 1.05; box-shadow: 0 20px 50px rgba(245, 42, 31, 0.6); }
        #actionBtn:active { transform: translateY(2px); }
        body.is-live #actionBtn { display: inline-block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-box">
        <div id="offline-screen">
            <div class="audio-waves"></div>
            <div class="offline-text-wrap">
                <div class="brand-name">FLASHMIX</div>
                <div class="status-badge">
                    <div class="status-light"></div>
                    <span class="status-msg">Stream Offline</span>
                </div>
            </div>
        </div>

        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 Listen Live</button>

    <script>
        // FIREBASE SYNC (IMAC KILL-SWITCH)
        const DATABASE_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let localStreamStatus = null;

        async function syncWithOBS() {
            try {
                // Fetch fresh data from Firebase (updates instantly from your iMac)
                const response = await fetch(`${DATABASE_URL}?v=${Date.now()}`);
                const isLive = await response.json();

                if (isLive !== localStreamStatus) {
                    localStreamStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-target');
                    const btn = document.getElementById('actionBtn');

                    if (isLive === true) {
                        // IMAC IS STREAMING -> SHOW PLAYER
                        body.classList.add('is-live');
                        target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                    } else {
                        // IMAC STOPPED -> KILL PLAYER INSTANTLY
                        body.classList.remove('is-live');
                        target.innerHTML = ""; 
                        window.stop(); // Stop buffering
                    }
                }
            } catch (err) { console.error("Sync Error"); }
        }

        function enableAudio() {
            const target = document.getElementById('player-target');
            // Reload iframe with sound enabled
            target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        // Check every 2 seconds for instant response
        setInterval(syncWithOBS, 2000);
        syncWithOBS();

    </script>
</body>
</html>
