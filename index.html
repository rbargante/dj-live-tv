<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .player {
      position: relative;
      padding-top: 56.25%;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .player iframe,
    .player video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .control-btn {
      background: rgba(0,0,0,0.7);
      color: white;
      border: 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .live-btn {
      background: red;
      color: white;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px 0;
    }

    .card {
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #111;
    }

    .card p {
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>DJ LIVE TV</h1>

  <!-- PLAYER -->
  <div class="player" id="playerWrap">

    <!-- começa com LIVE -->
    <iframe id="livePlayer"
      src="https://player.kick.com/DJLIVETV?muted=true"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="control-btn" id="unmuteBtn">🔊</button>
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn" style="display:none;">🔴 LIVE</button>
    </div>

  </div>

  <h2 style="margin-top:40px;">REPLAYS</h2>
  <div id="videos" class="grid"></div>

</div>

<script>
let hls = null;
let currentMode = "live";

/* FULLSCREEN */
document.getElementById("fullscreenBtn").onclick = () => {
  document.getElementById("playerWrap").requestFullscreen();
};

/* UNMUTE */
document.getElementById("unmuteBtn").onclick = () => {
  if (currentMode === "live") {
    document.getElementById("livePlayer").src = "https://player.kick.com/DJLIVETV";
  }
};

/* BACK TO LIVE */
document.getElementById("backLiveBtn").onclick = () => {
  loadLive();
};

/* LOAD LIVE */
function loadLive() {
  const wrap = document.getElementById("playerWrap");

  if (hls) {
    hls.destroy();
    hls = null;
  }

  wrap.innerHTML = `
    <iframe id="livePlayer"
      src="https://player.kick.com/DJLIVETV"
      allow="autoplay; fullscreen"
      allowfullscreen></iframe>

    <div class="controls">
      <button class="control-btn" id="unmuteBtn">🔊</button>
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn" style="display:none;">🔴 LIVE</button>
    </div>
  `;

  currentMode = "live";
  attachControls();
}

/* LOAD REPLAY */
function loadReplay(url) {
  const wrap = document.getElementById("playerWrap");

  wrap.innerHTML = `
    <video id="video" controls autoplay playsinline></video>

    <div class="controls">
      <button class="control-btn" id="fullscreenBtn">⛶</button>
      <button class="control-btn live-btn" id="backLiveBtn">🔴 LIVE</button>
    </div>
  `;

  const video = document.getElementById("video");

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }

  currentMode = "replay";
  attachControls();
}

/* REATTACH EVENTS */
function attachControls() {
  const fs = document.getElementById("fullscreenBtn");
  if (fs) {
    fs.onclick = () => document.getElementById("playerWrap").requestFullscreen();
  }

  const liveBtn = document.getElementById("backLiveBtn");
  if (liveBtn) {
    liveBtn.onclick = loadLive;
  }

  const unmute = document.getElementById("unmuteBtn");
  if (unmute) {
    unmute.onclick = () => {
      document.getElementById("livePlayer").src = "https://player.kick.com/DJLIVETV";
    };
  }
}

/* LOAD VIDEOS */
async function loadVideos() {
  const container = document.getElementById("videos");

  try {
    const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
    const data = await res.json();

    data.forEach(v => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${v.thumbnail?.src || ''}">
        <p>${v.session_title || 'DJ Set'}</p>
      `;

      card.onclick = () => loadReplay(v.source);
      container.appendChild(card);
    });

  } catch {
    container.innerHTML = "Error loading videos";
  }
}

loadVideos();
</script>

</body>
</html>
