<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; }
    .container { max-width: 1120px; margin: 0 auto; padding: 20px; }
    
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 60px; font-size: 32px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #f52a1f; display: table; margin: 0 auto 30px; padding-bottom: 10px; }
    
    /* GRID DE DJs */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
    .dj-card { background: #0a0a0a; border-radius: 20px; border: 1px solid #222; overflow: hidden; text-align: center; padding-bottom: 20px; transition: 0.3s; }
    .dj-card:hover { border-color: #f52a1f; transform: translateY(-5px); }
    .dj-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }
    .dj-card h3 { margin: 15px 0 5px; font-size: 22px; }
    .dj-card .style { color: #f52a1f; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }

    /* ADMIN */
    .admin-section { background: #0a0a0a; border: 2px solid #f52a1f; border-radius: 25px; padding: 30px; margin-top: 50px; display: none; }
    .admin-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .tab-panel { display: none; padding-top: 20px; }
    .tab-panel.active { display: block; }

    footer { margin-top: 100px; padding: 40px; border-top: 1px solid #222; text-align: center; color: #555; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#top">Live</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Schedule</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container" id="top">
    <h1 style="text-align:center; font-size: 50px;">DJ LIVE TV</h1>

    <div class="player">
      <iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <h2 class="section-title" id="djs">Resident DJs</h2>
    <div id="djGrid" class="grid">
      </div>

    <h2 class="section-title" id="schedule">Weekly Schedule</h2>
    <div id="scheduleList">
       </div>

    <div id="adminArea" class="admin-section">
      <h2 style="text-align:center; color:#f52a1f">PAINEL DE CONTROLO</h2>
      
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Password Admin">
        <button class="admin-btn" onclick="login()">Entrar</button>
      </div>

      <div id="dashBox" style="display:none">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
           <button onclick="showTab('tabDjs')" style="flex:1; padding:10px; cursor:pointer">DJs</button>
           <button onclick="showTab('tabSch')" style="flex:1; padding:10px; cursor:pointer">Horário</button>
        </div>

        <div id="tabDjs" class="tab-panel active">
          <input id="djName" class="admin-input" placeholder="Nome do DJ">
          <input id="djImg" class="admin-input" placeholder="Link da Foto (Ex: https://site.com/foto.jpg)">
          <input id="djStyle" class="admin-input" placeholder="Estilo (House, Techno, etc)">
          <button class="admin-btn" onclick="saveDJ()">Adicionar DJ ao Site</button>
        </div>

        <div id="tabSch" class="tab-panel">
          <textarea id="schText" class="admin-input" rows="5" placeholder="Segunda 21h: DJ Mix..."></textarea>
          <button class="admin-btn" onclick="saveSch()">Guardar Horário</button>
        </div>
        
        <button onclick="location.reload()" style="margin-top:20px; width:100%; padding:10px; background:#222; color:#fff; border:none; cursor:pointer">Sair e Ver Site</button>
      </div>
    </div>
  </div>

  <footer>
    <strong>FLASHMIX TV © 2026</strong>
  </footer>

  <script>
    // URL COM .JSON NO FINAL PARA O FIREBASE FUNCIONAR
    const DB_BASE = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";

    async function loadData() {
      const res = await fetch(DB_BASE + ".json");
      const data = await res.json();
      if(data) {
        // Carregar DJs
        if(data.djs) {
          const djItems = Object.values(data.djs);
          document.getElementById('djGrid').innerHTML = djItems.map(d => `
            <div class="dj-card">
              <img src="${d.img || 'https://via.placeholder.com/300'}" alt="${d.name}">
              <h3>${d.name}</h3>
              <div class="style">${d.style}</div>
            </div>`).join('');
        }
        // Carregar Schedule
        if(data.schedule) {
          document.getElementById('scheduleList').innerHTML = data.schedule.split('\n').map(l => `
            <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid #f52a1f;">${l}</div>
          `).join('');
        }
      }
    }

    function toggleAdmin() {
      const a = document.getElementById('adminArea');
      a.style.display = a.style.display === 'block' ? 'none' : 'block';
      a.scrollIntoView({behavior: "smooth"});
    }

    function login() {
      if(document.getElementById('pass').value === '1234') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashBox').style.display = 'block';
      } else { alert("Senha errada!"); }
    }

    function showTab(id) {
      document.getElementById('tabDjs').classList.remove('active');
      document.getElementById('tabSch').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    async function saveDJ() {
      const dj = {
        name: document.getElementById('djName').value,
        img: document.getElementById('djImg').value,
        style: document.getElementById('djStyle').value
      };
      // Enviar para o Firebase
      await fetch(DB_BASE + "djs.json", {
        method: 'POST',
        body: JSON.stringify(dj)
      });
      alert("DJ Guardado!");
      loadData();
    }

    async function saveSch() {
      const text = document.getElementById('schText').value;
      await fetch(DB_BASE + "schedule.json", {
        method: 'PUT',
        body: JSON.stringify(text)
      });
      alert("Horário Guardado!");
      loadData();
    }

    loadData();
  </script>
</body>
</html>
