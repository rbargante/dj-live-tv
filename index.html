<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 12px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; transition: 0.3s; }
    .nav-links a:hover { color: #fff; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* BADGE & PLAYER */
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 11px; font-weight: 900; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
    .is-live { border-color: #f52a1f !important; color: #f52a1f; }
    .is-live #statusDot { background: #f52a1f !important; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 80px; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #fff; margin-bottom: 40px; }
    
    /* VÍDEOS (GRID) */
    .grid-vids { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card-vid { background: #0a0a0a; border-radius: 10px; border: 1px solid #1a1a1a; overflow: hidden; transition: 0.3s; cursor: pointer; }
    .card-vid:hover { border-color: #f52a1f; transform: translateY(-5px); }
    .card-vid img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .card-vid h3 { font-size: 14px; padding: 12px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* DJs (MAIS PEQUENOS) */
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .card-dj { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; padding: 15px; text-align: center; transition: 0.3s; }
    .card-dj img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #222; }
    .card-dj h3 { font-size: 16px; margin: 5px 0; }
    .card-dj p { font-size: 11px; color: #f52a1f; font-weight: 800; text-transform: uppercase; margin: 0; }

    /* SCHEDULE (PROFESSIONAL) */
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 120px 1fr 100px; padding: 15px 20px; border-bottom: 1px solid #111; align-items: center; }
    .sch-row:last-child { border-bottom: none; }
    .sch-time { font-family: monospace; color: #f52a1f; font-weight: bold; font-size: 16px; }
    .sch-info { font-weight: 600; font-size: 15px; }
    .sch-tag { font-size: 10px; background: #222; padding: 4px 8px; border-radius: 4px; text-align: center; color: #888; }

    /* BOTÕES VER MAIS */
    .btn-more { display: block; margin: 30px auto; background: none; border: 1px solid #333; color: #888; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
    .btn-more:hover { border-color: #f52a1f; color: #fff; }

    /* ADMIN */
    .admin-section { background: #050505; border: 1px solid #f52a1f; border-radius: 15px; padding: 30px; margin-top: 50px; display: none; }
    .admin-input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 6px; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer; margin-top: 10px; }

    footer { margin-top: 100px; padding: 50px; text-align: center; color: #333; font-size: 12px; border-top: 1px solid #111; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#replays">Vídeos</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="badge-wrap"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div></div>
    
    <div class="player">
      <iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <div id="secVideos">
      <h2 class="section-title" id="replays">Últimos Sets</h2>
      <div id="videoGrid" class="grid-vids"></div>
      <button id="btnVidsMore" class="btn-more" onclick="toggleVids()">Ver Mais Vídeos</button>
    </div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Resident DJs</h2>
      <div id="djGrid" class="grid-djs"></div>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Broadcast Schedule</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="text-align:center; color:#f52a1f; font-size: 20px;">DASHBOARD CONTROLO</h2>
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Password">
        <button class="admin-btn" onclick="login()">Entrar</button>
      </div>
      
      <div id="dashBox" style="display:none">
        <div style="border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px;">
            <h3>Visibilidade</h3>
            <button id="btnHDj" class="admin-btn" style="background:#222" onclick="toggleField('hideDjs')">DJs: ON</button>
            <button id="btnHSch" class="admin-btn" style="background:#222" onclick="toggleField('hideSch')">Schedule: ON</button>
        </div>
        <div style="border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px;">
            <h3>Emissão</h3>
            <select id="selSt" class="admin-input"><option value="offline">🔴 OFFLINE</option><option value="live">🟢 LIVE NOW</option></select>
            <button class="admin-btn" onclick="saveStatus()">Publicar Status</button>
        </div>
        <div>
            <h3>Adicionar DJ</h3>
            <input id="inDjN" class="admin-input" placeholder="Nome">
            <input id="inDjI" class="admin-input" placeholder="URL Foto">
            <input id="inDjS" class="admin-input" placeholder="Estilo">
            <button class="admin-btn" style="background:green" onclick="saveDJ()">Gravar DJ</button>
        </div>
        <div style="margin-top:20px;">
            <h3>Horário</h3>
            <textarea id="inSch" class="admin-input" rows="4" placeholder="22:00 | Live Mix | Techno"></textarea>
            <button class="admin-btn" onclick="saveSch()">Gravar Horário</button>
        </div>
        <button onclick="location.reload()" class="admin-btn" style="background:#333; margin-top:20px;">Sair e Ver Site</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — VIANA DO CASTELO — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    let allVids = [];
    let showAllVids = false;

    async function load() {
      // Vídeos (Worker)
      try {
        const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        allVids = await rv.json();
        renderVids();
      } catch(e){}

      // Firebase
      try {
        const rf = await fetch(DB + ".json");
        const data = await rf.json();
        
        // Status
        const badge = document.getElementById('statusBadge');
        if(data?.status === 'live') { badge.classList.add('is-live'); document.getElementById('statusText').innerText='LIVE NOW'; }
        else { badge.classList.remove('is-live'); document.getElementById('statusText').innerText='OFFLINE'; }

        // Hide/Show
        document.getElementById('secDjs').style.display = data?.hideDjs ? 'none' : 'block';
        document.getElementById('secSch').style.display = data?.hideSch ? 'none' : 'block';
        if(data?.hideDjs) document.getElementById('btnHDj').innerText = "DJs: HIDDEN";
        if(data?.hideSch) document.getElementById('btnHSch').innerText = "Schedule: HIDDEN";

        // DJs
        const djsList = data?.djs ? Object.values(data.djs) : [{name:"DJ Ricardo", img:"https://via.placeholder.com/150", style:"House"}];
        document.getElementById('djGrid').innerHTML = djsList.map(d=>`<div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');

        // Schedule Professional
        const sch = data?.schedule || "22:00 | Weekend Mix | House\n23:30 | Late Night | Techno";
        document.getElementById('scheduleList').innerHTML = sch.split('\n').map(l=>{
            const [time, title, tag] = l.split('|');
            return `<div class="sch-row"><div class="sch-time">${time||''}</div><div class="sch-info">${title||''}</div><div class="sch-tag">${tag||'LIVE'}</div></div>`;
        }).join('');
      } catch(e){}
    }

    function renderVids() {
      const limit = showAllVids ? allVids.length : 4;
      document.getElementById('videoGrid').innerHTML = allVids.slice(0, limit).map(v=>`<div class="card-vid" onclick="window.open('${v.source}','_self')"><img src="${v.thumbnail.src}"><h3>${v.session_title}</h3></div>`).join('');
      document.getElementById('btnVidsMore').innerText = showAllVids ? "Ver Menos" : "Ver Mais Vídeos";
    }

    function toggleVids() { showAllVids = !showAllVids; renderVids(); }
    function toggleAdmin() { document.getElementById('adminArea').style.display='block'; document.getElementById('adminArea').scrollIntoView(); }
    function login() { if(document.getElementById('pass').value==='1234') { document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; } }
    
    async function saveStatus() { await fetch(DB+"status.json", {method:'PUT', body:JSON.stringify(document.getElementById('selSt').value)}); alert("OK"); load(); }
    async function saveSch() { await fetch(DB+"schedule.json", {method:'PUT', body:JSON.stringify(document.getElementById('inSch').value)}); alert("OK"); load(); }
    async function saveDJ() {
        const dj = {name:document.getElementById('inDjN').value, img:document.getElementById('inDjI').value, style:document.getElementById('inDjS').value};
        await fetch(DB+"djs.json", {method:'POST', body:JSON.stringify(dj)}); alert("OK"); load();
    }
    async function toggleField(f) {
        const res = await fetch(DB+f+".json");
        const val = await res.json();
        await fetch(DB+f+".json", {method:'PUT', body:JSON.stringify(!val)});
        load();
    }

    load();
  </script>
</body>
</html>
