<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://archive.org">
    <title>FLASHMIX.TV | FAST THEATER</title>
    <style>
        :root { --neon-red: #f52a1f; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .main-header { 
            padding: 20px; font-weight: 900; color: #ffffff; 
            letter-spacing: 10px; font-size: clamp(26px, 6vw, 45px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        /* --- MAIN PLAYER STAGE --- */
        .player-stage {
            position: relative; width: 98%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 30px; border: 5px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(245, 42, 31, 0.2); overflow: hidden; margin-bottom: 20px;
        }

        body.is-live .player-stage, body.viewing-archive .player-stage {
            border-color: transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box;
            background-size: 200% 100%; animation: neonFlow 1.2s linear infinite;
            box-shadow: 0 0 60px rgba(245, 42, 31, 0.6);
        }

        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        #player-content { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #player-content, body.viewing-archive #player-content { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        #standby-ui {
            position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .dot { width: 18px; height: 18px; background: var(--neon-red); border-radius: 50%; box-shadow: 0 0 15px var(--neon-red); animation: blink 1s infinite; margin-bottom: 10px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- LIBRARY GRID --- */
        .container { width: 98%; max-width: 1100px; }
        .row-title { color: var(--neon-red); font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin: 40px 0 25px 0; border-left: 6px solid var(--neon-red); padding-left: 15px; }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .video-card { background: #080808; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; }
        .video-card:hover { border-color: var(--neon-red); transform: translateY(-5px); }
        
        .thumb-box { 
            width: 100%; aspect-ratio: 1 / 1; background: #111; 
            background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; 
        }
        .play-tag { background: rgba(245, 42, 31, 0.9); color: #fff; width: 100%; padding: 8px; text-align: center; font-size: 9px; font-weight: bold; letter-spacing: 2px; }
        
        .video-info { padding: 15px; text-align: center; }
        .video-info h4 { margin: 0; font-size: 11px; color: #fff; text-transform: uppercase; letter-spacing: 1px; height: 30px; overflow: hidden; }

        #unmuteBtn { display: none; margin: 0 auto 20px auto; background: var(--neon-red); color: #fff; border: none; padding: 15px 40px; border-radius: 100px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        body.is-live #unmuteBtn { display: block; }
    </style>
</head>
<body id="app">

    <div class="main-header" onclick="window.location.reload()">FLASHMIX.TV</div>

    <div class="player-stage" id="main-stage">
        <div id="standby-ui">
            <div style="font-size: clamp(30px, 10vw, 65px); letter-spacing: 12px; margin-bottom: 15px;">FLASHMIX</div>
            <div class="dot"></div>
            <span style="font-size: 20px; letter-spacing: 5px; font-weight: 900;">OFFLINE</span>
        </div>
        <div id="player-content"></div>
    </div>

    <button id="unmuteBtn" onclick="enableAudio()">🔊 UNMUTE LIVE</button>

    <div class="container">
        <div class="row-title">Flashmix Video Library</div>
        <div id="library-list" class="library-grid">
            <p style="color:#444;">Connecting to archives...</p>
        </div>
    </div>

    <script>
        const FIREBASE = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        const UPLOADER = "ricardobargante%40live.com";
        let liveStatus = null;
        let isReplayMode = false;

        async function fetchArchive() {
            try {
                const res = await fetch(`https://archive.org/advancedsearch.php?q=uploader%3A%28${UPLOADER}%29&fl%5B%5D=identifier&fl%5B%5D=title&sort%5B%5D=addeddate+desc&output=json`);
                const data = await res.json();
                const list = document.getElementById('library-list');
                
                if (data.response.docs.length > 0) {
                    list.innerHTML = "";
                    data.response.docs.forEach(doc => {
                        list.innerHTML += `
                            <div class="video-card" onclick="openTheater('${doc.identifier}')">
                                <div class="thumb-box" style="background-image: url('https://archive.org/services/img/${doc.identifier}')">
                                    <div class="play-tag">WATCH ON MAIN STAGE</div>
                                </div>
                                <div class="video-info">
                                    <h4>${doc.title}</h4>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) { list.innerHTML = "<p>Offline</p>"; }
        }

        function openTheater(id) {
            isReplayMode = true;
            const body = document.getElementById('app');
            const target = document.getElementById('player-content');
            
            body.classList.remove('is-live');
            body.classList.add('viewing-archive');
            
            // Adicionado autoplay=1 e muting zero para carregar mais rápido
            target.innerHTML = `<iframe src="https://archive.org/embed/${id}&autoplay=1" allowfullscreen></iframe>`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function syncLive() {
            if (isReplayMode) return;
            try {
                const r = await fetch(`${FIREBASE}?t=${Date.now()}`);
                const isLive = await r.json();
                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-content');
                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=true" allowfullscreen></iframe>`;
                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = "";
                    }
                }
            } catch (e) {}
        }

        function enableAudio() {
            if (!isReplayMode) {
                document.getElementById('player-content').innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>`;
            }
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        setInterval(syncLive, 4000);
        syncLive();
        fetchArchive();
    </script>
</body>
</html>
