<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    /* DESIGN ORIGINAL + MELHORIAS */
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.88); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.08); }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; gap: 16px; }
    .logo { font-weight: 800; font-size: 17px; color: #fff; }
    .nav-links a { color: #cfcfcf; text-decoration: none; font-size: 14px; font-weight: 700; padding: 8px 10px; }
    .container { max-width: 1120px; margin: 0 auto; padding: 14px; }
    h1 { text-align: center; font-size: 56px; margin-bottom: 14px; text-transform: uppercase; }
    
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    #live-status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; background: #2b2b2b; border: 1px solid rgba(255,255,255,.12); }
    #live-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    
    .now-playing-bar { background: rgba(245, 42, 31, 0.15); border: 1px solid #f52a1f; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; display: none; }
    
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 50px; font-size: 38px; text-transform: uppercase; border-bottom: 2px solid #f52a1f; display: table; margin-left: auto; margin-right: auto; padding-bottom: 5px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: #0d0d0d; border-radius: 16px; border: 1px solid rgba(255,255,255,.08); overflow: hidden; text-align: center; padding-bottom: 15px; }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    
    .schedule-list { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .schedule-item { display: grid; grid-template-columns: 100px 1fr 1fr; background: #0d0d0d; padding: 15px; border-radius: 12px; border: 1px solid #222; align-items: center; }

    /* ADMIN COMPLETO */
    .admin-box { background: #111; border: 2px solid #f52a1f; border-radius: 20px; padding: 25px; margin-top: 50px; display: none; }
    .admin-input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    footer { margin-top: 60px; padding: 40px 20px; border-top: 1px solid #222; text-align: center; color: #777; font-size: 14px; }
    #backToTop { position:fixed; right:20px; bottom:20px; background:#f52a1f; color:#fff; border:none; border-radius:50%; width:42px; height:42px; cursor:pointer; display:none; }

    @media (max-width: 768px) { h1 { font-size: 32px; } .schedule-item { grid-template-columns: 1fr; text-align: center; gap: 5px; } }
  </style>
</head>
<body>

  <div class="top-nav">
    <div class="nav-inner">
      <div class="logo">DJ LIVE TV</div>
      <div class="nav-links">
        <a href="#top">Início</a>
        <a href="#replays">Replays</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="border:1px solid #444">ADMIN</a>
      </div>
    </div>
  </div>

  <div class="container" id="top">
    <h1>DJ LIVE TV</h1>

    <div class="badge-wrap">
      <div id="live-status-badge">
        <span id="live-status-dot"></span>
        <span id="live-status-text">OFFLINE</span>
      </div>
    </div>

    <div id="trackBar" class="now-playing-bar">
      <small style="color: #f52a1f; font-weight: bold;">NO AR:</small><br>
      <strong id="trackTitle" style="font-size: 22px;">---</strong>
    </div>

    <div class="player">
      <iframe id="livePlayer" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <div id="adminPanel" class="admin-box">
      <h2 style="text-align:center; color:#f52a1f">PAINEL DE CONTROLO</h2>
      <div id="loginArea">
        <input id="adminPass" type="password" class="admin-input" placeholder="Senha Admin">
        <button class="admin-btn" onclick="checkPass()">ENTRAR</button>
      </div>
      
      <div id="controlArea" style="display:none">
        <h3>GERAL</h3>
        <select id="statusInput" class="admin-input">
          <option value="offline">OFFLINE</option>
          <option value="live">LIVE (No Ar)</option>
        </select>
        <input id="nowPlayingInput" class="admin-input" placeholder="Música atual">
        
        <h3>DJs (Lista separada por vírgulas)</h3>
        <textarea id="djsInput" class="admin-input" rows="3" placeholder="DJ Ricardo, DJ Sofia..."></textarea>
        
        <h3>HORÁRIO (Texto livre)</h3>
        <textarea id="scheduleInput" class="admin-input" rows="4" placeholder="Segunda 21h: DJ Ricardo..."></textarea>

        <button class="admin-btn" onclick="saveFirebase()">GUARDAR TUDO NO FIREBASE</button>
      </div>
    </div>

    <h2 class="section-title" id="replays">REPLAYS</h2>
    <div id="videoGrid" class="grid"></div>

    <h2 class="section-title" id="djs">OUR DJs</h2>
    <div id="djGrid" class="grid"></div>

    <h2 class="section-title" id="schedule">SCHEDULE</h2>
    <div id="scheduleList" class="schedule-list"></div>

  </div>

  <footer>
    <div id="footerText">DJ LIVE TV - Especialistas em Animação</div>
    <div style="margin-top:10px; color:#444">© 2026 DJ LIVE TV. Todos os direitos reservados.</div>
  </footer>

  <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script>
    // LINK DO TEU NOVO FIREBASE
    const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/.json";

    // 1. CARREGAR DADOS DO FIREBASE
    async function loadData() {
      try {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if(data) {
          // Status e Música
          document.getElementById("live-status-text").textContent = data.status === "live" ? "LIVE NOW" : "OFFLINE";
          document.getElementById("live-status-dot").style.background = data.status === "live" ? "#f52a1f" : "#666";
          if(data.now_playing) {
            document.getElementById("trackBar").style.display = "block";
            document.getElementById("trackTitle").textContent = data.now_playing;
          } else {
            document.getElementById("trackBar").style.display = "none";
          }

          // Renderizar DJs
          if(data.djs_list) {
            const djNames = data.djs_list.split(",");
            document.getElementById("djGrid").innerHTML = djNames.map(name => `
              <div class="card">
                <img src="https://via.placeholder.com/400x225/111/fff?text=${name.trim()}">
                <p style="font-weight:bold; font-size:18px; margin-top:10px;">${name.trim()}</p>
              </div>
            `).join('');
          }

          // Renderizar Horário
          if(data.schedule_text) {
            const lines = data.schedule_text.split("\n");
            document.getElementById("scheduleList").innerHTML = lines.map(line => `
              <div class="schedule-item">
                <div style="color:#f52a1f; font-weight:bold">INFO</div>
                <div style="color:#fff">${line}</div>
                <div style="color:#555; text-align:right">Disponível</div>
              </div>
            `).join('');
          }
        }
      } catch(e) { console.log("Firebase error"); }
    }

    // 2. ADMIN FUNCTIONS
    function toggleAdmin() {
      const panel = document.getElementById("adminPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
      panel.scrollIntoView({behavior: "smooth"});
    }

    function checkPass() {
      if(document.getElementById("adminPass").value === "1234") {
        document.getElementById("loginArea").style.display = "none";
        document.getElementById("controlArea").style.display = "block";
      }
    }

    async function saveFirebase() {
      const data = {
        status: document.getElementById("statusInput").value,
        now_playing: document.getElementById("nowPlayingInput").value,
        djs_list: document.getElementById("djsInput").value,
        schedule_text: document.getElementById("scheduleInput").value
      };
      
      await fetch(DB_URL, {
        method: 'PUT',
        body: JSON.stringify(data)
      });
      alert("SITE ATUALIZADO!");
      location.reload();
    }

    // 3. REPLAYS DO WORKER
    async function loadReplays() {
      const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
      const vids = await res.json();
      document.getElementById("videoGrid").innerHTML = vids.slice(0,4).map(v => `
        <div class="card" onclick="location.href='${v.source}'" style="cursor:pointer">
          <img src="${v.thumbnail.src}">
          <p>${v.session_title}</p>
        </div>
      `).join('');
    }

    window.onscroll = () => { document.getElementById('backToTop').style.display = window.scrollY > 300 ? 'block' : 'none'; };

    loadData();
    loadReplays();
    setInterval(loadData, 5000); // Atualiza status a cada 5s
  </script>
</body>
</html>
