<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Live TV</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}

.player{
width:100%;
aspect-ratio:16/9;
background:#000;
border-radius:16px;
overflow:hidden;
margin-bottom:20px;
}

.schedule-card{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px;
border-radius:14px;
border:1px solid #222;
margin-bottom:12px;
transition:0.3s;
}

.schedule-card.live{
border:1px solid red;
box-shadow:0 0 15px rgba(255,0,0,0.4);
}

.dj-info{display:flex;align-items:center;gap:12px}
.dj-img{
width:50px;height:50px;border-radius:50%;
background:#333;overflow:hidden;
}

.dj-img.live{
border:2px solid red;
box-shadow:0 0 10px red;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px red}
50%{box-shadow:0 0 20px red}
100%{box-shadow:0 0 5px red}
}

.badge{
padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;
}
.live-badge{background:red}
.next-badge{background:#333}

.footer{text-align:center;margin-top:40px;color:#777}

</style>
</head>
<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<div class="player">
<iframe src="https://player.kick.com/DJLIVETV" style="width:100%;height:100%;border:0"></iframe>
</div>

<div id="schedule"></div>

<p style="text-align:center;margin-top:20px">
<a href="#" onclick="toggleAdmin()" style="color:#aaa">Admin login</a>
</p>

<div id="admin" style="display:none;text-align:center;margin-top:20px">
<h2>ADMIN</h2>
<p>Demo login</p>
</div>

<div class="footer">
DJ Live TV © 2026
</div>

</div>

<script>
const schedule=[
{dj:"DJ Sofia",time:"18:00",img:""},
{dj:"DJ Marco",time:"20:00",img:""},
{dj:"DJ Sofia",time:"21:00",img:""},
{dj:"DJ Ricardo",time:"22:00",img:""},
{dj:"DJ Ricardo",time:"23:00",img:""}
]

function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function toMin(t){const[h,m]=t.split(":");return h*60+Number(m)}

function render(){
const now=nowMin()
const sorted=[...schedule].sort((a,b)=>toMin(a.time)-toMin(b.time))

let current=null
let next=null

for(let i=0;i<sorted.length;i++){
if(now>=toMin(sorted[i].time)) current=sorted[i]
if(now<toMin(sorted[i].time)){next=sorted[i];break}
}

const list=[]
if(current) list.push({...current,status:"live"})
if(next) list.push({...next,status:"next"})

sorted.forEach(s=>{
if(s!==current && s!==next) list.push({...s,status:""})
})

const el=document.getElementById("schedule")
el.innerHTML=""

list.forEach(item=>{
const div=document.createElement("div")
div.className="schedule-card "+(item.status==="live"?"live":"")

let badge=""
if(item.status==="live") badge='<span class="badge live-badge">LIVE NOW</span>'
if(item.status==="next") badge='<span class="badge next-badge">NEXT</span>'

const imgClass=item.status==="live"?"dj-img live":"dj-img"


div.innerHTML=`
<div class="dj-info">
<div class="${imgClass}"></div>
<div>
<strong>${item.dj}</strong><br>
${item.time}
</div>
</div>
<div>${badge}</div>
`

el.appendChild(div)
})
}

function toggleAdmin(){
const el=document.getElementById("admin")
el.style.display=el.style.display==="none"?"block":"none"
}

render()
setInterval(render,60000)
</script>

</body>
</html>
