<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    /* DESIGN ORIGINAL + CORREÇÕES */
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.08); }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; }
    .logo { font-weight: 800; font-size: 18px; color: #f52a1f; text-transform: uppercase; }
    .nav-links a { color: #cfcfcf; text-decoration: none; font-size: 14px; font-weight: 700; padding: 8px 12px; transition: 0.3s; }
    .nav-links a:hover { color: #fff; }
    
    .container { max-width: 1120px; margin: 0 auto; padding: 14px; }
    h1 { text-align: center; font-size: clamp(30px, 8vw, 56px); margin: 20px 0; text-transform: uppercase; }
    
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
    #live-status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; border-radius: 999px; background: #1a1a1a; border: 1px solid #333; font-weight: bold; }
    #live-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    
    /* BARRA DE MÚSICA */
    .now-playing-bar { background: rgba(245, 42, 31, 0.1); border: 1px solid #f52a1f; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; display: none; }
    
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid #222; box-shadow: 0 0 40px rgba(245, 42, 31, 0.15); }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 60px; font-size: 32px; text-transform: uppercase; border-bottom: 3px solid #f52a1f; display: table; margin-left: auto; margin-right: auto; padding-bottom: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: #0d0d0d; border-radius: 16px; border: 1px solid #222; overflow: hidden; text-align: center; padding-bottom: 15px; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: #f52a1f; }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    
    .schedule-list { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .schedule-item { display: grid; grid-template-columns: 80px 1fr 100px; background: #0d0d0d; padding: 18px; border-radius: 14px; border: 1px solid #222; align-items: center; }

    /* ADMIN PANEL */
    .admin-box { background: #0a0a0a; border: 2px solid #f52a1f; border-radius: 20px; padding: 30px; margin-top: 60px; display: none; }
    .admin-input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
    
    footer { margin-top: 80px; padding: 50px 20px; border-top: 1px solid #222; text-align: center; color: #666; font-size: 14px; line-height: 1.6; }
    #backToTop { position:fixed; right:20px; bottom:20px; background:#f52a1f; color:#fff; border:none; border-radius:50%; width:48px; height:48px; cursor:pointer; display:none; z-index:999; font-size: 20px; }

    @media (max-width: 768px) { .schedule-item { grid-template-columns: 1fr; text-align: center; gap: 8px; } .nav-links { display: none; } }
  </style>
</head>
<body>

  <div class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#top">Live</a>
        <a href="#replays">Replays</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Schedule</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">⚙️ ADMIN</a>
      </div>
    </div>
  </div>

  <div class="container" id="top">
    <h1>DJ LIVE TV</h1>

    <div class="badge-wrap">
      <div id="live-status-badge">
        <span id="live-status-dot"></span>
        <span id="live-status-text">OFFLINE</span>
      </div>
    </div>

    <div id="trackBar" class="now-playing-bar">
      <div style="color: #f52a1f; font-weight: bold; font-size: 13px; margin-bottom: 5px;">ON AIR:</div>
      <div id="trackTitle" style="font-size: 24px; font-weight: 800; letter-spacing: -0.5px;">---</div>
    </div>

    <div class="player">
      <iframe id="livePlayer" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <div id="adminPanel" class="admin-box">
      <h2 style="text-align:center; color:#f52a1f; margin-bottom: 25px;">CONTROL DASHBOARD</h2>
      <div id="loginArea">
        <input id="adminPass" type="password" class="admin-input" placeholder="Password Admin">
        <button class="admin-btn" onclick="checkPass()">ENTRAR NO SISTEMA</button>
      </div>
      
      <div id="controlArea" style="display:none">
        <label>Status da TV:</label>
        <select id="statusInput" class="admin-input">
          <option value="offline">🔴 OFFLINE</option>
          <option value="live">🟢 LIVE NOW</option>
        </select>
        
        <label>Música Atual (Texto):</label>
        <input id="nowPlayingInput" class="admin-input" placeholder="Ex: DJ Ricardo - Live Mix 2026">
        
        <label>Nossos DJs (Separados por vírgula):</label>
        <textarea id="djsInput" class="admin-input" rows="3" placeholder="DJ Ricardo, DJ Sofia, DJ André..."></textarea>
        
        <label>Horário da Semana:</label>
        <textarea id="scheduleInput" class="admin-input" rows="5" placeholder="Segunda às 21h: Warmup House&#10;Sexta às 23h: Clubbing Time"></textarea>

        <button class="admin-btn" onclick="saveFirebase()">PUBLICAR TODAS AS ALTERAÇÕES</button>
        <button class="admin-btn" style="background:#333;" onclick="toggleAdmin()">FECHAR</button>
      </div>
    </div>

    <h2 class="section-title" id="replays">LATEST REPLAYS</h2>
    <div id="videoGrid" class="grid"></div>

    <h2 class="section-title" id="djs">RESIDENT DJs</h2>
    <div id="djGrid" class="grid"></div>

    <h2 class="section-title" id="schedule">WEEKLY SCHEDULE</h2>
    <div id="scheduleList" class="schedule-list"></div>

  </div>

  <footer>
    <div style="font-weight: bold; color: #fff; font-size: 18px; margin-bottom: 10px;">FLASHMIX TV</div>
    <div>Live streaming, DJ Sets & Eventos em Direto.</div>
    <div style="margin-top:20px; color:#444;">© 2026 FLASHMIX. Todos os direitos reservados.</div>
  </footer>

  <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script>
    // LIGAÇÃO AO TEU FIREBASE REAL
    const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/.json";

    // 1. SINCRONIZAR TUDO DO FIREBASE
    async function loadData() {
      try {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if(data) {
          // Status
          const isLive = data.status === "live";
          document.getElementById("live-status-text").textContent = isLive ? "LIVE NOW" : "OFFLINE";
          document.getElementById("live-status-dot").style.background = isLive ? "#f52a1f" : "#666";
          
          // Música
          if(data.now_playing) {
            document.getElementById("trackBar").style.display = "block";
            document.getElementById("trackTitle").textContent = data.now_playing;
          } else {
            document.getElementById("trackBar").style.display = "none";
          }

          // DJs
          if(data.djs_list) {
            const list = data.djs_list.split(",");
            document.getElementById("djGrid").innerHTML = list.map(name => `
              <div class="card">
                <img src="https://via.placeholder.com/400x225/111/fff?text=${name.trim()}">
                <p style="font-weight:bold; font-size:18px; margin-top:10px;">${name.trim()}</p>
              </div>`).join('');
          }

          // Schedule
          if(data.schedule_text) {
            const lines = data.schedule_text.split("\n");
            document.getElementById("scheduleList").innerHTML = lines.filter(l => l.trim() !== "").map(line => `
              <div class="schedule-item">
                <div style="color:#f52a1f; font-weight:bold; font-size:12px;">TIME</div>
                <div style="color:#fff; font-weight:bold;">${line}</div>
                <div style="color:#444; font-size:12px; text-align:right;">● ON</div>
              </div>`).join('');
          }
        }
      } catch(e) { console.error("Firebase Connection Error"); }
    }

    // 2. ADMIN LÓGICA
    function toggleAdmin() {
      const p = document.getElementById("adminPanel");
      p.style.display = p.style.display === "block" ? "none" : "block";
    }

    function checkPass() {
      if(document.getElementById("adminPass").value === "1234") {
        document.getElementById("loginArea").style.display = "none";
        document.getElementById("controlArea").style.display = "block";
      } else { alert("Acesso Negado!"); }
    }

    async function saveFirebase() {
      const data = {
        status: document.getElementById("statusInput").value,
        now_playing: document.getElementById("nowPlayingInput").value,
        djs_list: document.getElementById("djsInput").value,
        schedule_text: document.getElementById("scheduleInput").value
      };
      await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(data) });
      alert("FLASHMIX TV ATUALIZADA!");
      location.reload();
    }

    // 3. REPLAYS (Vem do teu Worker)
    async function loadReplays() {
      try {
        const res = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await res.json();
        document.getElementById("videoGrid").innerHTML = vids.slice(0,4).map(v => `
          <div class="card" onclick="window.open('${v.source}','_self')" style="cursor:pointer">
            <img src="${v.thumbnail.src}">
            <p style="padding:10px;">${v.session_title}</p>
          </div>`).join('');
      } catch(e) {}
    }

    window.onscroll = () => {
      document.getElementById('backToTop').style.display = window.scrollY > 300 ? 'block' : 'none';
    };

    loadData();
    loadReplays();
    setInterval(loadData, 8000); // Verifica mudanças a cada 8 segundos
  </script>
</body>
</html>
