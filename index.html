<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASHMIX.TV | PRO DJ PLATFORM</title>
    <style>
        :root { --kick-red: #f52a1f; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- HEADER WHITE --- */
        .main-header { 
            padding: 25px; font-weight: 900; color: #ffffff; 
            letter-spacing: 10px; font-size: clamp(26px, 6vw, 45px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            text-align: center; cursor: pointer;
        }

        /* --- STAGE / PLAYER --- */
        .stage {
            position: relative; width: 96%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 35px; border: 5px solid var(--kick-red);
            box-shadow: 0 0 30px rgba(245, 42, 31, 0.2); overflow: hidden; margin-bottom: 20px;
        }

        body.is-live .stage, body.is-replay .stage {
            border: 6px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, var(--kick-red), #ff6b6b, var(--kick-red)) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.2s linear infinite;
            box-shadow: 0 0 60px rgba(245, 42, 31, 0.6);
        }

        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        #screen { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #screen, body.is-replay #screen { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* STANDBY UI */
        #standby {
            position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .brand-name { font-size: clamp(35px, 10vw, 70px); letter-spacing: 15px; margin-bottom: 20px; color: #fff; }
        .status-pill {
            background: rgba(0,0,0,0.6); padding: 15px 40px; border-radius: 100px;
            border: 1px solid rgba(245, 42, 31, 0.3); display: flex; align-items: center; gap: 15px;
        }
        .dot { width: 18px; height: 18px; background: var(--kick-red); border-radius: 50%; box-shadow: 0 0 15px var(--kick-red); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; scale: 1; } 50% { opacity: 0.2; scale: 0.8; } }
        .status-msg { font-size: 30px; font-weight: 900; letter-spacing: 5px; }

        /* --- CONTENT --- */
        .content { width: 96%; max-width: 1100px; padding-bottom: 80px; }
        .row-title { color: var(--kick-red); font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin: 50px 0 25px 0; border-left: 6px solid var(--kick-red); padding-left: 15px; }

        /* VIDEO GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #080808; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--kick-red); transform: translateY(-5px); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; background-size: cover; }
        .card-thumb::after { content: 'PLAY'; font-size: 10px; border: 1px solid #fff; padding: 5px 15px; background: rgba(0,0,0,0.5); }
        .card-info { padding: 15px; }
        .card-info h4 { margin: 0; font-size: 13px; color: #fff; }

        /* DJ LINEUP (6 DJs) */
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .dj-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; padding: 20px; text-align: center; }
        .dj-avatar { width: 80px; height: 80px; background: #1a1a1a; border-radius: 50%; margin: 0 auto 15px; border: 2px solid #333; }
        .dj-box h3 { margin: 0; font-size: 14px; color: #fff; }

        #unmuteBtn { display: none; margin: 20px auto; background: var(--kick-red); color: #fff; border: none; padding: 20px 50px; border-radius: 100px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 30px rgba(245,42,31,0.4); }
        body.is-live #unmuteBtn, body.is-replay #unmuteBtn { display: block; }
    </style>
</head>
<body id="root">

    <div class="main-header" onclick="window.location.reload()">FLASHMIX.TV</div>

    <div class="stage">
        <div id="standby">
            <div class="brand-name">FLASHMIX</div>
            <div class="status-pill">
                <div class="dot"></div>
                <span class="status-msg">OFFLINE</span>
            </div>
        </div>
        <div id="screen"></div>
    </div>

    <button id="unmuteBtn" onclick="toggleAudio()">🔊 UNMUTE SESSION</button>

    <div class="content">
        <div class="row-title">Latest Replays</div>
        <div id="video-list" class="grid">
            <p style="color:#222; padding-left:15px;">Loading latest videos...</p>
        </div>

        <div class="row-title">Our DJ Lineup</div>
        <div class="dj-grid">
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ BARGANTE</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 01</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 02</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 03</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 04</h3></div>
            <div class="dj-box"><div class="dj-avatar"></div><h3>DJ GUEST 05</h3></div>
        </div>
    </div>

    <script>
        const FB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        const CHANNEL = "djlivetv";
        let currentLive = null;
        let isReplay = false;

        // BUSCA AUTOMÁTICA VIA RSS (Resolve o erro do Kick)
        async function loadVideos() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://kick.com/${CHANNEL}/rss`);
                const data = await res.json();
                const list = document.getElementById('video-list');
                list.innerHTML = "";
                data.items.slice(0, 6).forEach(v => {
                    const id = v.link.split('/').pop();
                    list.innerHTML += `
                        <div class="card" onclick="openVideo('${id}')">
                            <div class="card-thumb" style="background-image: url('${v.thumbnail}')"></div>
                            <div class="card-info"><h4>${v.title}</h4></div>
                        </div>`;
                });
            } catch (e) { document.getElementById('video-list').innerHTML = "<p style='color:#333'>Check kick.com/djlivetv</p>"; }
        }

        async function checkLive() {
            if (isReplay) return;
            try {
                const r = await fetch(`${FB_URL}?t=${Date.now()}`);
                const isLive = await r.json();
                if (isLive !== currentLive) {
                    currentLive = isLive;
                    const body = document.getElementById('root');
                    const screen = document.getElementById('screen');
                    if (isLive === true) {
                        body.classList.add('is-live');
                        screen.innerHTML = `<iframe src="https://player.kick.com/${CHANNEL}?muted=true" allowfullscreen></iframe>`;
                    } else {
                        body.classList.remove('is-live');
                        screen.innerHTML = "";
                    }
                }
            } catch (e) {}
        }

        function openVideo(id) {
            isReplay = true;
            document.getElementById('root').classList.add('is-replay');
            document.getElementById('screen').innerHTML = `<iframe src="https://player.kick.com/video/${id}" allowfullscreen></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleAudio() {
            if (!isReplay) {
                document.getElementById('screen').innerHTML = `<iframe src="https://player.kick.com/${CHANNEL}?muted=false" allowfullscreen></iframe>`;
            }
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        setInterval(checkLive, 4000);
        checkLive();
        loadVideos();
    </script>
</body>
</html>
