<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 10px;
}

h1, h2 {
  text-align: center;
}

/* PLAYER */
.player {
  position: relative;
  padding-top: 56.25%;
  border-radius: 12px;
  overflow: hidden;
}

.player iframe,
.player video {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* CONTROLS */
.controls {
  position: absolute;
  bottom: 15px;
  right: 15px;
}

.control-btn {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* REPLAYS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 16px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* DJs */
.dj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.dj-card {
  background: #111;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

.dj-card img {
  width: 100%;
  border-radius: 10px;
  aspect-ratio: 1/1;
  object-fit: cover;
}

/* SCHEDULE */
.schedule {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 20px;
}

.day {
  background: #111;
  padding: 12px;
  border-radius: 12px;
}

/* ADMIN */
.admin {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.admin input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.admin button {
  padding: 12px;
  border-radius: 8px;
  background: red;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<!-- PLAYER -->
<div class="player" id="playerWrap">
  <iframe src="https://player.kick.com/DJLIVETV?muted=true"></iframe>

  <div class="controls">
    <button class="control-btn">🔊</button>
  </div>
</div>

<!-- REPLAYS -->
<h2>REPLAYS</h2>
<div class="grid" id="videos"></div>

<!-- DJs -->
<h2>OUR DJs</h2>

<div class="dj-grid" id="djGrid">

<div class="dj-card">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
<h3>DJ RICARDO</h3>
<p>House / Tech House</p>
</div>

<div class="dj-card">
<img src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91">
<h3>DJ SOFIA</h3>
<p>Deep House / Lounge</p>
</div>

<div class="dj-card">
<img src="https://images.unsplash.com/photo-1516455590571-18256e5bb9ff">
<h3>DJ MARCO</h3>
<p>EDM / Festival</p>
</div>

</div>

<!-- SCHEDULE -->
<h2>SCHEDULE</h2>

<div class="schedule">
<div class="day">
<h3>MONDAY</h3>
<p>18:00 DJ Ricardo</p>
<p>21:00 DJ Sofia</p>
</div>

<div class="day">
<h3>FRIDAY</h3>
<p>20:00 DJ Marco</p>
<p>23:00 DJ Ricardo</p>
</div>

<div class="day">
<h3>SATURDAY</h3>
<p>18:00 DJ Sofia</p>
<p>21:00 DJ Marco</p>
</div>
</div>

<!-- ADMIN -->
<h2>ADD DJ (DEMO)</h2>

<div class="admin">
<input id="name" placeholder="DJ Name">
<input id="img" placeholder="Image URL">
<input id="bio" placeholder="Bio">
<button onclick="addDJ()">ADD</button>
</div>

</div>

<script>
function addDJ() {
  const name = document.getElementById("name").value;
  const img = document.getElementById("img").value;
  const bio = document.getElementById("bio").value;

  const grid = document.getElementById("djGrid");

  const card = document.createElement("div");
  card.className = "dj-card";

  card.innerHTML = `
    <img src="${img}">
    <h3>${name}</h3>
    <p>${bio}</p>
  `;

  grid.appendChild(card);
}
</script>

</body>
</html>
