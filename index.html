<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
    .logo { font-weight: 900; font-size: 16px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 10px; font-weight: 700; padding: 5px 8px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
    
    .player-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #0a0a0a; border: 1px solid #222; margin-top: 10px; display: block; }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    .player-aspect iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    #unmuteOverlay { position: absolute; bottom: 15px; right: 15px; z-index: 100; background: #f52a1f; color: #fff; border: none; padding: 12px 20px; border-radius: 50px; font-weight: 900; font-size: 11px; cursor: pointer; box-shadow: 0 4px 15px rgba(245, 42, 31, 0.4); }
    .section-title { text-align: center; margin: 30px 0 15px; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    .grid-vids { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .card-v { background: #0a0a0a; border-radius: 10px; border: 1px solid #222; cursor: pointer; overflow: hidden; }
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .card-dj { text-align: center; background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a; }
    .card-dj img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #f52a1f; margin-bottom: 8px; }
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 40px 1fr 70px; padding: 12px; border-bottom: 1px solid #111; align-items: center; gap: 8px; }
    .sch-dj-thumb { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
    .sch-time { font-family: monospace; font-size: 13px; font-weight: bold; color: #f52a1f; text-align: right; }
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 20px; margin-top: 40px; display: none; }
    .admin-input { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
    .btn-publish { background: #28a745; color: #fff; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }
    footer { padding: 40px 20px; text-align: center; color: #444; font-size: 10px; }
  </style>
</head>
<body id="mainSite">
  <nav class="top-nav">
    <div class="nav-inner"><div class="logo">FLASHMIX.TV</div><div class="nav-links"><a href="#vids">Sets</a><a href="#djs">DJs</a><a href="#schedule">Horário</a><a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a></div></div>
  </nav>

  <div class="container">
    <div class="player-container">
      <div class="player-aspect"><iframe id="kickIframe" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe></div>
      <button id="unmuteOverlay" onclick="unmutePlayer()">🔊 SOM NO TELEMÓVEL</button>
    </div>

    <div id="vids"><h2 class="section-title">Últimos Sets</h2><div id="videoGrid" class="grid-vids"></div></div>
    <div id="secDjs"><h2 class="section-title" id="djs">Nossa Equipa</h2><div id="djGrid" class="grid-djs"></div></div>
    <div id="secSch"><h2 class="section-title" id="schedule">Broadcast Schedule</h2><div id="scheduleList" class="sch-container"></div></div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center;">COMANDO CLOUD</h2>
      <div id="adminDjList"></div><button onclick="addNewDjField()" class="admin-input" style="background:#222;">+ ADICIONAR DJ</button>
      <div id="adminSchList"></div><button onclick="addNewSchField()" class="admin-input" style="background:#222;">+ ADICIONAR HORÁRIO</button>
      <button class="btn-publish" onclick="saveAll()">☁️ PUBLICAR</button>
    </div>
  </div>
  <footer>FLASHMIX TV — © 2026</footer>

<script>
  const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
  let currentDjs = []; let currentSch = []; let isLiveState = null;

  function unmutePlayer() {
    const iframe = document.getElementById('kickIframe');
    iframe.src = `https://player.kick.com/DJLIVETV?muted=false&r=${Date.now()}`;
    document.getElementById('unmuteOverlay').style.display = 'none';
  }

  // FUNÇÃO AGRESSIVA DE SINCRONIZAÇÃO (4 SEGUNDOS)
  async function syncPlayer() {
    const iframe = document.getElementById('kickIframe');
    try {
      const res = await fetch(`https://calm-violet-826b.ricardobargante.workers.dev/?t=${Date.now()}`, { cache: "no-store" });
      const data = await res.json();
      
      const liveNow = data?.live === true;
      console.log("Estado detetado:", liveNow);

      if (liveNow !== isLiveState) {
        isLiveState = liveNow;
        const currentMuted = iframe.src.includes("muted=false") ? "false" : "true";

        // RESET REAL
        iframe.src = "about:blank"; 
        
        setTimeout(() => {
          iframe.src = `https://player.kick.com/DJLIVETV?muted=${currentMuted}&r=${Date.now()}`;
        }, liveNow ? 250 : 800);
      }
    } catch (e) { console.error("Erro sync", e); }
  }

  async function load() {
    // Check imediato e depois a cada 4 segundos
    await syncPlayer();
    setInterval(syncPlayer, 4000); 

    try {
      const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
      const vids = await rv.json();
      document.getElementById('videoGrid').innerHTML = vids.slice(0, 4).map(v => `<div class="card-v" onclick="window.open('${v.source}','_self')"><img src="${v.thumbnail.src}" style="width:100%"><h3 style="font-size:11px; padding:10px; margin:0;">${v.session_title}</h3></div>`).join('');
    } catch(e) {}

    try {
      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      currentDjs = data?.djs || []; currentSch = data?.schedule || [];
      document.getElementById('djGrid').innerHTML = currentDjs.map(d => `<div class="card-dj"><img src="${d.img || 'https://via.placeholder.com/150'}"><div style="font-weight:bold; font-size:13px;">${d.name}</div></div>`).join('');
      document.getElementById('scheduleList').innerHTML = currentSch.map(s => {
        const dj = currentDjs.find(d => d.name === s.dj) || {img: 'https://via.placeholder.com/150'};
        return `<div class="sch-row"><img src="${dj.img}" class="sch-dj-thumb"><div style="font-size:13px; font-weight:600;">${s.dj}</div><div class="sch-time">${s.time}</div></div>`;
      }).join('');
    } catch(e) {}
  }

  function renderAdmin() {
    document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `<div style="display:flex; gap:5px; margin-bottom:10px;"><input class="admin-input" value="${d.name}" oninput="currentDjs[${i}].name=this.value"><input class="admin-input" value="${d.img}" oninput="currentDjs[${i}].img=this.value"><button onclick="currentDjs.splice(${i},1);renderAdmin()" style="background:red; color:white; border:none; border-radius:5px; padding:0 10px;">X</button></div>`).join('');
    document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `<div style="display:flex; gap:5px; margin-bottom:10px;"><select class="admin-input" onchange="currentSch[${i}].dj=this.value">${currentDjs.map(dj => `<option ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}</select><input class="admin-input" value="${s.time}" oninput="currentSch[${i}].time=this.value"><button onclick="currentSch.splice(${i},1);renderAdmin()" style="background:red; color:white; border:none; border-radius:5px; padding:0 10px;">X</button></div>`).join('');
  }

  function addNewDjField() { currentDjs.push({name:'', img:''}); renderAdmin(); }
  function addNewSchField() { currentSch.push({dj:currentDjs[0]?.name || '', time:''}); renderAdmin(); }
  async function saveAll() {
    await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify({ djs: currentDjs, schedule: currentSch }) });
    alert("✅ ATUALIZADO!"); location.reload();
  }
  function toggleAdmin() {
    if(prompt("Senha:") === '1234') { document.getElementById('adminArea').style.display='block'; renderAdmin(); document.getElementById('adminArea').scrollIntoView(); }
  }
  load();
</script>
</body>
</html>
