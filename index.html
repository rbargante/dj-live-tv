<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        /* FLASHMIX DJ LIVE DESIGN - HIGH VISIBILITY & LIVE NEON */
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .main-header { 
            padding: 30px; font-weight: 900; color: #f52a1f; letter-spacing: 6px; font-size: 30px; 
            text-transform: uppercase; text-shadow: 0 0 15px rgba(245, 42, 31, 0.4);
        }

        /* --- THE PLAYER CONTAINER --- */
        .player-wrapper {
            position: relative; width: 94%; max-width: 880px; aspect-ratio: 16 / 9;
            background: #080808; border-radius: 24px; overflow: hidden;
            box-shadow: 0 30px 100px rgba(0,0,0,0.7); transition: transform 0.3s;
        }

        /* THE LIVE NEON BORDER (CHASING EFFECT) */
        .neon-border {
            position: absolute; inset: 0; border-radius: 24px; pointer-events: none; z-index: 50;
            background: 
                linear-gradient(90deg, #f52a1f 1px, transparent 1px) 0 0 / 200px 100%,
                linear-gradient(180deg, #f52a1f 1px, transparent 1px) 100% 0 / 100% 200px,
                linear-gradient(-90deg, #f52a1f 1px, transparent 1px) 100% 100% / 200px 100%,
                linear-gradient(0deg, #f52a1f 1px, transparent 1px) 0 100% / 100% 200px;
            opacity: 0; transition: opacity 0.5s;
        }

        /* Only activates when Live is True */
        body.is-live .neon-border {
            opacity: 1; animation: neonChase 0.8s linear infinite;
        }

        /* Keyframes for the running border */
        @keyframes neonChase {
            0% { background-position: 0 0, 100% 0, 100% 100%, 0 100%; }
            100% { background-position: -200px 0, 100% -200px, 100% 100%, 0 100%; }
        }

        /* KICK VIDEO iframe CONTAINER */
        #player-target {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20;
            display: none; border-radius: 24px; overflow: hidden;
        }
        body.is-live #player-target { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* --- PROFESSIONAL OFFLINE UI (HIGH VISIBILITY) --- */
        #offline-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        /* Standby dot & Animated waves */
        .audio-waves {
            position: absolute; width: 100%; height: 100px; bottom: 0;
            background: repeating-linear-gradient(90deg, #f52a1f 0%, #f52a1f 2px, transparent 2px, transparent 12px);
            opacity: 0.05; animation: waveMove 1s steps(10) infinite;
        }
        @keyframes waveMove { to { transform: translateY(-5px); } }

        .brand-name { color: #fff; font-weight: 900; font-size: 34px; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.9; }
        .status-badge { display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; background: #333; border-radius: 50%; transition: 0.5s; }
        body:not(.is-live) .dot { background: #444; animation: standbyPulse 2s infinite; }
        @keyframes standbyPulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .status-msg { color: #666; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }

        body.is-live #offline-screen { display: none; }

        /* --- UNMUTE BUTTON (ULTRA VISIBLE) --- */
        #actionBtn {
            display: none; margin-top: 40px; background: #f52a1f; color: #fff;
            border: none; padding: 20px 50px; border-radius: 100px;
            font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 15px 40px rgba(245, 42, 31, 0.3); transition: transform 0.2s, box-shadow 0.2s;
            z-index: 100;
        }

        #actionBtn:hover { transform: translateY(-2px); scale: 1.05; box-shadow: 0 20px 50px rgba(245, 42, 31, 0.5); }
        #actionBtn:active { transform: translateY(2px); }
        body.is-live #actionBtn { display: inline-block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div class="neon-border"></div>

        <div id="offline-screen">
            <div class="audio-waves"></div>
            <div class="brand-name">FLASHMIX</div>
            <div class="status-badge">
                <div class="dot"></div>
                <span class="status-msg">Stream Offline</span>
            </div>
        </div>

        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 Listen Live</button>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (O TEU INTERRUPTOR DO IMAC)
        const DATABASE_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let localStatus = null;

        async function syncWithOBS() {
            try {
                // Fetch fresh data from Firebase (updates instantly from your iMac)
                const response = await fetch(`${DATABASE_URL}?nocache=${Date.now()}`);
                const isLive = await response.json();

                if (isLive !== localStatus) {
                    localStatus = isLive;
                    const body = document.getElementById('app');
                    const videoArea = document.getElementById('player-target');
                    const unmuteBtn = document.getElementById('actionBtn');

                    if (isLive === true) {
                        // IMAC IS STREAMING -> ACTIVATE LIVE NEON & VIDEO
                        body.classList.add('is-live');
                        videoArea.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                        unmuteBtn.style.display = 'inline-block';
                    } else {
                        // IMAC STOPPED -> KILL VIDEO INSTANTLY
                        body.classList.remove('is-live');
                        videoArea.innerHTML = ""; 
                        unmuteBtn.style.display = 'none';
                        window.stop(); // Stop buffering
                    }
                }
            } catch (err) { console.error("Sync..."); }
        }

        function enableAudio() {
            const videoArea = document.getElementById('player-target');
            // Reload iframe with sound enabled
            videoArea.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        // Check every 2 seconds for instant response
        setInterval(syncWithOBS, 2000);
        syncWithOBS();

    </script>
</body>
</html>
