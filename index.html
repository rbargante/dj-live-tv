<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 12px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 11px; font-weight: 900; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin: 60px 0 30px; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card-v { background: #0a0a0a; border-radius: 10px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
    
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .card-dj { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; padding: 15px; text-align: center; }
    .card-dj img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }

    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 100px 1fr 80px; padding: 15px 20px; border-bottom: 1px solid #111; align-items: center; }
    .sch-time { color: #f52a1f; font-weight: bold; }

    /* ADMIN PROFISSIONAL */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 30px; margin-top: 50px; display: none; box-shadow: 0 0 50px rgba(245,42,31,0.2); }
    .admin-card { background: #111; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; }
    .admin-input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
    .btn-save-all { background: #28a745; color: #fff; border: none; padding: 20px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
    .dj-edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 50px; gap: 10px; margin-bottom: 10px; align-items: center; }
    .btn-del { color: #f52a1f; background: none; border: none; font-size: 20px; cursor: pointer; }

    footer { padding: 40px; text-align: center; color: #333; font-size: 11px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#vids">Vídeos</a>
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">⚙️ Painel Cloud</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="badge-wrap"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div></div>
    <div class="player"><iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe></div>

    <div id="secVids">
      <h2 class="section-title">Últimos Sets</h2>
      <div id="videoGrid" class="grid"></div>
    </div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossa Equipa</h2>
      <div id="djGrid" class="grid-djs"></div>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Horário Semanal</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center; text-transform:uppercase;">Centro de Comando Cloud</h2>
      
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Senha Admin">
        <button onclick="login()" class="admin-input" style="background:#f52a1f; color:white; font-weight:bold; cursor:pointer;">ENTRAR</button>
      </div>

      <div id="dashBox" style="display:none">
        <button class="btn-save-all" onclick="saveAll()">☁️ Salvar Tudo no Site</button>

        <div class="admin-card">
          <h3>1. Configurações de Visibilidade</h3>
          <label><input type="checkbox" id="hideDjs"> Esconder Secção DJs</label><br>
          <label><input type="checkbox" id="hideSch"> Esconder Secção Horário</label>
        </div>

        <div class="admin-card">
          <h3>2. Gerir Equipa (DJs)</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; color:white; cursor:pointer;">+ Adicionar Novo DJ</button>
        </div>

        <div class="admin-card">
          <h3>3. Horário Semanal</h3>
          <textarea id="inSch" class="admin-input" rows="6" placeholder="Formato: Hora | Título | Estilo"></textarea>
          <small style="color:#666">Exemplo: 22:00 | Live House | TECH</small>
        </div>

        <button onclick="location.reload()" class="admin-input" style="background:#333; color:white; cursor:pointer;">SAIR SEM SALVAR</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";

    // 4 EXEMPLOS DE DJS
    const defaultDjs = [
      { name: "DJ Ricardo", img: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=200", style: "Tech House" },
      { name: "DJ Sofia", img: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=200", style: "Deep House" },
      { name: "DJ Marco", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?w=200", style: "EDM" },
      { name: "DJ Andre", img: "https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=200", style: "Old School" }
    ];

    // 4 EXEMPLOS DE HORÁRIO
    const defaultSch = "21:00 | Warmup Mix | DEEP\n22:00 | Main Session | HOUSE\n23:30 | Late Night | TECHNO\n01:00 | After Party | CHILL";

    let currentDjs = [];

    async function load() {
      // Carregar Vídeos
      try {
        const rv = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await rv.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0,4).map(v=>`<div class="card-v" onclick="window.open('${v.source}','_self')"><img src="${v.thumbnail.src}" style="width:100%"><h3 style="font-size:13px; padding:10px;">${v.session_title}</h3></div>`).join('');
      } catch(e){}

      // Carregar Firebase
      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      
      const djsToShow = (data && data.djs) ? Object.values(data.djs) : defaultDjs;
      currentDjs = djsToShow;
      const schToShow = (data && data.schedule) ? data.schedule : defaultSch;

      // Render Site
      document.getElementById('secDjs').style.display = data?.hideDjs ? 'none' : 'block';
      document.getElementById('secSch').style.display = data?.hideSch ? 'none' : 'block';
      
      document.getElementById('djGrid').innerHTML = djsToShow.map(d=>`<div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');
      
      document.getElementById('scheduleList').innerHTML = schToShow.split('\n').map(l => {
        const [t, info, tag] = l.split('|');
        return `<div class="sch-row"><div class="sch-time">${t||''}</div><div class="sch-info">${info||''}</div><div class="sch-tag">${tag||'LIVE'}</div></div>`;
      }).join('');

      // Preencher Admin
      document.getElementById('hideDjs').checked = data?.hideDjs || false;
      document.getElementById('hideSch').checked = data?.hideSch || false;
      document.getElementById('inSch').value = schToShow;
      renderAdminDjList();
    }

    function renderAdminDjList() {
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `
        <div class="dj-edit-row">
          <input class="admin-input" placeholder="Nome" value="${d.name}" onchange="updateDjData(${i}, 'name', this.value)">
          <input class="admin-input" placeholder="URL Foto" value="${d.img}" onchange="updateDjData(${i}, 'img', this.value)">
          <input class="admin-input" placeholder="Estilo" value="${d.style}" onchange="updateDjData(${i}, 'style', this.value)">
          <button class="btn-del" onclick="removeDj(${i})">🗑️</button>
        </div>
      `).join('');
    }

    function updateDjData(i, field, val) { currentDjs[i][field] = val; }
    function addNewDjField() { currentDjs.push({name:'', img:'', style:''}); renderAdminDjList(); }
    function removeDj(i) { currentDjs.splice(i, 1); renderAdminDjList(); }

    async function saveAll() {
      const data = {
        hideDjs: document.getElementById('hideDjs').checked,
        hideSch: document.getElementById('hideSch').checked,
        schedule: document.getElementById('inSch').value,
        djs: currentDjs.filter(d => d.name !== '') // Salva apenas DJs com nome
      };
      
      await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify(data) });
      alert("✅ SITE ATUALIZADO COM SUCESSO!");
      load();
    }

    function toggleAdmin() { document.getElementById('adminArea').style.display='block'; document.getElementById('adminArea').scrollIntoView(); }
    function login() { if(document.getElementById('pass').value==='1234') { document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; }}

    load();
  </script>
</body>
</html>
