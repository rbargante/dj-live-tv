<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Live TV</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial, Helvetica, sans-serif;background:#000;color:#fff}

    .container{max-width:1200px;margin:auto;padding:20px}

    /* NAV */
    .nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
    .nav h1{font-size:22px}
    .nav a{color:#aaa;margin-left:20px;text-decoration:none}
    .nav a:hover{color:#fff}

    /* PLAYER */
    .player-wrap{margin-top:20px;border-radius:16px;overflow:hidden;background:#111}
    iframe{width:100%;height:500px;border:0}

    .status{margin:15px 0;text-align:center}
    .badge{display:inline-block;padding:10px 18px;border-radius:30px;background:#222;color:#ccc}
    .badge.live{background:#4a0000;color:#ff6b6b}

    /* SECTION */
    section{margin-top:60px;text-align:center}
    h2{font-size:32px;margin-bottom:10px}
    p{color:#aaa;margin-bottom:30px}

    /* DJ GRID */
    .dj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
    .dj-card{background:#111;border-radius:12px;padding:15px}
    .dj-card img{width:100%;border-radius:10px;margin-bottom:10px}
    .dj-card h3{font-size:18px;margin-bottom:5px}
    .dj-card p{font-size:13px;color:#aaa}

    /* SCHEDULE */
    .schedule{width:100%;text-align:left}
    .schedule-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:10px;border-bottom:1px solid #222}
    .schedule-row.header{color:#888;font-weight:bold}

    /* FOOTER */
    footer{margin-top:60px;padding:30px 0;border-top:1px solid #222;text-align:center;color:#777}
  </style>
</head>
<body>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <h1>DJ LIVE TV</h1>
    <div>
      <a href="#">Home</a>
      <a href="#replays">Replays</a>
      <a href="#djs">Our DJs</a>
      <a href="#schedule">Schedule</a>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status">
    <div id="liveBadge" class="badge">Checking...</div>
  </div>

  <!-- PLAYER -->
  <div class="player-wrap">
    <iframe id="kickPlayer" src="https://player.kick.com/DJLIVETV?muted=true"></iframe>
  </div>

  <!-- REPLAYS -->
  <section id="replays">
    <h2>REPLAYS</h2>
    <p>Watch previous sets and archived sessions.</p>
  </section>

  <!-- DJs -->
  <section id="djs">
    <h2>OUR DJs</h2>
    <p>Resident selectors and guests.</p>

    <div class="dj-grid">
      <div class="dj-card">
        <img src="https://via.placeholder.com/300x200" />
        <h3>DJ Sofia</h3>
        <p>House / Tech House</p>
      </div>

      <div class="dj-card">
        <img src="https://via.placeholder.com/300x200" />
        <h3>DJ Marco</h3>
        <p>Afro / Deep</p>
      </div>
    </div>
  </section>

  <!-- SCHEDULE -->
  <section id="schedule">
    <h2>SCHEDULE</h2>
    <p>Weekly lineup.</p>

    <div class="schedule">
      <div class="schedule-row header">
        <div>DJ</div><div>Day</div><div>Time</div><div>Style</div><div>Show</div>
      </div>

      <div class="schedule-row">
        <div>Sofia</div><div>Friday</div><div>20:00</div><div>House</div><div>Live Set</div>
      </div>
    </div>

  </section>

  <footer>
    DJ LIVE TV
  </footer>

</div>

<script>
  // SIMPLE LIVE CHECK (manual toggle for now)
  const live = false; // change true when live

  const badge = document.getElementById("liveBadge");

  if(live){
    badge.classList.add("live");
    badge.innerText = "LIVE NOW";
  } else {
    badge.innerText = "OFFLINE";
  }
</script>

</body>
</html>
