<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 10px;
            overflow-x: hidden;
        }

        /* --- TITLE: WHITE NEON --- */
        .main-header { 
            padding: 15px; font-weight: 900; color: #ffffff; 
            letter-spacing: 6px; font-size: clamp(22px, 5vw, 42px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        /* --- GIANT PLAYER WRAPPER --- */
        .player-wrapper {
            position: relative; 
            width: 98%; /* Quase ecrã total */
            max-width: 1200px; /* Limite para não exagerar em monitores gigantes */
            aspect-ratio: 16 / 9;
            background: #050505; border-radius: clamp(15px, 3vw, 40px); 
            display: flex; align-items: center; justify-content: center;
            border: 5px solid #f52a1f; 
            box-shadow: 0 0 40px rgba(245, 42, 31, 0.25);
            transition: all 0.5s ease;
            overflow: hidden;
        }

        /* LIVE CHASING NEON */
        body.is-live .player-wrapper {
            border: 6px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, #f52a1f, #ff6b6b, #f52a1f) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.2s linear infinite;
            box-shadow: 0 0 70px rgba(245, 42, 31, 0.6);
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        #player-target {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20;
            display: none; border-radius: inherit; overflow: hidden;
        }
        body.is-live #player-target { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* OFFLINE UI */
        #offline-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: inherit;
        }

        .brand-name { 
            font-size: clamp(35px, 12vw, 85px); 
            letter-spacing: clamp(8px, 2vw, 20px); 
            opacity: 0.95; margin-bottom: 20px; color: #fff; 
            text-align: center;
        }
        
        .status-badge {
            background: rgba(0,0,0,0.5); padding: clamp(15px, 3vw, 25px) clamp(30px, 6vw, 60px); 
            border-radius: 100px; border: 1px solid rgba(245, 42, 31, 0.4); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .status-row { display: flex; align-items: center; gap: clamp(10px, 2vw, 20px); }

        .dot { 
            width: clamp(12px, 2vw, 20px); height: clamp(12px, 2vw, 20px); 
            background: #f52a1f; border-radius: 50%; 
            box-shadow: 0 0 20px #f52a1f; 
            animation: fastBlink 1s infinite;
        }

        @keyframes fastBlink {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px #f52a1f; }
            50% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 5px #f52a1f; }
        }

        .status-msg { 
            color: #fff; font-size: clamp(20px, 5vw, 32px); 
            letter-spacing: 4px; font-weight: 900; text-transform: uppercase; 
        }

        .sub-msg { color: #666; font-size: clamp(10px, 2vw, 14px); letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }

        body.is-live #offline-screen { display: none; }

        /* BIG BUTTON */
        #actionBtn {
            display: none; margin-top: 30px; background: #f52a1f; color: #fff;
            border: none; padding: clamp(15px, 3vw, 25px) clamp(40px, 8vw, 80px); 
            border-radius: 100px; font-weight: 900; font-size: clamp(14px, 3vw, 22px); 
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 15px 40px rgba(245, 42, 31, 0.5); transition: 0.3s;
            z-index: 100;
        }

        #actionBtn:hover { transform: scale(1.05); }
        body.is-live #actionBtn { display: inline-block; }

        /* MOBILE ADJUSTMENT: No telemóvel deitado ou em pé, garante que o player respira */
        @media (max-width: 600px) {
            .player-wrapper { width: 100%; border-width: 3px; }
            .main-header { padding: 10px; }
        }
    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div id="offline-screen">
            <div class="brand-name">FLASHMIX</div>
            <div class="status-badge">
                <div class="status-row">
                    <div class="dot"></div>
                    <span class="status-msg">OFFLINE</span>
                </div>
                <div class="sub-msg">WAITING FOR DJ...</div>
            </div>
        </div>
        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 UNMUTE LIVE SESSION</button>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let currentStatus = null;

        async function autoCheck() {
            try {
                const r = await fetch(`${DB_URL}?nocache=${Date.now()}`);
                const isLive = await r.json();

                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-target');
                    const btn = document.getElementById('actionBtn');

                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:14px;letter-spacing:3px;color:#f52a1f;font-weight:bold;text-align:center;padding:20px;">CONNECTING LIVE STREAM...</div>`;
                        
                        setTimeout(() => {
                            target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                        }, 5000); 

                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = ""; 
                        btn.style.display = 'none';
                        window.stop();
                    }
                }
            } catch (e) { console.log("Checking signal..."); }
        }

        function enableAudio() {
            document.getElementById('player-target').innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        setInterval(autoCheck, 3000);
        autoCheck();
    </script>
</body>
</html>
