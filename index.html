<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 12px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; transition: 0.3s; }
    .nav-links a:hover { color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 11px; font-weight: 900; margin-bottom: 20px; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin: 60px 0 30px; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    
    /* EQUIPA */
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    .card-dj { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; padding: 15px; text-align: center; }
    .card-dj img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin-bottom: 10px; }
    .card-dj h3 { font-size: 14px; margin: 5px 0; }
    .card-dj p { font-size: 10px; color: #f52a1f; font-weight: 800; text-transform: uppercase; margin: 0; }
    .btn-more { display: block; margin: 20px auto; background: none; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 11px; }

    /* SCHEDULE PROFISSIONAL ROLLING */
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 80px 100px 150px 1fr 100px; padding: 12px 20px; border-bottom: 1px solid #111; align-items: center; transition: 0.3s; }
    .sch-row.live-now { background: rgba(245, 42, 31, 0.05); }
    .sch-time { color: #888; font-weight: bold; font-family: monospace; font-size: 15px; }
    .sch-day { color: #555; font-size: 10px; text-transform: uppercase; font-weight: 800; }
    .sch-dj-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
    .sch-info { font-size: 14px; font-weight: 600; color: #ccc; }
    .sch-status { font-size: 10px; font-weight: 900; text-transform: uppercase; text-align: right; }

    /* EFEITO LIVE NO SCHEDULE */
    .live-now .sch-time { color: #f52a1f; }
    .live-now .sch-dj-thumb { border-color: #f52a1f; animation: pulse-border 1.5s infinite; }
    .live-now .sch-status { color: #f52a1f; }
    @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(245, 42, 31, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(245, 42, 31, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 42, 31, 0); } }

    /* ADMIN */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 25px; margin-top: 50px; display: none; }
    .admin-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
    .admin-input, select { width: 100%; padding: 8px; margin: 4px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 13px; }
    .btn-save-all { background: #28a745; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; margin-bottom: 15px; }
    .edit-row, .sch-edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
    .sch-edit-row { grid-template-columns: 1fr 1fr 1fr 1fr 40px; }
    .btn-del { color: #f52a1f; background: none; border: none; font-size: 18px; cursor: pointer; }

    footer { padding: 40px; text-align: center; color: #333; font-size: 10px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">⚙️ Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:center"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div></div>
    <div class="player"><iframe id="kickPlayer" src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe></div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossa Equipa</h2>
      <div id="djGrid" class="grid-djs"></div>
      <button id="btnMoreDjs" class="btn-more" onclick="toggleDjsDisplay()" style="display:none">Ver Mais Equipa</button>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Broadcast Schedule</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center;">CONTROLO CLOUD</h2>
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Password">
        <button onclick="login()" class="btn-save-all" style="background:#f52a1f">ENTRAR</button>
      </div>
      <div id="dashBox" style="display:none">
        <button class="btn-save-all" onclick="saveAll()">☁️ PUBLICAR NO SITE</button>
        <div class="admin-card">
          <h3>Equipa (DJs)</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; cursor:pointer">+ DJ</button>
        </div>
        <div class="admin-card">
          <h3>Horário</h3>
          <div id="adminSchList"></div>
          <button onclick="addNewSchField()" class="admin-input" style="background:#222; cursor:pointer">+ Horário</button>
        </div>
        <button onclick="location.reload()" class="admin-input" style="background:#333; cursor:pointer">SAIR</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    const daysArr = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo", "Todos os dias"];
    const hoursArr = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);

    let currentDjs = [];
    let currentSch = [];
    let djsExpanded = false;

    async function load() {
      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      currentDjs = data?.djs || [{name:"Admin", img:"https://via.placeholder.com/150", style:"House"}];
      currentSch = Array.isArray(data?.schedule) ? data.schedule : [];
      renderSite();
      if(document.getElementById('dashBox').style.display === 'block') renderAdmin();
    }

    function renderSite() {
      // Render DJs
      const dLimit = djsExpanded ? currentDjs.length : 4;
      document.getElementById('djGrid').innerHTML = currentDjs.slice(0, dLimit).map(d => `
        <div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');
      document.getElementById('btnMoreDjs').style.display = currentDjs.length > 4 ? 'block' : 'none';

      // Lógica de Tempo para Rolling Schedule
      const now = new Date();
      const currentHour = now.getHours();
      
      // Ordenar: primeiro o que está a tocar agora, depois o resto
      let sortedSch = [...currentSch].sort((a, b) => {
          const hA = parseInt(a.time);
          const hB = parseInt(b.time);
          const isLiveA = hA === currentHour;
          const isLiveB = hB === currentHour;
          if (isLiveA) return -1;
          if (isLiveB) return 1;
          return hA - hB;
      });

      document.getElementById('scheduleList').innerHTML = sortedSch.map((s, i) => {
        const djData = currentDjs.find(d => d.name === s.dj) || {img: 'https://via.placeholder.com/150'};
        const isLive = parseInt(s.time) === currentHour;
        const isNext = !isLive && sortedSch[i-1] && parseInt(sortedSch[i-1].time) === currentHour;
        
        return `
          <div class="sch-row ${isLive ? 'live-now' : ''}">
            <div class="sch-time">${s.time}</div>
            <div class="sch-day">${s.day}</div>
            <img src="${djData.img}" class="sch-dj-thumb">
            <div class="sch-info"><strong>${s.dj}</strong> - ${s.info}</div>
            <div class="sch-status">${isLive ? '● LIVE NOW' : (isNext ? 'NEXT' : '')}</div>
          </div>`;
      }).join('');
    }

    function renderAdmin() {
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `
        <div class="edit-row">
          <input class="admin-input" value="${d.name}" oninput="currentDjs[${i}].name=this.value; renderAdmin()">
          <input class="admin-input" value="${d.img}" oninput="currentDjs[${i}].img=this.value">
          <input class="admin-input" value="${d.style}" oninput="currentDjs[${i}].style=this.value">
          <button class="btn-del" onclick="currentDjs.splice(${i},1);renderAdmin()">🗑️</button>
        </div>`).join('');

      document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `
        <div class="sch-edit-row">
          <select onchange="currentSch[${i}].dj=this.value">
            <option>Escolher DJ</option>
            ${currentDjs.map(dj => `<option ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}
          </select>
          <select onchange="currentSch[${i}].day=this.value">${daysArr.map(d=>(`<option ${s.day==d?'selected':''}>${d}</option>`)).join('')}</select>
          <select onchange="currentSch[${i}].time=this.value">${hoursArr.map(h=>(`<option ${s.time==h?'selected':''}>${h}</option>`)).join('')}</select>
          <input class="admin-input" value="${s.info}" oninput="currentSch[${i}].info=this.value">
          <button class="btn-del" onclick="currentSch.splice(${i},1);renderAdmin()">🗑️</button>
        </div>`).join('');
    }

    function addNewDjField() { currentDjs.push({name:'', img:'', style:''}); renderAdmin(); }
    function addNewSchField() { currentSch.push({dj:'', day:'Todos os dias', time:'22:00', info:''}); renderAdmin(); }
    function toggleDjsDisplay() { djsExpanded = !djsExpanded; renderSite(); }
    function login() { if(document.getElementById('pass').value==='1234'){ document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; renderAdmin(); }}
    function toggleAdmin() { const a = document.getElementById('adminArea'); a.style.display = a.style.display==='block'?'none':'block'; a.scrollIntoView(); }
    async function saveAll() {
      await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify({djs: currentDjs.filter(d=>d.name), schedule: currentSch}) });
      alert("✅ ATUALIZADO!"); location.reload();
    }
    load();
  </script>
</body>
</html>
