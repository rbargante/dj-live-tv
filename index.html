<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Live TV</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
    }

    .badge-row {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .5px;
      border: 1px solid rgba(255,255,255,.14);
      background: #1a1a1a;
      color: #d0d0d0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      box-shadow: 0 0 0 0 rgba(255,0,0,0);
    }

    .badge.live {
      background: rgba(255, 0, 0, 0.12);
      color: #ff6b6b;
      border-color: rgba(255, 90, 90, 0.35);
    }

    .badge.live .dot {
      background: #ff2b2b;
      box-shadow: 0 0 0 8px rgba(255, 43, 43, 0.12);
    }

    .player-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: #0b0b0b;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .sound-btn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      background: #f52a1f;
      color: #fff;
      box-shadow: 0 6px 18px rgba(245,42,31,.35);
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .title { font-size: 22px; }
      .badge { font-size: 13px; padding: 10px 14px; }
      .sound-btn { font-size: 12px; padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">DJ LIVE TV</div>

    <div class="badge-row">
      <div id="statusBadge" class="badge">
        <span class="dot"></span>
        <span id="statusText">CHECKING...</span>
      </div>
    </div>

    <div class="player-box">
      <iframe id="kickPlayer" src="https://player.kick.com/DJLIVETV?muted=true" allow="autoplay; fullscreen" allowfullscreen></iframe>
      <button class="sound-btn" id="soundBtn">🔊 SOM</button>
    </div>
  </div>
