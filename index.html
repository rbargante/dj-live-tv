<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; }
    .container { max-width: 1120px; margin: 0 auto; padding: 20px; }
    
    /* BADGE STATUS */
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 12px; font-weight: 900; text-transform: uppercase; }
    #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    .is-live { border-color: #f52a1f !important; color: #f52a1f; }
    .is-live #statusDot { background: #f52a1f !important; box-shadow: 0 0 10px #f52a1f; animation: blink 1.5s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 60px; font-size: 32px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #f52a1f; display: table; margin: 0 auto 30px; padding-bottom: 10px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
    .card { background: #0a0a0a; border-radius: 20px; border: 1px solid #222; overflow: hidden; text-align: center; padding-bottom: 15px; transition: 0.3s; }
    .card:hover { border-color: #f52a1f; transform: translateY(-5px); }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #111; }
    .dj-card img { aspect-ratio: 1/1; }
    .card h3 { margin: 15px 0 5px; font-size: 18px; padding: 0 10px; }

    .admin-section { background: #0a0a0a; border: 2px solid #f52a1f; border-radius: 25px; padding: 30px; margin-top: 50px; display: none; }
    .admin-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .tab-panel { display: none; padding-top: 20px; }
    .tab-panel.active { display: block; }
    footer { margin-top: 100px; padding: 40px; border-top: 1px solid #222; text-align: center; color: #555; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#top">Live</a>
        <a href="#replays">Vídeos</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container" id="top">
    <h1 style="text-align:center; font-size: clamp(30px, 8vw, 50px);">DJ LIVE TV</h1>

    <div class="badge-wrap">
      <div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div>
    </div>

    <div class="player">
      <iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <h2 class="section-title" id="replays">Últimos Vídeos</h2>
    <div id="videoGrid" class="grid"></div>

    <h2 class="section-title" id="djs">Nossos DJs</h2>
    <div id="djGrid" class="grid"></div>

    <h2 class="section-title" id="schedule">Horário</h2>
    <div id="scheduleList"></div>

    <div id="adminArea" class="admin-section">
      <h2 style="text-align:center; color:#f52a1f">PAINEL ADMIN</h2>
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Senha Admin">
        <button class="admin-btn" onclick="login()">Entrar</button>
      </div>
      <div id="dashBox" style="display:none">
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
           <button class="admin-btn" style="flex:1; background:#222;" onclick="showTab('tabStatus')">Status</button>
           <button class="admin-btn" style="flex:1; background:#222;" onclick="showTab('tabDjs')">DJs</button>
           <button class="admin-btn" style="flex:1; background:#222;" onclick="showTab('tabSch')">Horário</button>
        </div>

        <div id="tabStatus" class="tab-panel active">
          <select id="setStatus" class="admin-input">
            <option value="offline">🔴 OFFLINE</option>
            <option value="live">🟢 LIVE NOW</option>
          </select>
          <button class="admin-btn" onclick="saveStatus()">Atualizar Status</button>
        </div>

        <div id="tabDjs" class="tab-panel">
          <input id="djName" class="admin-input" placeholder="Nome">
          <input id="djImg" class="admin-input" placeholder="URL da Foto">
          <input id="djStyle" class="admin-input" placeholder="Estilo">
          <button class="admin-btn" onclick="saveDJ()">Adicionar DJ</button>
        </div>

        <div id="tabSch" class="tab-panel">
          <textarea id="schText" class="admin-input" rows="5" placeholder="Segunda 21h: DJ..."></textarea>
          <button class="admin-btn" onclick="saveSch()">Guardar Horário</button>
        </div>
        <button onclick="location.reload()" class="admin-btn" style="background:#333; margin-top:20px;">Sair</button>
      </div>
    </div>
  </div>

  <footer><strong>FLASHMIX TV © 2026</strong></footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";

    async function loadData() {
      // 1. VÍDEOS (WORKER)
      try {
        const resV = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await resV.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0, 4).map(v => `<div class="card" onclick="window.open('${v.source}','_self')" style="cursor:pointer"><img src="${v.thumbnail.src}"><h3>${v.session_title}</h3></div>`).join('');
      } catch(e) {}

      // 2. FIREBASE (DJs, Schedule e Status)
      const resF = await fetch(DB + ".json");
      const data = await resF.json();
      if(data) {
        // Status Badge
        const badge = document.getElementById('statusBadge');
        const txt = document.getElementById('statusText');
        if(data.status === 'live') { badge.classList.add('is-live'); txt.innerText = 'LIVE NOW'; }
        else { badge.classList.remove('is-live'); txt.innerText = 'OFFLINE'; }

        // DJs
        if(data.djs) {
          document.getElementById('djGrid').innerHTML = Object.values(data.djs).map(d => `<div class="card dj-card"><img src="${d.img || 'https://via.placeholder.com/300'}"><h3>${d.name}</h3><div style="color:#f52a1f; font-size:12px; font-weight:bold;">${d.style}</div></div>`).join('');
        }
        // Schedule
        if(data.schedule) {
          document.getElementById('scheduleList').innerHTML = data.schedule.split('\n').map(l => `<div style="background:#111; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid #f52a1f;">${l}</div>`).join('');
        }
      }
    }

    function toggleAdmin() { document.getElementById('adminArea').style.display = 'block'; document.getElementById('adminArea').scrollIntoView(); }
    function login() { if(document.getElementById('pass').value === '1234') { document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; } }
    function showTab(id) { document.getElementById('tabStatus').classList.remove('active'); document.getElementById('tabDjs').classList.remove('active'); document.getElementById('tabSch').classList.remove('active'); document.getElementById(id).classList.add('active'); }
    
    async function saveStatus() {
      await fetch(DB + "status.json", { method: 'PUT', body: JSON.stringify(document.getElementById('setStatus').value) });
      alert("Status atualizado!"); loadData();
    }
    async function saveDJ() {
      const dj = { name: document.getElementById('djName').value, img: document.getElementById('djImg').value, style: document.getElementById('djStyle').value };
      await fetch(DB + "djs.json", { method: 'POST', body: JSON.stringify(dj) });
      alert("DJ Adicionado!"); loadData();
    }
    async function saveSch() {
      await fetch(DB + "schedule.json", { method: 'PUT', body: JSON.stringify(document.getElementById('schText').value) });
      alert("Horário Guardado!"); loadData();
    }

    loadData();
  </script>
</body>
</html>
