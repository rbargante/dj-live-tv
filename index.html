<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ LIVE TV</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1, h2 {
  text-align: center;
}

.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 40px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.schedule-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  margin-bottom: 12px;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #222;
}

.schedule-left {
  display: flex;
  flex-direction: column;
}

.time {
  color: #ff3b3b;
  font-weight: bold;
}

.badge-live {
  background: red;
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 10px;
}

.button {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  background: #222;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>DJ LIVE TV</h1>

<div class="player">
  <iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
</div>

<h2>SCHEDULE</h2>

<div id="schedule"></div>

<button id="toggleBtn" class="button">View All</button>

</div>

<script>
const scheduleData = [
  { day: "Monday", dj: "DJ Ricardo", time: "18:00", style: "House", show: "Warm Up" },
  { day: "Monday", dj: "DJ Sofia", time: "21:00", style: "Deep House", show: "Late Set" },
  { day: "Friday", dj: "DJ Marco", time: "20:00", style: "EDM", show: "Prime Time" },
  { day: "Friday", dj: "DJ Ricardo", time: "23:00", style: "House", show: "Late Mix" },
  { day: "Saturday", dj: "DJ Sofia", time: "18:00", style: "Chill", show: "Early Vibes" },
  { day: "Saturday", dj: "DJ Marco", time: "21:00", style: "Festival", show: "Main Event" },
  { day: "Sunday", dj: "DJ Luna", time: "17:00", style: "Afro House", show: "Sunset Ritual" }
];

let showAll = false;

function getCurrentDay() {
  return new Date().toLocaleDateString("en-US", { weekday: "long" });
}

function getCurrentTime() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function convertTime(t) {
  const [h, m] = t.split(":");
  return parseInt(h) * 60 + parseInt(m);
}

function renderSchedule() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  const currentDay = getCurrentDay();
  const currentTime = getCurrentTime();

  let data = [...scheduleData];

  // detect live DJ
  let liveIndex = -1;

  data.forEach((item, i) => {
    if (item.day === currentDay) {
      const start = convertTime(item.time);
      const end = start + 120; // 2h set default

      if (currentTime >= start && currentTime <= end) {
        liveIndex = i;
      }
    }
  });

  // move live DJ to top
  if (liveIndex !== -1) {
    const liveItem = data.splice(liveIndex, 1)[0];
    data.unshift(liveItem);
  }

  const visibleData = showAll ? data : data.slice(0, 5);

  visibleData.forEach((item, i) => {
    const isLive = i === 0 && liveIndex !== -1;

    const div = document.createElement("div");
    div.className = "schedule-item";

    div.innerHTML = `
      <div class="schedule-left">
        <strong>${item.dj}</strong>
        <small>${item.day} • ${item.show}</small>
      </div>

      <div>
        <span class="time">${item.time}</span>
        ${isLive ? '<span class="badge-live">LIVE</span>' : ''}
      </div>
    `;

    container.appendChild(div);
  });
}

document.getElementById("toggleBtn").onclick = () => {
  showAll = !showAll;
  document.getElementById("toggleBtn").innerText = showAll ? "View Less" : "View All";
  renderSchedule();
};

renderSchedule();

// auto refresh every 60s (for LIVE switch)
setInterval(renderSchedule, 60000);
</script>

</body>
</html>
