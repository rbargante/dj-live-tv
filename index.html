<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://archive.org">
    <title>FLASHMIX.TV | STATION PRO</title>
    <style>
        :root { --neon-red: #f52a1f; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; padding-top: 80px; }

        /* --- NAVIGATION --- */
        .top-nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .admin-btn { color: var(--neon-red) !important; border: 1px solid var(--neon-red); padding: 5px 15px; border-radius: 5px; }

        /* --- PLAYER STAGE --- */
        .player-stage { position: relative; width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #050505; border-radius: 30px; border: 5px solid var(--neon-red); margin: 0 auto 30px; overflow: hidden; }
        body.is-live .player-stage, body.viewing-archive .player-stage { border-color: transparent; background: linear-gradient(#050505, #050505) padding-box, linear-gradient(90deg, var(--neon-red), #ff6b6b, var(--neon-red)) border-box; background-size: 200% 100%; animation: neonFlow 1.2s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        #player-content { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #player-content, body.viewing-archive #player-content { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }
        #standby-ui { position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .dot { width: 18px; height: 18px; background: var(--neon-red); border-radius: 50%; box-shadow: 0 0 15px var(--neon-red); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- DASHBOARD (FORMS) --- */
        #dashboard { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 40px 20px; overflow-y: auto; }
        .dash-container { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid var(--neon-red); padding: 30px; border-radius: 20px; }
        .dash-section { margin-bottom: 30px; padding: 20px; background: #111; border-radius: 15px; border-left: 4px solid var(--neon-red); }
        .dash-section h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--neon-red); text-transform: uppercase; }
        
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: sans-serif; }
        .save-btn { width: 100%; padding: 20px; background: var(--neon-red); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; letter-spacing: 2px; }

        /* --- PUBLIC UI --- */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .row-title { font-size: 22px; letter-spacing: 4px; margin: 60px 0 25px; border-left: 6px solid var(--neon-red); padding-left: 15px; text-transform: uppercase; }
        
        .sch-box { background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        .sch-item { display: grid; grid-template-columns: 1fr 1fr 2fr; padding: 20px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .sch-item:last-child { border-bottom: none; }
        .sch-day { color: var(--neon-red); font-weight: bold; }

        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .dj-card { background: #080808; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #1a1a1a; transition: 0.3s; }
        .dj-photo { width: 90px; height: 90px; background: #1a1a1a; border-radius: 50%; margin: 0 auto 15px; background-size: cover; background-position: center; border: 3px solid #333; }
        
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 100px; }
        .video-card { background: #080808; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; }
        .thumb-box { width: 100%; aspect-ratio: 1/1; background-size: cover; display: flex; align-items: flex-end; }
        .play-tag { background: rgba(245, 42, 31, 0.9); color: #fff; width: 100%; padding: 8px; text-align: center; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body id="app">

    <nav class="top-nav">
        <div class="nav-links">
            <a href="#main-stage">Home / Live</a>
            <a href="#library">Library</a>
            <a onclick="toggleDash()" class="admin-btn">Edit Station</a>
        </div>
    </nav>

    <div class="player-stage" id="main-stage">
        <div id="standby-ui">
            <div class="dot"></div>
            <span style="font-size: 16px; letter-spacing: 5px; margin-top: 20px; color: #555;">WAITING FOR SIGNAL...</span>
        </div>
        <div id="player-content"></div>
    </div>

    <div id="dashboard">
        <div class="dash-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--neon-red); margin:0;">STATION DASHBOARD</h2>
                <button onclick="toggleDash()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:20px;">✕</button>
            </div>

            <div class="dash-section">
                <h3>DJ Lineup (Resident)</h3>
                <label>DJ Name</label><input type="text" id="f-dj-name">
                <label>Music Style</label><input type="text" id="f-dj-style">
                <label>Photo URL (Direct Link)</label><input type="text" id="f-dj-img">
            </div>

            <div class="dash-section">
                <h3>Schedule / Agenda</h3>
                <label>Day of Week</label>
                <select id="f-sch-day">
                    <option value="MONDAY">MONDAY</option>
                    <option value="TUESDAY">TUESDAY</option>
                    <option value="WEDNESDAY">WEDNESDAY</option>
                    <option value="THURSDAY">THURSDAY</option>
                    <option value="FRIDAY">FRIDAY</option>
                    <option value="SATURDAY">SATURDAY</option>
                    <option value="SUNDAY">SUNDAY</option>
                </select>
                <label>Hour</label>
                <select id="f-sch-time">
                    <script>
                        for(let i=0; i<24; i++) {
                            let h = i < 10 ? '0'+i : i;
                            document.write(`<option value="${h}:00">${h}:00</option>`);
                            document.write(`<option value="${h}:30">${h}:30</option>`);
                        }
                    </script>
                </select>
                <label>Event Info / DJ Name</label>
                <input type="text" id="f-sch-info">
            </div>

            <button class="save-btn" onclick="saveData()">SAVE & UPDATE WEBSITE</button>
        </div>
    </div>

    <div class="container">
        <div class="row-title">Weekly Schedule</div>
        <div id="display-schedule" class="sch-box"></div>

        <div class="row-title">Residents</div>
        <div id="display-djs" class="dj-grid"></div>

        <div id="library" class="row-title">Flashmix Video Library</div>
        <div id="display-library" class="library-grid"></div>
    </div>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/.json";
        const UPLOADER = "ricardobargante%40live.com";
        let liveStatus = null;
        let isReplay = false;

        async function sync() {
            try {
                const res = await fetch(DB_URL + "?t=" + Date.now());
                const data = await res.json();
                
                // LIVE SYNC (AUTO FROM OBS)
                const body = document.getElementById('app');
                const target = document.getElementById('player-content');
                if(data.is_live) body.classList.add('is-live'); else body.classList.remove('is-live');
                
                if(data.is_live !== liveStatus) {
                    liveStatus = data.is_live;
                    if(data.is_live && !isReplay) {
                        target.innerHTML = `<iframe src="https://player.kick.com/djlivetv?muted=false" allowfullscreen></iframe>`;
                    } else if(!data.is_live && !isReplay) {
                        target.innerHTML = "";
                    }
                }

                // UI PUBLIC LOAD
                if(data.schedule) {
                    document.getElementById('display-schedule').innerHTML = Object.values(data.schedule).map(s => `
                        <div class="sch-item"><div class="sch-day">${s.day}</div><div>${s.time}</div><div>${s.info}</div></div>
                    `).join('');
                }

                if(data.djs) {
                    document.getElementById('display-djs').innerHTML = Object.values(data.djs).map(d => `
                        <div class="dj-card">
                            <div class="dj-photo" style="background-image:url('${d.img || ''}')"></div>
                            <div style="font-size:13px; color:#fff;">${d.name}</div>
                            <div style="font-size:10px; color:red; margin-top:5px;">${d.style}</div>
                        </div>
                    `).join('');
                }

                // DASHBOARD PRE-FILL (First items only for example)
                if(!document.getElementById('dashboard').style.display || document.getElementById('dashboard').style.display === 'none') {
                    if(data.djs) {
                        document.getElementById('f-dj-name').value = data.djs[0].name || "";
                        document.getElementById('f-dj-style').value = data.djs[0].style || "";
                        document.getElementById('f-dj-img').value = data.djs[0].img || "";
                    }
                    if(data.schedule) {
                        document.getElementById('f-sch-day').value = data.schedule[0].day || "MONDAY";
                        document.getElementById('f-sch-time').value = data.schedule[0].time || "00:00";
                        document.getElementById('f-sch-info').value = data.schedule[0].info || "";
                    }
                }
            } catch (e) { console.error("Sync Error"); }
        }

        async function fetchArchive() {
            try {
                const res = await fetch(`https://archive.org/advancedsearch.php?q=uploader%3A%28${UPLOADER}%29&fl%5B%5D=identifier&fl%5B%5D=title&sort%5B%5D=addeddate+desc&output=json`);
                const data = await res.json();
                document.getElementById('display-library').innerHTML = data.response.docs.map(doc => `
                    <div class="video-card" onclick="playArchive('${doc.identifier}')">
                        <div class="thumb-box" style="background-image: url('https://archive.org/services/img/${doc.identifier}')"><div class="play-tag">WATCH REPLAY</div></div>
                        <div style="padding:15px; text-align:center; font-size:10px; text-transform:uppercase;">${doc.title}</div>
                    </div>`).join('');
            } catch (e) {}
        }

        function playArchive(id) {
            isReplay = true;
            document.getElementById('app').classList.add('viewing-archive');
            document.getElementById('player-content').innerHTML = `<iframe src="https://archive.org/embed/${id}&autoplay=1" allowfullscreen></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveData() {
            const pass = prompt("Enter Station Password:");
            if(pass !== "1234") return alert("Access Denied");

            const updated = {
                djs: [{ 
                    name: document.getElementById('f-dj-name').value, 
                    style: document.getElementById('f-dj-style').value, 
                    img: document.getElementById('f-dj-img').value 
                }],
                schedule: [{ 
                    day: document.getElementById('f-sch-day').value, 
                    time: document.getElementById('f-sch-time').value, 
                    info: document.getElementById('f-sch-info').value 
                }]
            };

            await fetch("https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/.json", {
                method: "PATCH",
                body: JSON.stringify(updated)
            });

            alert("Website Updated Successfully!");
            toggleDash();
            sync();
        }

        function toggleDash() {
            const d = document.getElementById('dashboard');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        sync();
        fetchArchive();
        setInterval(sync, 5000);
    </script>
</body>
</html>
