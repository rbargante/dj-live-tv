<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .main-header { 
            padding: 20px; font-weight: 900; color: #f52a1f; letter-spacing: 8px; font-size: 35px; 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(245, 42, 31, 0.8);
            margin-bottom: 10px;
        }

        /* PLAYER WRAPPER WITH NEON EFFECT */
        .player-wrapper {
            position: relative; width: 94%; max-width: 900px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 30px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 4px solid #111; /* Default border when offline */
        }

        /* THE RUNNING NEON BORDER */
        body.is-live .player-wrapper {
            border: 4px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, #f52a1f, #ff6b6b, #f52a1f) border-box;
            background-size: 200% 100%;
            animation: neonMove 1.5s linear infinite;
            box-shadow: 0 0 40px rgba(245, 42, 31, 0.6);
        }

        @keyframes neonMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* VIDEO AREA */
        #player-target {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20;
            display: none;
        }
        body.is-live #player-target { display: block; }
        iframe { width: 100%; height: 100%; border: 0; border-radius: 26px; }

        /* OFFLINE SCREEN (VISIBLE & CLEAN) */
        #offline-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        .brand-name { font-size: 45px; letter-spacing: 10px; opacity: 0.8; margin-bottom: 20px; color: #fff; }
        
        .status-badge {
            background: rgba(255,255,255,0.05); padding: 15px 40px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px;
        }

        .dot { 
            width: 15px; height: 15px; background: #f52a1f; border-radius: 50%; 
            box-shadow: 0 0 15px #f52a1f; animation: pulseRed 2s infinite;
        }

        @keyframes pulseRed {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        .status-msg { color: #888; font-size: 16px; letter-spacing: 4px; font-weight: bold; }

        body.is-live #offline-screen { display: none; }

        /* BIG RED ACTION BUTTON */
        #actionBtn {
            display: none; margin-top: 40px; background: #f52a1f; color: #fff;
            border: none; padding: 25px 70px; border-radius: 100px;
            font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(245, 42, 31, 0.5); transition: 0.3s;
        }

        #actionBtn:hover { transform: scale(1.05); background: #ff3e33; }
        body.is-live #actionBtn { display: inline-block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div id="offline-screen">
            <div class="brand-name">FLASHMIX</div>
            <div class="status-badge">
                <div class="dot"></div>
                <span class="status-msg">SYSTEM READY / OFFLINE</span>
            </div>
        </div>
        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 UNMUTE LIVE SESSION</button>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let currentStatus = null;

        async function updateSite() {
            try {
                const r = await fetch(`${DB_URL}?t=${Date.now()}`);
                const isLive = await r.json();

                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-target');

                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = ""; 
                        window.stop();
                    }
                }
            } catch (e) {}
        }

        function enableAudio() {
            document.getElementById('player-target').innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        setInterval(updateSite, 2000);
        updateSite();
    </script>
</body>
</html>
