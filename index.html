<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; letter-spacing: 1px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 12px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 11px; font-weight: 900; margin-bottom: 20px; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #666; }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin: 60px 0 30px; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    
    /* EQUIPA */
    .grid-djs { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .card-dj { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; padding: 15px; text-align: center; }
    .card-dj img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin-bottom: 10px; }
    .btn-more { display: block; margin: 20px auto; background: none; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 11px; }

    /* SCHEDULE */
    .sch-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .sch-row { display: grid; grid-template-columns: 120px 150px 1fr; padding: 15px 20px; border-bottom: 1px solid #111; align-items: center; }
    .sch-time { color: #f52a1f; font-weight: bold; }
    .sch-day { color: #888; font-size: 12px; text-transform: uppercase; }

    /* ADMIN PROFISSIONAL */
    .admin-section { background: #080808; border: 2px solid #f52a1f; border-radius: 15px; padding: 30px; margin-top: 50px; display: none; }
    .admin-card { background: #111; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; }
    .admin-input, select { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
    .btn-save-all { background: #28a745; color: #fff; border: none; padding: 20px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
    .edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 50px; gap: 10px; margin-bottom: 10px; align-items: center; }
    .sch-edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 50px; gap: 10px; margin-bottom: 10px; }
    .btn-del { color: #f52a1f; background: none; border: none; font-size: 20px; cursor: pointer; }

    footer { padding: 40px; text-align: center; color: #333; font-size: 11px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#djs">Equipa</a>
        <a href="#schedule">Horário</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">⚙️ Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:center"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">OFFLINE</span></div></div>
    <div class="player"><iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe></div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossa Equipa</h2>
      <div id="djGrid" class="grid-djs"></div>
      <button id="btnMoreDjs" class="btn-more" onclick="toggleDjsDisplay()" style="display:none">Ver Mais Equipa</button>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Broadcast Schedule</h2>
      <div id="scheduleList" class="sch-container"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="color:#f52a1f; text-align:center;">PAINEL DE CONTROLO PROFISSIONAL</h2>
      
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Password Admin">
        <button onclick="login()" class="admin-input" style="background:#f52a1f; color:white; font-weight:bold; cursor:pointer;">ENTRAR</button>
      </div>

      <div id="dashBox" style="display:none">
        <button class="btn-save-all" onclick="saveAll()">☁️ Salvar Tudo no Site</button>

        <div class="admin-card">
          <h3>1. Visibilidade</h3>
          <label><input type="checkbox" id="hideDjs"> Esconder DJs</label> | 
          <label><input type="checkbox" id="hideSch"> Esconder Horário</label>
        </div>

        <div class="admin-card">
          <h3>2. Gerir Equipa (DJs)</h3>
          <div id="adminDjList"></div>
          <button onclick="addNewDjField()" class="admin-input" style="background:#222; color:white; cursor:pointer;">+ Adicionar DJ</button>
        </div>

        <div class="admin-card">
          <h3>3. Gerir Horário Profissional</h3>
          <div id="adminSchList"></div>
          <button onclick="addNewSchField()" class="admin-input" style="background:#222; color:white; cursor:pointer;">+ Adicionar Horário</button>
        </div>

        <button onclick="location.reload()" class="admin-input" style="background:#333; color:white; cursor:pointer;">CANCELAR</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV — © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";
    
    let currentDjs = [];
    let currentSch = [];
    let djsExpanded = false;

    // Horas e Dias para os seletores
    const days = ["Todos", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];
    const hours = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);

    async function load() {
      const rf = await fetch(DB + ".json");
      const data = await rf.json();
      
      currentDjs = data?.djs || [
        {name:"DJ Ricardo", img:"https://via.placeholder.com/150", style:"House"},
        {name:"DJ Sofia", img:"https://via.placeholder.com/150", style:"Techno"},
        {name:"DJ Marco", img:"https://via.placeholder.com/150", style:"EDM"},
        {name:"DJ Andre", img:"https://via.placeholder.com/150", style:"R&B"}
      ];
      
      currentSch = data?.schedule || [
        {dj:"DJ Ricardo", day:"Sexta", time:"22:00", info:"Live Session"},
        {dj:"DJ Sofia", day:"Sábado", time:"23:00", info:"Techno Night"}
      ];

      renderSite(data);
      renderAdmin();
    }

    function renderSite(data) {
      document.getElementById('secDjs').style.display = data?.hideDjs ? 'none' : 'block';
      document.getElementById('secSch').style.display = data?.hideSch ? 'none' : 'block';

      // DJs com Ver Mais
      const djsLimit = djsExpanded ? currentDjs.length : 4;
      document.getElementById('djGrid').innerHTML = currentDjs.slice(0, djsLimit).map(d => `
        <div class="card-dj"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');
      
      document.getElementById('btnMoreDjs').style.display = currentDjs.length > 4 ? 'block' : 'none';
      document.getElementById('btnMoreDjs').innerText = djsExpanded ? "Ver Menos" : "Ver Mais Equipa";

      // Schedule
      document.getElementById('scheduleList').innerHTML = currentSch.map(s => `
        <div class="sch-row">
          <div class="sch-time">${s.time}</div>
          <div class="sch-day">${s.day}</div>
          <div class="sch-info"><strong>${s.dj}</strong> - ${s.info}</div>
        </div>`).join('');
    }

    function renderAdmin() {
      // Admin DJs
      document.getElementById('adminDjList').innerHTML = currentDjs.map((d, i) => `
        <div class="edit-row">
          <input class="admin-input" placeholder="Nome" value="${d.name}" onchange="currentDjs[${i}].name=this.value">
          <input class="admin-input" placeholder="Foto URL" value="${d.img}" onchange="currentDjs[${i}].img=this.value">
          <input class="admin-input" placeholder="Estilo" value="${d.style}" onchange="currentDjs[${i}].style=this.value">
          <button class="btn-del" onclick="currentDjs.splice(${i},1);renderAdmin()">🗑️</button>
        </div>`).join('');

      // Admin Schedule
      document.getElementById('adminSchList').innerHTML = currentSch.map((s, i) => `
        <div class="sch-edit-row">
          <select onchange="currentSch[${i}].dj=this.value">
            ${currentDjs.map(dj => `<option value="${dj.name}" ${s.dj==dj.name?'selected':''}>${dj.name}</option>`).join('')}
          </select>
          <select onchange="currentSch[${i}].day=this.value">
            ${days.map(d => `<option ${s.day==d?'selected':''}>${d}</option>`).join('')}
          </select>
          <select onchange="currentSch[${i}].time=this.value">
            ${hours.map(h => `<option ${s.time==h?'selected':''}>${h}</option>`).join('')}
          </select>
          <input class="admin-input" placeholder="Info" value="${s.info}" onchange="currentSch[${i}].info=this.value">
          <button class="btn-del" onclick="currentSch.splice(${i},1);renderAdmin()">🗑️</button>
        </div>`).join('');
    }

    function addNewDjField() { currentDjs.push({name:'', img:'', style:''}); renderAdmin(); }
    function addNewSchField() { currentSch.push({dj:currentDjs[0]?.name||'', day:'Sexta', time:'22:00', info:''}); renderAdmin(); }
    function toggleDjsDisplay() { djsExpanded = !djsExpanded; load(); }

    async function saveAll() {
      const data = {
        hideDjs: document.getElementById('hideDjs').checked,
        hideSch: document.getElementById('hideSch').checked,
        djs: currentDjs.filter(d => d.name !== ''),
        schedule: currentSch
      };
      await fetch(DB + ".json", { method: 'PUT', body: JSON.stringify(data) });
      alert("✅ SITE ATUALIZADO!");
      location.reload();
    }

    function login() { if(document.getElementById('pass').value==='1234'){ document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; }}
    function toggleAdmin() { document.getElementById('adminArea').style.display='block'; document.getElementById('adminArea').scrollIntoView(); }

    load();
  </script>
</body>
</html>
