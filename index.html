<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 10px; overflow-x: hidden;
        }

        /* --- HEADER --- */
        .main-header { 
            padding: 20px; font-weight: 900; color: #ffffff; 
            letter-spacing: 8px; font-size: clamp(24px, 5vw, 45px); 
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* --- GIANT PLAYER --- */
        .player-wrapper {
            position: relative; width: 98%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #050505; border-radius: 30px; 
            display: flex; align-items: center; justify-content: center;
            border: 5px solid #f52a1f; box-shadow: 0 0 30px rgba(245, 42, 31, 0.2);
            transition: all 0.5s ease; overflow: hidden; margin-bottom: 30px;
        }

        body.is-live .player-wrapper {
            border: 6px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box,
                        linear-gradient(90deg, #f52a1f, #ff6b6b, #f52a1f) border-box;
            background-size: 200% 100%;
            animation: neonFlow 1.2s linear infinite;
            box-shadow: 0 0 60px rgba(245, 42, 31, 0.5);
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        #player-target { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; display: none; }
        body.is-live #player-target { display: block; }
        iframe { width: 100%; height: 100%; border: 0; }

        #offline-screen {
            position: absolute; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        .dot { 
            width: 15px; height: 15px; background: #f52a1f; border-radius: 50%; 
            box-shadow: 0 0 15px #f52a1f; animation: fastBlink 1s infinite;
        }
        @keyframes fastBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- SECTIONS (SCHEDULE & DJ LIST) --- */
        .container { width: 98%; max-width: 1100px; padding-bottom: 50px; }

        .section-title {
            color: #f52a1f; font-size: 20px; letter-spacing: 4px; text-transform: uppercase;
            margin: 40px 0 20px 0; border-left: 5px solid #f52a1f; padding-left: 15px; text-align: left;
        }

        /* SCHEDULE TABLE */
        .schedule-grid {
            width: 100%; border-collapse: collapse; background: #080808; border-radius: 15px; overflow: hidden;
        }
        .schedule-grid th, .schedule-grid td {
            padding: 15px; text-align: left; border-bottom: 1px solid #111; font-size: 14px;
        }
        .schedule-grid th { background: #111; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .schedule-grid tr:hover { background: #0f0f0f; }
        .time { color: #f52a1f; font-weight: bold; }
        .dj-name { color: #fff; font-weight: bold; }

        /* DJ LIST */
        .dj-list {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;
        }
        .dj-card {
            background: #080808; padding: 20px; border-radius: 15px; text-align: center;
            border: 1px solid #111; transition: 0.3s;
        }
        .dj-card:hover { border-color: #f52a1f; transform: translateY(-5px); }
        .dj-card h3 { margin: 0; font-size: 16px; color: #fff; }
        .dj-card p { margin: 5px 0 0 0; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

        #actionBtn {
            display: none; margin: 20px auto; background: #f52a1f; color: #fff;
            border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer;
        }
        body.is-live #actionBtn { display: block; }

    </style>
</head>
<body id="app">

    <div class="main-header">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div id="offline-screen">
            <div style="font-size: clamp(30px, 8vw, 60px); letter-spacing: 10px; margin-bottom: 15px;">FLASHMIX</div>
            <div style="display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 50px; border: 1px solid #1a1a1a;">
                <div class="dot"></div>
                <span style="color: #888; font-size: 14px; letter-spacing: 3px; font-weight: bold;">OFFLINE</span>
            </div>
        </div>
        <div id="player-target"></div>
    </div>

    <button id="actionBtn" onclick="enableAudio()">🔊 UNMUTE LIVE SESSION</button>

    <div class="container">
        
        <div class="section-title">Weekly Schedule</div>
        <table class="schedule-grid">
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Time (GMT)</th>
                    <th>Show / DJ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>FRIDAY</td>
                    <td class="time">22:00 - 00:00</td>
                    <td class="dj-name">DJ BARGANTE <span style="font-size:10px; color:#444;">(LIVE)</span></td>
                </tr>
                <tr>
                    <td>SATURDAY</td>
                    <td class="time">21:00 - 23:00</td>
                    <td class="dj-name">FLASH SESSION</td>
                </tr>
                <tr>
                    <td>SUNDAY</td>
                    <td class="time">18:00 - 20:00</td>
                    <td class="dj-name">RETRO MIX VOL.1</td>
                </tr>
            </tbody>
        </table>

        <div class="section-title">Our DJs</div>
        <div class="dj-list">
            <div class="dj-card">
                <h3>DJ BARGANTE</h3>
                <p>House & Techno</p>
            </div>
            <div class="dj-card">
                <h3>DJ GUEST 01</h3>
                <p>Open Format</p>
            </div>
            <div class="dj-card">
                <h3>DJ GUEST 02</h3>
                <p>Classic Rock</p>
            </div>
            <div class="dj-card">
                <h3>DJ GUEST 03</h3>
                <p>Deep House</p>
            </div>
        </div>

    </div>

    <script>
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let currentStatus = null;

        async function autoCheck() {
            try {
                const r = await fetch(`${DB_URL}?nocache=${Date.now()}`);
                const isLive = await r.json();

                if (isLive !== currentStatus) {
                    currentStatus = isLive;
                    const body = document.getElementById('app');
                    const target = document.getElementById('player-target');
                    const btn = document.getElementById('actionBtn');

                    if (isLive === true) {
                        body.classList.add('is-live');
                        target.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:14px;color:#f52a1f;font-weight:bold;">CONNECTING...</div>`;
                        setTimeout(() => {
                            target.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                        }, 5000); 
                    } else {
                        body.classList.remove('is-live');
                        target.innerHTML = ""; 
                        btn.style.display = 'none';
                        window.stop();
                    }
                }
            } catch (e) { console.log("Checking iMac..."); }
        }

        function enableAudio() {
            document.getElementById('player-target').innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('actionBtn').style.display = 'none';
        }

        setInterval(autoCheck, 3000);
        autoCheck();
    </script>
</body>
</html>
