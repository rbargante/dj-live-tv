<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ LIVE TV | FLASHMIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo { font-weight: 900; font-size: 20px; color: #f52a1f; text-transform: uppercase; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; font-weight: 700; padding: 8px 15px; text-transform: uppercase; }
    .container { max-width: 1120px; margin: 0 auto; padding: 20px; }
    
    /* STATUS BADGE */
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 15px; }
    #statusBadge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 50px; background: #111; border: 1px solid #333; font-size: 12px; font-weight: 900; }
    #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    .is-live { border-color: #f52a1f !important; color: #f52a1f; }
    .is-live #statusDot { background: #f52a1f !important; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
    .player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .section-title { text-align: center; margin-top: 60px; font-size: 32px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #f52a1f; display: table; margin-left: auto; margin-right: auto; padding-bottom: 10px; margin-bottom: 30px; }
    
    /* GRID DJs */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
    .card { background: #0a0a0a; border-radius: 20px; border: 1px solid #222; overflow: hidden; text-align: center; padding-bottom: 15px; transition: 0.3s; }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #111; }
    .dj-card img { aspect-ratio: 1/1; }
    .card h3 { margin: 15px 0 5px; font-size: 20px; }
    .card p { color: #888; font-size: 14px; padding: 0 10px; }

    /* ADMIN BOX */
    .admin-section { background: #0a0a0a; border: 2px solid #f52a1f; border-radius: 25px; padding: 30px; margin-top: 50px; display: none; }
    .admin-input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
    .admin-btn { width: 100%; background: #f52a1f; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }
    .toggle-group { display: flex; gap: 10px; margin: 15px 0; }
    .btn-small { flex: 1; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer; }
    .btn-active { background: #f52a1f !important; border-color: #f52a1f; }

    footer { margin-top: 100px; padding: 40px; text-align: center; color: #444; border-top: 1px solid #111; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="logo">FLASHMIX.TV</div>
      <div class="nav-links">
        <a href="#top">Live</a>
        <a href="#replays">Vídeos</a>
        <a href="#djs">DJs</a>
        <a href="#schedule">Schedule</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" style="color:#f52a1f">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container" id="top">
    <div class="badge-wrap"><div id="statusBadge"><span id="statusDot"></span> <span id="statusText">CHECKING...</span></div></div>
    
    <div class="player">
      <iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>
    </div>

    <div id="secVideos">
      <h2 class="section-title" id="replays">Últimos Vídeos</h2>
      <div id="videoGrid" class="grid"></div>
    </div>

    <div id="secDjs">
      <h2 class="section-title" id="djs">Nossos DJs</h2>
      <div id="djGrid" class="grid"></div>
    </div>

    <div id="secSch">
      <h2 class="section-title" id="schedule">Horário Semanal</h2>
      <div id="scheduleList"></div>
    </div>

    <div id="adminArea" class="admin-section">
      <h2 style="text-align:center; color:#f52a1f">PAINEL DE CONTROLO</h2>
      <div id="loginBox">
        <input id="pass" type="password" class="admin-input" placeholder="Password">
        <button class="admin-btn" onclick="login()">Entrar</button>
      </div>
      
      <div id="dashBox" style="display:none">
        <h3>Visibilidade das Secções</h3>
        <div class="toggle-group">
          <button id="tDj" class="btn-small" onclick="toggleSec('hideDjs')">DJs: ON</button>
          <button id="tSch" class="btn-small" onclick="toggleSec('hideSch')">Schedule: ON</button>
        </div>

        <h3>Status Live</h3>
        <select id="setSt" class="admin-input">
          <option value="offline">🔴 OFFLINE</option>
          <option value="live">🟢 LIVE NOW</option>
        </select>
        <button class="admin-btn" onclick="saveStatus()">Atualizar Status</button>

        <h3>Adicionar DJ</h3>
        <input id="djN" class="admin-input" placeholder="Nome">
        <input id="djI" class="admin-input" placeholder="URL da Foto">
        <input id="djS" class="admin-input" placeholder="Estilo">
        <button class="admin-btn" style="background:green" onclick="saveDJ()">Adicionar DJ</button>

        <h3>Horário (Texto)</h3>
        <textarea id="schT" class="admin-input" rows="4" placeholder="Sexta 22h: DJ Ricardo..."></textarea>
        <button class="admin-btn" onclick="saveSch()">Guardar Horário</button>
        
        <button onclick="location.reload()" class="admin-btn" style="background:#333; margin-top:20px;">Sair e Salvar</button>
      </div>
    </div>
  </div>

  <footer>FLASHMIX TV © 2026</footer>

  <script>
    const DB = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/";

    // EXEMPLOS INICIAIS (CASO FIREBASE ESTEJA VAZIO)
    const exDjs = [{name:"DJ Exemplo", img:"https://via.placeholder.com/400", style:"House Music"}];
    const exSch = "Segunda 21h: Live Mix\nQuarta 22h: Techno Night";

    async function load() {
      // 1. VIDEOS (Worker)
      try {
        const resV = await fetch("https://blue-cherry-d10a.ricardobargante.workers.dev/videos");
        const vids = await resV.json();
        document.getElementById('videoGrid').innerHTML = vids.slice(0,4).map(v=>`<div class="card" onclick="window.open('${v.source}','_self')" style="cursor:pointer"><img src="${v.thumbnail.src}"><h3>${v.session_title}</h3></div>`).join('');
      } catch(e){}

      // 2. FIREBASE
      const resF = await fetch(DB + ".json");
      const data = await resF.json();
      
      const status = data?.status || 'offline';
      const badge = document.getElementById('statusBadge');
      if(status==='live'){ badge.classList.add('is-live'); document.getElementById('statusText').innerText='LIVE NOW';}
      else { badge.classList.remove('is-live'); document.getElementById('statusText').innerText='OFFLINE';}

      // Hide/Show Secções
      document.getElementById('secDjs').style.display = data?.hideDjs ? 'none' : 'block';
      document.getElementById('secSch').style.display = data?.hideSch ? 'none' : 'block';
      document.getElementById('tDj').innerText = data?.hideDjs ? "DJs: OFF" : "DJs: ON";
      document.getElementById('tSch').innerText = data?.hideSch ? "Schedule: OFF" : "Schedule: ON";

      // Render DJs (Dados ou Exemplos)
      const djsList = data?.djs ? Object.values(data.djs) : exDjs;
      document.getElementById('djGrid').innerHTML = djsList.map(d=>`<div class="card dj-card"><img src="${d.img}"><h3>${d.name}</h3><p>${d.style}</p></div>`).join('');

      // Render Schedule
      const schText = data?.schedule || exSch;
      document.getElementById('scheduleList').innerHTML = schText.split('\n').map(l=>`<div style="background:#111; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid #f52a1f;">${l}</div>`).join('');
    }

    function toggleAdmin(){ document.getElementById('adminArea').style.display='block'; document.getElementById('adminArea').scrollIntoView(); }
    function login(){ if(document.getElementById('pass').value==='1234'){ document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; }}
    
    async function saveStatus(){ await fetch(DB+"status.json",{method:'PUT',body:JSON.stringify(document.getElementById('setSt').value)}); alert("OK!"); load();}
    async function saveDJ(){ 
        const dj = {name:document.getElementById('djN').value, img:document.getElementById('djI').value, style:document.getElementById('djS').value};
        await fetch(DB+"djs.json",{method:'POST',body:JSON.stringify(dj)}); alert("DJ Adicionado!"); load();
    }
    async function saveSch(){ await fetch(DB+"schedule.json",{method:'PUT',body:JSON.stringify(document.getElementById('schT').value)}); alert("Horário Salvo!"); load();}
    
    async function toggleSec(field){
        const res = await fetch(DB+field+".json");
        const curr = await res.json();
        await fetch(DB+field+".json",{method:'PUT',body:JSON.stringify(!curr)});
        load();
    }

    load();
  </script>
</body>
</html>
