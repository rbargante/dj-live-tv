<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ LIVE TV | FLASHMIX</title>
    <style>
        /* DESIGN FLASHMIX DJ CLUB */
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .logo-main { 
            padding: 20px; font-weight: 900; color: #f52a1f; letter-spacing: 4px; font-size: 26px; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(245, 42, 31, 0.4);
        }

        /* O CONTENTOR DO PLAYER (A CAIXA) */
        .player-wrapper {
            position: relative; width: 92%; max-width: 850px; aspect-ratio: 16 / 9;
            background: #080808; border-radius: 20px; border: 3px solid #1a1a1a;
            overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transition: all 0.5s ease;
        }

        /* QUANDO ESTÁ LIVE, A CAIXA "VIVE" */
        body.is-live .player-wrapper {
            border-color: #f52a1f; box-shadow: 0 0 40px rgba(245, 42, 31, 0.3);
        }

        /* O VÍDEO DO KICK */
        #player-container {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10;
            display: none; /* Escondido por defeito */
        }
        body.is-live #player-container { display: block; } /* Mostra quando está Live */

        iframe { width: 100%; height: 100%; border: 0; }

        /* --- UI OFFLINE (ESTILO DJ CLUB) --- */
        #offline-ui {
            position: absolute; inset: 0;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5;
        }

        /* ANIMAÇÃO DE FUNDO (Ondas Sonoras Movendo-se) */
        .wave-background {
            position: absolute; inset: 0; opacity: 0.1;
            background-image: repeating-linear-gradient(0deg, #333 0%, #333 1px, #000 1px, #000 10px);
            animation: waveFlow 2s linear infinite;
        }

        @keyframes waveFlow {
            from { background-position: 0 0; }
            to { background-position: 0 20px; }
        }

        .offline-content {
            position: relative; z-index: 6; text-align: center;
        }

        .logo-offline {
            color: #333; font-weight: 900; font-size: 24px; letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 15px; transition: color 0.5s;
        }

        .status-offline {
            color: #1a1a1a; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        /* LUZ PULSANTE (DJ ON AIR LOOK) */
        .dot { 
            width: 10px; height: 10px; background: #1a1a1a; border-radius: 50%; 
            animation: pulseOff 1.5s infinite;
        }

        @keyframes pulseOff {
            0% { background: #1a1a1a; }
            50% { background: #333; }
            100% { background: #1a1a1a; }
        }

        /* Esconde o offline quando está Live */
        body.is-live #offline-ui { display: none; }

        /* --- BOTÃO DE SOM --- */
        #unmuteBtn {
            display: none; margin-top: 30px; background: #f52a1f; color: #fff;
            border: none; padding: 18px 45px; border-radius: 50px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(245, 42, 31, 0.2); transition: transform 0.2s, box-shadow 0.2s;
        }

        #unmuteBtn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(245, 42, 31, 0.3); }
        #unmuteBtn:active { transform: translateY(1px); }
        body.is-live #unmuteBtn { display: inline-block; }

    </style>
</head>
<body>

    <div class="logo-main">FLASHMIX.TV</div>

    <div class="player-wrapper">
        <div id="offline-ui">
            <div class="wave-background"></div> <div class="offline-content">
                <div class="logo-offline">FLASHMIX.TV</div>
                <div class="status-offline">
                    <div class="dot"></div> <span>EMISSÃO ENCERRADA</span>
                </div>
            </div>
        </div>

        <div id="player-container"></div>
    </div>

    <button id="unmuteBtn" onclick="ligarSom()">🔊 ATIVAR SOM EM DIRETO</button>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (O INTERRUPTOR DO IMAC)
        const DB_URL = "https://dj-live-tv-48162-default-rtdb.europe-west1.firebasedatabase.app/is_live.json";
        let statusLocal = null;

        async function sincronizarOBS() {
            try {
                // nocache= obriga o browser a ler a verdade do iMac agora
                const resposta = await fetch(`${DB_URL}?nocache=${Date.now()}`);
                const isLive = await resposta.json();

                if (isLive !== statusLocal) {
                    statusLocal = isLive;
                    const videoTarget = document.getElementById('player-container');
                    const somBtn = document.getElementById('unmuteBtn');

                    if (isLive === true) {
                        // IMAC ESTÁ LIVE -> MOSTRA PLAYER
                        document.body.classList.add('is-live');
                        videoTarget.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=true" allowfullscreen></iframe>`;
                        somBtn.style.display = 'inline-block';
                    } else {
                        // IMAC ESTÁ OFFLINE -> APAGA PLAYER NA HORA
                        document.body.classList.remove('is-live');
                        videoTarget.innerHTML = ""; 
                        somBtn.style.display = 'none';
                        window.stop(); // Mata o buffer
                    }
                }
            } catch (e) { console.log("Erro de ligação..."); }
        }

        function ligarSom() {
            const videoTarget = document.getElementById('player-container');
            // Recarrega o player com som ativo
            videoTarget.innerHTML = `<iframe src="https://player.kick.com/DJLIVETV?muted=false" allowfullscreen></iframe>`;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        // VERIFICA A CADA 2 SEGUNDOS
        setInterval(sincronizarOBS, 2000);
        sincronizarOBS();

    </script>
</body>
</html>
